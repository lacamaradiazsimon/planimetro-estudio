<style>
:root{
  --bg:#0f1220; --bg2:#0b0e1a; --surf:#181c2e; --card:#1e2338; --card2:#232a42;
  --txt:#e8eaf2; --muted:#9aa3bd; --accent:#6ea8fe; --accent2:#5ce2c0; --accent3:#c9a6ff;
  --ok:#36d399; --bad:#fb7185; --warn:#fbbf24; --border:#2c3350; --shadow:rgba(0,0,0,.35);
}
html[data-theme="light"]{
  --bg:#eef1f8; --bg2:#e3e8f4; --surf:#ffffff; --card:#ffffff; --card2:#f1f4fb;
  --txt:#1b2138; --muted:#566080; --accent:#2f6bdd; --accent2:#0ea98a; --accent3:#7c4ddb;
  --ok:#0f9d63; --bad:#d63a52; --warn:#b8780a; --border:#d4dbed; --shadow:rgba(30,40,80,.12);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:radial-gradient(1200px 800px at 80% -10%, rgba(110,168,254,.10), transparent 60%),
             radial-gradient(900px 700px at -10% 110%, rgba(92,226,192,.08), transparent 55%),
             var(--bg);
  color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:17px; line-height:1.62; -webkit-text-size-adjust:100%;
  padding-bottom:env(safe-area-inset-bottom);
}
a{color:var(--accent)}
/* ---------- Top bar ---------- */
#topbar{
  position:sticky; top:0; z-index:40;
  display:flex; align-items:center; gap:10px;
  padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
  background:color-mix(in srgb, var(--bg) 86%, transparent);
  backdrop-filter:saturate(160%) blur(12px); -webkit-backdrop-filter:saturate(160%) blur(12px);
  border-bottom:1px solid var(--border);
}
#menuBtn{
  display:none; border:1px solid var(--border); background:var(--card);
  color:var(--txt); width:42px; height:42px; border-radius:12px; font-size:20px; cursor:pointer;
}
#brand{font-weight:700; font-size:15px; letter-spacing:.2px; display:flex; align-items:center; gap:8px}
#brand .dot{color:var(--accent2)}
#brand small{color:var(--muted); font-weight:500}
#topRight{margin-left:auto; display:flex; align-items:center; gap:10px}
#themeBtn{border:1px solid var(--border); background:var(--card); color:var(--txt); width:42px;height:42px;border-radius:12px;font-size:18px;cursor:pointer}
#progWrap{display:flex;align-items:center;gap:8px;min-width:90px}
#progBar{flex:1;height:8px;background:var(--card2);border-radius:99px;overflow:hidden;min-width:60px}
#progFill{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s}
#progTxt{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
/* ---------- Layout ---------- */
#layout{display:flex; max-width:1180px; margin:0 auto; gap:0}
#sidebar{
  width:286px; flex:none; padding:18px 14px 60px; position:sticky; top:64px; align-self:flex-start;
  max-height:calc(100vh - 64px); overflow-y:auto;
}
#sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:1.4px;color:var(--muted);margin:6px 8px 10px}
.navItem{
  display:flex; align-items:center; gap:11px; padding:11px 12px; border-radius:13px; cursor:pointer;
  color:var(--txt); border:1px solid transparent; margin-bottom:4px; transition:background .15s,border .15s;
}
.navItem:hover{background:var(--card)}
.navItem.active{background:var(--card); border-color:var(--border)}
.navItem .ic{font-size:20px; width:26px; text-align:center; flex:none}
.navItem .nm{font-size:14px; font-weight:600; line-height:1.25}
.navItem .nm small{display:block;color:var(--muted);font-weight:500;font-size:11.5px;margin-top:1px}
.navItem .chk{margin-left:auto; color:var(--ok); font-size:15px; opacity:0; flex:none}
.navItem.done .chk{opacity:1}
.navItem.done .ic{opacity:.65}
#scrim{display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:35}
/* ---------- Content ---------- */
#main{flex:1; min-width:0; padding:22px 20px 120px}
.mhead{margin:4px 0 20px}
.mhead .kick{color:var(--accent2);font-weight:700;font-size:12.5px;letter-spacing:1.2px;text-transform:uppercase}
.mhead h1{font-size:27px;line-height:1.2;margin:6px 0 4px}
.mhead h1 .e{margin-right:8px}
.mhead p{color:var(--muted);margin:0;font-size:16px}
.section{margin:30px 0}
.section > .stitle{
  display:flex;align-items:center;gap:10px;font-size:13px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;color:var(--muted);margin:0 0 14px;
}
.section > .stitle::after{content:"";flex:1;height:1px;background:var(--border)}
.card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px 18px;box-shadow:0 8px 30px -18px var(--shadow);margin-bottom:14px}
.para{margin:0 0 14px}
.para:last-child{margin-bottom:0}
.formula{
  background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:12px 14px;margin:14px 0;
  overflow-x:auto; overflow-y:hidden; -webkit-overflow-scrolling:touch; text-align:center;
}
.formula .cap{display:block;color:var(--muted);font-size:13px;margin-top:6px;text-align:center}
.callout{
  border-left:4px solid var(--accent); background:linear-gradient(90deg, color-mix(in srgb,var(--accent) 12%, transparent), transparent 70%);
  border-radius:10px;padding:12px 14px;margin:14px 0;
}
.callout::before{content:"💡 ";}
strong{color:var(--txt);font-weight:700}
code{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:1px 6px;font-size:.92em}
/* ---------- Interactive bits ---------- */
.btn{
  appearance:none;border:1px solid var(--border);background:var(--card2);color:var(--txt);
  border-radius:12px;padding:11px 15px;font-size:14.5px;font-weight:600;cursor:pointer;
  min-height:44px; transition:background .15s,transform .05s; touch-action:manipulation;
}
.btn:active{transform:scale(.97)}
.btn.primary{background:linear-gradient(180deg,var(--accent),#5b93ee);border-color:transparent;color:#08101f}
.btn.ghost{background:transparent}
.btn.sm{padding:8px 12px;font-size:13px;min-height:38px}
.row{display:flex;flex-wrap:wrap;gap:8px;align-items:center}
/* steps (guided derivation + exercise) */
.step{border:1px solid var(--border);border-radius:15px;padding:14px 15px;margin-bottom:12px;background:var(--card)}
.step .qn{display:flex;gap:10px;align-items:flex-start}
.step .badge{flex:none;width:27px;height:27px;border-radius:8px;background:var(--card2);border:1px solid var(--border);
  display:grid;place-items:center;font-size:13px;font-weight:700;color:var(--accent2)}
.step .prompt{font-weight:600;margin:0}
.hintbox{margin-top:11px}
.hint{background:var(--card2);border:1px dashed var(--border);border-radius:10px;padding:9px 12px;margin-top:8px;font-size:15px;color:var(--txt)}
.hint .lab{color:var(--warn);font-weight:700;font-size:12px;letter-spacing:.5px;display:block;margin-bottom:2px}
.reveal{margin-top:11px;border-top:1px dashed var(--border);padding-top:11px;display:none}
.reveal.show{display:block;animation:fade .3s}
.reveal .ans{background:color-mix(in srgb,var(--ok) 12%, transparent);border:1px solid color-mix(in srgb,var(--ok) 35%, var(--border));border-radius:11px;padding:10px 12px;margin-bottom:8px}
.reveal .exp{color:var(--muted);font-size:15px}
@keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:none}}
.finalans{margin-top:6px;background:color-mix(in srgb,var(--accent2) 12%, transparent);border:1px solid color-mix(in srgb,var(--accent2) 34%, var(--border));border-radius:12px;padding:11px 14px}
.finalans .lab{color:var(--accent2);font-weight:700;font-size:12px;letter-spacing:.6px;display:block;margin-bottom:3px}
/* quiz */
.quiz{border:1px solid var(--border);border-radius:15px;padding:15px;margin-bottom:13px;background:var(--card)}
.quiz .q{font-weight:600;margin:0 0 12px}
.opt{display:flex;gap:10px;align-items:flex-start;border:1px solid var(--border);border-radius:12px;padding:11px 13px;margin-bottom:9px;cursor:pointer;background:var(--card2);transition:border .15s,background .15s}
.opt:hover{border-color:var(--accent)}
.opt .mk{flex:none;width:24px;height:24px;border-radius:50%;border:2px solid var(--muted);display:grid;place-items:center;font-size:13px;font-weight:700;margin-top:1px}
.opt.correct{border-color:var(--ok);background:color-mix(in srgb,var(--ok) 12%,transparent)}
.opt.correct .mk{border-color:var(--ok);background:var(--ok);color:#04130c}
.opt.wrong{border-color:var(--bad);background:color-mix(in srgb,var(--bad) 12%,transparent)}
.opt.wrong .mk{border-color:var(--bad);background:var(--bad);color:#1a0408}
.opt.locked{cursor:default;opacity:.85}
.opt.locked:hover{border-color:var(--border)}
.opt.correct.locked,.opt.wrong.locked{opacity:1}
.fb{font-size:14px;color:var(--muted);margin:2px 0 0;display:none}
.opt.show-fb .fb{display:block}
.qexp{margin-top:6px;background:var(--card2);border-radius:11px;padding:11px 13px;font-size:15px;display:none}
.qexp.show{display:block}
.qexp .lab{color:var(--accent);font-weight:700;font-size:12px;letter-spacing:.5px;display:block;margin-bottom:3px}
/* takeaways */
.takeaways{list-style:none;padding:0;margin:0}
.takeaways li{position:relative;padding:9px 12px 9px 38px;background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:9px}
.takeaways li::before{content:"⭐";position:absolute;left:12px;top:9px}
/* widget shell */
.widget{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px;margin:6px 0 4px;overflow:hidden}
.widget .whead{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;margin:0 2px 10px}
.widget .whead .tag{margin-left:auto;font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase}
.wcanvas{display:block;width:100%;border-radius:13px;background:var(--bg2);border:1px solid var(--border);touch-action:none}
.wctrls{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:11px}
.seg{display:inline-flex;border:1px solid var(--border);border-radius:11px;overflow:hidden;background:var(--card2)}
.seg button{border:none;background:transparent;color:var(--muted);padding:9px 13px;font-size:13.5px;font-weight:600;cursor:pointer;min-height:40px}
.seg button.on{background:var(--accent);color:#08101f}
.field{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);flex-wrap:wrap}
.field input[type=range]{accent-color:var(--accent);height:30px}
.readout{font-variant-numeric:tabular-nums;background:var(--card2);border:1px solid var(--border);border-radius:11px;padding:9px 12px;font-size:14px;line-height:1.45}
.readout b{color:var(--accent2)}
.readout .big{font-size:20px;font-weight:800;color:var(--txt)}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);background:var(--card2);border:1px solid var(--border);border-radius:99px;padding:5px 10px}
/* footer nav */
.fnav{display:flex;gap:10px;margin-top:34px;padding-top:18px;border-top:1px solid var(--border)}
.fnav .btn{flex:1;justify-content:center;display:flex;align-items:center;gap:7px}
.markdone{width:100%;margin-top:14px}
.bignote{color:var(--muted);font-size:13.5px;text-align:center;margin-top:26px}
.bignote a{cursor:pointer}
@media (max-width:860px){
  body{font-size:16px}
  #menuBtn{display:block}
  #sidebar{
    position:fixed; top:0; left:0; bottom:0; width:300px; max-width:86vw; z-index:36;
    background:var(--surf); transform:translateX(-104%); transition:transform .26s ease;
    padding-top:calc(18px + env(safe-area-inset-top)); max-height:none; box-shadow:0 0 40px var(--shadow);
  }
  #sidebar.open{transform:none}
  #scrim.open{display:block}
  #main{padding:18px 15px 120px}
  .mhead h1{font-size:23px}
  #brand small{display:none}
  #progWrap{min-width:64px}
}
@media (max-width:420px){
  .mhead h1{font-size:21px}
  .card,.widget{border-radius:15px}
}
</style>

<script id="data">window.MODULES_DATA = [{"id": "modulo-1-integrales-dobles-area", "title": "Integrales dobles para áreas", "subtitle": "El área de una región plana como \\(\\iint_D 1\\,dA\\): regiones Tipo I y Tipo II, y el planteamiento de la integral iterada", "icon": "📐", "theory": [{"type": "paragraph", "content": "Empecemos por el ladrillo fundamental de todo lo que vendrá. El planímetro, al final del camino, mide un número: el área de una figura plana. Antes de entender cómo lo logra recorriendo solo la frontera, necesitas dominar qué es esa área desde el punto de vista del cálculo. Y la herramienta natural para ello es la integral doble."}, {"type": "paragraph", "content": "La idea es intuitiva. Imagina una región \\(D\\) del plano y la cubres con una malla de rectangulitos diminutos. Cada uno tiene un área \\(\\Delta A=\\Delta x\\,\\Delta y\\). Si sumas todos los rectangulitos que caen dentro de \\(D\\) y haces la malla cada vez más fina, esa suma se aproxima al área total. Ese límite de sumas es, por definición, la integral doble del integrando \\(1\\) sobre \\(D\\)."}, {"type": "formula", "content": "\\text{Área}(D)=\\iint_D 1\\,dA", "caption": "El área de la región es la integral doble de la función constante 1."}, {"type": "paragraph", "content": "¿Por qué el integrando es \\(1\\)? Porque la integral doble \\(\\iint_D f(x,y)\\,dA\\) suma el valor de \\(f\\) ponderado por cada trocito de área \\(dA\\). Si pones \\(f=1\\), simplemente estás sumando \\(1\\cdot dA\\) por cada trocito, es decir, acumulando puro área. No hay altura ni volumen de por medio: solo contamos cuánta superficie ocupa \\(D\\)."}, {"type": "callout", "content": "Idea clave: \\(\\iint_D 1\\,dA\\) no calcula un volumen ni nada en 3D. Es solo la suma de todos los trocitos de área de la región plana \\(D\\). El \\(1\\) está ahí para que cada trocito \\(dA\\) cuente exactamente una vez."}, {"type": "paragraph", "content": "Para calcular esa integral doble en la práctica, la convertimos en dos integrales simples encadenadas (una integral iterada). La clave es describir bien la región \\(D\\) con desigualdades. Hay dos formas estándar de hacerlo, y elegir bien entre ellas te ahorra muchísimo trabajo."}, {"type": "paragraph", "content": "Región Tipo I (barremos en vertical): \\(D\\) está atrapada entre dos curvas que dependen de \\(x\\). Fijas un \\(x\\) entre \\(a\\) y \\(b\\), y para ese \\(x\\) la variable \\(y\\) sube desde una curva inferior \\(g_1(x)\\) hasta una curva superior \\(g_2(x)\\). En símbolos: \\(a\\le x\\le b,\\ g_1(x)\\le y\\le g_2(x)\\)."}, {"type": "formula", "content": "\\iint_D 1\\,dA=\\int_a^b\\!\\int_{g_1(x)}^{g_2(x)} 1\\,dy\\,dx", "caption": "Tipo I: primero integras en y (límites que dependen de x), luego en x (límites constantes)."}, {"type": "paragraph", "content": "Fíjate en una regla de oro: la integral de adentro debe tener límites que pueden depender de la variable de afuera, pero la integral de afuera SIEMPRE tiene límites constantes (números). Si terminas con una variable suelta en los límites exteriores, algo está mal planteado."}, {"type": "paragraph", "content": "Región Tipo II (barremos en horizontal): es la imagen espejo. Ahora fijas un \\(y\\) entre \\(c\\) y \\(d\\), y para ese \\(y\\) la variable \\(x\\) va desde una curva izquierda \\(h_1(y)\\) hasta una curva derecha \\(h_2(y)\\). En símbolos: \\(c\\le y\\le d,\\ h_1(y)\\le x\\le h_2(y)\\)."}, {"type": "formula", "content": "\\iint_D 1\\,dA=\\int_c^d\\!\\int_{h_1(y)}^{h_2(y)} 1\\,dx\\,dy", "caption": "Tipo II: primero integras en x (límites que dependen de y), luego en y (límites constantes)."}, {"type": "paragraph", "content": "Ambas formas dan el mismo número (el área no cambia según cómo la calcules). La elección entre Tipo I y Tipo II es puramente táctica: usas la que produzca límites más simples y evite partir la región en pedazos. A veces una curva, al despejar \\(y\\) en función de \\(x\\), se vuelve complicada, pero despejando \\(x\\) en función de \\(y\\) queda limpia: ahí conviene el Tipo II."}, {"type": "callout", "content": "Cuando integras el \\(1\\) en la primera variable, obtienes literalmente la longitud de cada rebanada: en Tipo I, \\(\\int_{g_1(x)}^{g_2(x)}1\\,dy=g_2(x)-g_1(x)\\) es la altura de la franja vertical en ese \\(x\\). Luego sumas todas esas alturas a lo largo de \\(x\\). Eso es exactamente el método de 'área entre dos curvas' que ya conoces, ahora visto como integral doble."}], "guidedDerivation": {"title": "De \\(\\iint_D 1\\,dA\\) al área entre dos curvas (Tipo I)", "intro": "Vamos a deducir, paso a paso, cómo se plantea el área de una región Tipo I como integral iterada, partiendo de la definición \\(\\iint_D 1\\,dA\\). Verás que el resultado coincide con la fórmula clásica del área entre dos curvas, pero ahora entiendes de dónde sale.", "steps": [{"prompt": "Tenemos una región \\(D\\) que en cada \\(x\\in[a,b]\\) está limitada por abajo por \\(y=g_1(x)\\) y por arriba por \\(y=g_2(x)\\), con \\(g_1(x)\\le g_2(x)\\). Escribe las desigualdades que describen \\(D\\) como región Tipo I.", "hints": ["Tipo I significa: la variable \\(x\\) se mueve en un intervalo fijo y la variable \\(y\\) queda atrapada entre dos curvas que dependen de \\(x\\).", "El intervalo para \\(x\\) lo dan los extremos \\(a\\) y \\(b\\); para \\(y\\) usa las curvas inferior y superior.", "Ordena: primero la condición sobre \\(x\\), luego la condición sobre \\(y\\)."], "revealLatex": "D=\\{(x,y):\\,a\\le x\\le b,\\ g_1(x)\\le y\\le g_2(x)\\}", "explanation": "Hemos descrito \\(D\\) fijando primero el rango de \\(x\\) (constantes \\(a\\) y \\(b\\)) y, para cada \\(x\\), el rango de \\(y\\) entre las dos curvas. Esta es la estructura exacta de una región Tipo I."}, {"prompt": "Escribe el área como integral doble \\(\\iint_D 1\\,dA\\) y conviértela en una integral iterada respetando el orden Tipo I (primero \\(dy\\), luego \\(dx\\)). Coloca los límites correctos en cada integral.", "hints": ["En Tipo I, la integral interior es respecto de \\(y\\): sus límites son las dos curvas \\(g_1(x)\\) y \\(g_2(x)\\).", "La integral exterior es respecto de \\(x\\): sus límites son los números \\(a\\) y \\(b\\).", "Recuerda: el integrando es \\(1\\), y los límites de adentro pueden depender de \\(x\\), pero los de afuera deben ser constantes."], "revealLatex": "\\iint_D 1\\,dA=\\int_a^b\\!\\int_{g_1(x)}^{g_2(x)} 1\\,dy\\,dx", "explanation": "Pasamos de la integral doble abstracta a una iterada concreta. El orden \\(dy\\,dx\\) es el natural en Tipo I: primero recorremos cada franja vertical (variando \\(y\\)) y luego deslizamos esa franja a lo largo de \\(x\\)."}, {"prompt": "Resuelve la integral interior \\(\\displaystyle\\int_{g_1(x)}^{g_2(x)} 1\\,dy\\). ¿Qué representa geométricamente ese resultado?", "hints": ["La integral de \\(1\\) respecto de \\(y\\) es simplemente \\(y\\).", "Evalúa \\(y\\) entre el límite superior \\(g_2(x)\\) y el inferior \\(g_1(x)\\).", "El resultado es la altura de la franja vertical en ese \\(x\\)."], "revealLatex": "\\int_{g_1(x)}^{g_2(x)} 1\\,dy=g_2(x)-g_1(x)", "explanation": "La integral interior colapsa a la altura de la rebanada vertical: la distancia entre la curva de arriba y la de abajo en cada \\(x\\). Es la longitud de la franja que luego sumaremos."}, {"prompt": "Sustituye ese resultado en la integral exterior para obtener la fórmula final del área de la región Tipo I.", "hints": ["Reemplaza la integral interior por \\(g_2(x)-g_1(x)\\) dentro de la integral en \\(x\\).", "Los límites exteriores siguen siendo \\(a\\) y \\(b\\).", "Esta es la fórmula clásica del 'área entre dos curvas'."], "revealLatex": "\\text{Área}(D)=\\int_a^b\\big(g_2(x)-g_1(x)\\big)\\,dx", "explanation": "Recuperamos exactamente la fórmula del área entre dos curvas, pero ahora deducida desde \\(\\iint_D 1\\,dA\\). Sumamos todas las alturas \\(g_2(x)-g_1(x)\\) a lo largo de \\([a,b]\\). Esta es justamente el área que, más adelante, el planímetro medirá recorriendo solo la frontera de \\(D\\)."}]}, "conceptual": [{"question": "¿Qué representa exactamente \\(\\iint_D 1\\,dA\\)?", "options": [{"text": "El área de la región plana \\(D\\).", "correct": true, "feedback": "Correcto. Al integrar el integrando constante \\(1\\) sobre \\(D\\), sumas un \\(1\\) por cada trocito de área \\(dA\\), acumulando exactamente la superficie total de \\(D\\)."}, {"text": "El volumen de un sólido sobre \\(D\\).", "correct": false, "feedback": "No. Aunque \\(\\iint_D f\\,dA\\) con \\(f\\ge 0\\) puede interpretarse como volumen bajo una superficie, con \\(f=1\\) el resultado es el área plana. Además, en este curso trabajamos solo en 2D: no hay sólidos ni volúmenes."}, {"text": "La longitud de la frontera de \\(D\\).", "correct": false, "feedback": "No. La longitud de la frontera es una integral de línea sobre el borde, no una integral doble sobre el interior. \\(\\iint_D 1\\,dA\\) mide superficie, no perímetro."}, {"text": "El promedio de la función \\(1\\) sobre \\(D\\).", "correct": false, "feedback": "No. El promedio sería \\(\\frac{1}{\\text{Área}}\\iint_D 1\\,dA=1\\), algo trivial. La integral doble por sí sola, sin dividir por el área, da directamente el área."}], "explanation": "El integrando \\(1\\) convierte la integral doble en un contador puro de área: cada trocito \\(dA\\) aporta su propio tamaño y nada más. Por eso \\(\\iint_D 1\\,dA\\) es, por definición, el área de \\(D\\). Esta es precisamente la cantidad que el planímetro medirá."}, {"question": "Para una región donde la frontera superior e inferior se describen fácilmente como \\(y=g_1(x)\\) y \\(y=g_2(x)\\), pero la frontera izquierda y derecha en función de \\(y\\) son complicadas o están partidas, ¿qué tipo de planteamiento conviene?", "options": [{"text": "Tipo I, integrando primero en \\(y\\) y luego en \\(x\\).", "correct": true, "feedback": "Correcto. Si las tapas superior e inferior son funciones limpias de \\(x\\), el Tipo I (\\(\\int_a^b\\int_{g_1(x)}^{g_2(x)}dy\\,dx\\)) describe la región sin partirla y con límites simples."}, {"text": "Tipo II, integrando primero en \\(x\\) y luego en \\(y\\).", "correct": false, "feedback": "No conviene aquí. El Tipo II exige describir la región con curvas \\(x=h_1(y)\\) y \\(x=h_2(y)\\), que en este caso son complicadas o están partidas, justo lo que queremos evitar."}, {"text": "Da igual, porque ambos siempre cuestan lo mismo.", "correct": false, "feedback": "El resultado numérico es el mismo, pero el esfuerzo no. Elegir el tipo equivocado puede obligarte a partir la región en varias integrales. La elección es táctica."}, {"text": "Ninguno: hay que usar coordenadas polares obligatoriamente.", "correct": false, "feedback": "No. Las polares son útiles para regiones circulares, pero aquí el Tipo I funciona perfecto. No hay obligación de cambiar de coordenadas."}], "explanation": "La regla práctica: elige el tipo que describa la región con los límites más simples y sin partirla. Si las curvas superior/inferior son funciones limpias de \\(x\\), usa Tipo I; si las curvas izquierda/derecha son funciones limpias de \\(y\\), usa Tipo II. El área que obtienes es la misma en ambos casos."}, {"question": "En una integral iterada bien planteada del área, ¿qué debe cumplirse respecto a los límites?", "options": [{"text": "Los límites de la integral interior pueden depender de la variable exterior, pero los de la integral exterior deben ser constantes.", "correct": true, "feedback": "Correcto. Por ejemplo en Tipo I, los límites interiores \\(g_1(x),g_2(x)\\) dependen de \\(x\\), pero los exteriores \\(a,b\\) son números. Así el resultado final es un número (el área)."}, {"text": "Todos los límites, interiores y exteriores, deben ser constantes.", "correct": false, "feedback": "No. Si los límites interiores fueran constantes, la región sería un simple rectángulo. En general las curvas frontera hacen que los límites interiores dependan de la variable exterior."}, {"text": "Los límites exteriores pueden depender de la variable interior.", "correct": false, "feedback": "Esto es un error clásico. Si la variable interior aparece en los límites exteriores, queda 'suelta' al final y el resultado no sería un número. Los límites exteriores siempre son constantes."}, {"text": "No importa el orden de los límites mientras el integrando sea \\(1\\).", "correct": false, "feedback": "Sí importa. El orden y la dependencia de los límites codifican la geometría de la región. Mal puestos, integras sobre una región equivocada."}], "explanation": "La estructura correcta de una integral iterada es jerárquica: de adentro hacia afuera, cada nivel puede depender solo de las variables más exteriores, y el nivel más externo tiene límites constantes. Esto garantiza que el resultado sea un número bien definido: el área."}], "exercises": [{"statement": "Calcula el área de la región \\(D\\) encerrada entre las curvas \\(y=x\\) y \\(y=x^2\\), planteándola como integral doble.", "figure": "region-curves", "steps": [{"prompt": "Primero encuentra los puntos de intersección de \\(y=x\\) y \\(y=x^2\\) para conocer el rango de \\(x\\).", "hints": ["Iguala las dos expresiones: \\(x=x^2\\).", "Lleva todo a un lado: \\(x^2-x=0\\), y factoriza.", "\\(x(x-1)=0\\) te da dos soluciones."], "answerLatex": "x=0\\quad\\text{y}\\quad x=1", "explanation": "Las curvas se cortan en \\(x=0\\) y \\(x=1\\). Por tanto, el rango horizontal de la región es \\(0\\le x\\le 1\\)."}, {"prompt": "En el intervalo \\((0,1)\\), ¿cuál curva va por arriba y cuál por abajo? Esto fija \\(g_1(x)\\) y \\(g_2(x)\\).", "hints": ["Prueba un valor intermedio, por ejemplo \\(x=\\tfrac12\\).", "Calcula \\(y=x\\) y \\(y=x^2\\) en \\(x=\\tfrac12\\): obtienes \\(0.5\\) y \\(0.25\\).", "La curva con mayor valor de \\(y\\) es la superior."], "answerLatex": "g_2(x)=x\\ \\text{(superior)},\\qquad g_1(x)=x^2\\ \\text{(inferior)}", "explanation": "En \\((0,1)\\) se cumple \\(x^2<x\\), así que la recta \\(y=x\\) está por encima de la parábola \\(y=x^2\\). La región es Tipo I con \\(x^2\\le y\\le x\\)."}, {"prompt": "Plantea el área como integral doble en forma iterada (Tipo I, orden \\(dy\\,dx\\)).", "hints": ["El integrando es \\(1\\).", "Límites interiores en \\(y\\): de la curva inferior a la superior.", "Límites exteriores en \\(x\\): de \\(0\\) a \\(1\\)."], "answerLatex": "\\int_0^1\\!\\int_{x^2}^{x} 1\\,dy\\,dx", "explanation": "Hemos escrito el área como \\(\\iint_D 1\\,dA\\) en forma iterada. Falta evaluarla."}, {"prompt": "Resuelve la integral interior \\(\\displaystyle\\int_{x^2}^{x}1\\,dy\\).", "hints": ["La integral de \\(1\\) respecto de \\(y\\) es \\(y\\).", "Evalúa entre el límite superior \\(x\\) y el inferior \\(x^2\\).", "Resta: superior menos inferior."], "answerLatex": "x-x^2", "explanation": "La altura de cada franja vertical en la posición \\(x\\) es \\(x-x^2\\). Ahora sumamos estas alturas a lo largo de \\([0,1]\\)."}, {"prompt": "Resuelve la integral exterior \\(\\displaystyle\\int_0^1 (x-x^2)\\,dx\\) para obtener el área.", "hints": ["Integra término a término: \\(\\int x\\,dx=\\tfrac{x^2}{2}\\) y \\(\\int x^2\\,dx=\\tfrac{x^3}{3}\\).", "Evalúa entre \\(0\\) y \\(1\\).", "\\(\\tfrac{1}{2}-\\tfrac{1}{3}\\): busca común denominador \\(6\\)."], "answerLatex": "\\left[\\frac{x^2}{2}-\\frac{x^3}{3}\\right]_0^1=\\frac{1}{2}-\\frac{1}{3}=\\frac{1}{6}", "explanation": "El área encerrada entre \\(y=x\\) y \\(y=x^2\\) es \\(\\tfrac16\\). Este es precisamente el número que un planímetro arrojaría al recorrer la frontera de esta región en sentido antihorario."}], "finalAnswerLatex": "\\text{Área}=\\frac{1}{6}"}, {"statement": "Calcula el área del triángulo \\(D\\) de vértices \\((0,0)\\), \\((1,0)\\) y \\((1,1)\\) planteándolo como integral doble. Verifica con la fórmula elemental del triángulo.", "figure": "region-curves", "steps": [{"prompt": "Describe las tres aristas del triángulo y decide el rango de \\(x\\). ¿Entre qué valores se mueve \\(x\\)?", "hints": ["Las aristas son: la base sobre el eje \\(x\\) (de \\((0,0)\\) a \\((1,0)\\)), el lado vertical \\(x=1\\) (de \\((1,0)\\) a \\((1,1)\\)) y la hipotenusa de \\((0,0)\\) a \\((1,1)\\).", "La hipotenusa que une \\((0,0)\\) y \\((1,1)\\) tiene ecuación \\(y=x\\).", "El triángulo abarca \\(x\\) desde \\(0\\) hasta \\(1\\)."], "answerLatex": "0\\le x\\le 1", "explanation": "El triángulo se extiende horizontalmente entre \\(x=0\\) y \\(x=1\\). Ese será el rango de la integral exterior en Tipo I."}, {"prompt": "Para un \\(x\\) fijo en \\((0,1)\\), ¿entre qué curvas se mueve \\(y\\)? Identifica \\(g_1(x)\\) y \\(g_2(x)\\).", "hints": ["Por abajo, el triángulo está limitado por la base \\(y=0\\).", "Por arriba, está limitado por la hipotenusa \\(y=x\\).", "Entonces \\(0\\le y\\le x\\)."], "answerLatex": "g_1(x)=0\\le y\\le x=g_2(x)", "explanation": "En cada \\(x\\), la franja vertical va desde la base \\(y=0\\) hasta la hipotenusa \\(y=x\\). La región es Tipo I con \\(0\\le y\\le x\\)."}, {"prompt": "Plantea el área como integral iterada Tipo I.", "hints": ["Integrando \\(1\\), orden \\(dy\\,dx\\).", "Límites interiores: de \\(0\\) a \\(x\\).", "Límites exteriores: de \\(0\\) a \\(1\\)."], "answerLatex": "\\int_0^1\\!\\int_0^{x} 1\\,dy\\,dx", "explanation": "Esta integral doble representa el área del triángulo. Procedemos a evaluarla de adentro hacia afuera."}, {"prompt": "Resuelve la integral interior \\(\\displaystyle\\int_0^{x}1\\,dy\\). ¿Qué altura de franja obtienes?", "hints": ["La integral de \\(1\\) respecto de \\(y\\) es \\(y\\).", "Evalúa entre el límite superior \\(x\\) y el inferior \\(0\\).", "El resultado es simplemente \\(x\\)."], "answerLatex": "\\int_0^{x}1\\,dy=x", "explanation": "La altura de la franja vertical en la posición \\(x\\) es \\(x\\): crece linealmente desde \\(0\\) hasta \\(1\\) conforme avanzamos hacia la derecha. Ahora sumamos estas alturas."}, {"prompt": "Resuelve la integral exterior \\(\\displaystyle\\int_0^1 x\\,dx\\) para obtener el área, y compárala con la fórmula elemental del triángulo.", "hints": ["Integra: \\(\\int x\\,dx=\\tfrac{x^2}{2}\\).", "Evalúa entre \\(0\\) y \\(1\\).", "Compara con base \\(\\times\\) altura \\(/2\\)."], "answerLatex": "\\int_0^1 x\\,dx=\\left[\\frac{x^2}{2}\\right]_0^1=\\frac{1}{2}", "explanation": "El área del triángulo es \\(\\tfrac12\\). La fórmula elemental confirma: base \\(\\times\\) altura \\(/2 = 1\\times 1/2=\\tfrac12\\). Ambos métodos coinciden, como debe ser."}], "finalAnswerLatex": "\\text{Área}=\\frac{1}{2}"}, {"statement": "Calcula el área del rectángulo \\(D=[a,b]\\times[c,d]\\) (con \\(a<b\\), \\(c<d\\)) mediante una integral doble, y comprueba que recuperas la fórmula clásica base por altura.", "figure": "rectangle", "steps": [{"prompt": "Escribe las desigualdades que describen el rectángulo \\(D\\). ¿Dependen los límites de \\(y\\) del valor de \\(x\\)?", "hints": ["Un rectángulo de lados paralelos a los ejes tiene \\(x\\) entre dos constantes y \\(y\\) entre dos constantes.", "Aquí \\(a\\le x\\le b\\) y \\(c\\le y\\le d\\).", "Los límites de \\(y\\) son fijos: no dependen de \\(x\\). Es el caso más simple."], "answerLatex": "a\\le x\\le b,\\qquad c\\le y\\le d", "explanation": "En un rectángulo, los cuatro límites son constantes. Las curvas frontera \\(g_1(x)=c\\) y \\(g_2(x)=d\\) son rectas horizontales que no dependen de \\(x\\)."}, {"prompt": "Plantea el área como integral iterada (todos los límites constantes).", "hints": ["Integrando \\(1\\).", "Interior en \\(y\\): de \\(c\\) a \\(d\\). Exterior en \\(x\\): de \\(a\\) a \\(b\\).", "Como todos los límites son constantes, da igual el orden de integración."], "answerLatex": "\\int_a^b\\!\\int_c^d 1\\,dy\\,dx", "explanation": "Con límites constantes, la integral doble se factoriza limpiamente. Vamos a resolverla."}, {"prompt": "Evalúa la integral interior \\(\\int_c^d 1\\,dy\\) y luego la exterior para hallar el área.", "hints": ["Interior: \\(\\int_c^d 1\\,dy=d-c\\) (constante respecto de \\(x\\)).", "Exterior: \\(\\int_a^b (d-c)\\,dx=(d-c)\\int_a^b 1\\,dx=(d-c)(b-a)\\).", "Reordena como (base)(altura)."], "answerLatex": "(b-a)(d-c)", "explanation": "El área es \\((b-a)(d-c)\\): la base \\(b-a\\) por la altura \\(d-c\\). La integral doble reproduce exactamente la fórmula elemental del rectángulo, confirmando que \\(\\iint_D 1\\,dA\\) mide área."}], "finalAnswerLatex": "\\text{Área}=(b-a)(d-c)"}], "widget": "double-integral", "keyTakeaways": ["El área de cualquier región plana \\(D\\) se calcula como \\(\\iint_D 1\\,dA\\): el integrando \\(1\\) hace que cada trocito \\(dA\\) cuente una vez, acumulando puro área (nada de volúmenes, todo es 2D).", "Para evaluar, conviertes la integral doble en una iterada describiendo \\(D\\): Tipo I (\\(a\\le x\\le b,\\ g_1(x)\\le y\\le g_2(x)\\), orden \\(dy\\,dx\\)) o Tipo II (\\(c\\le y\\le d,\\ h_1(y)\\le x\\le h_2(y)\\), orden \\(dx\\,dy\\)).", "Regla de oro de los límites: los de la integral interior pueden depender de la variable exterior, pero los de la integral exterior deben ser siempre constantes, para que el resultado sea un número.", "Elegir Tipo I o Tipo II es táctico: ambos dan el mismo área; escoge el que produzca límites más simples y no obligue a partir la región.", "En Tipo I, la integral interior \\(\\int_{g_1}^{g_2}1\\,dy=g_2(x)-g_1(x)\\) es la altura de cada franja, y al integrarla en \\(x\\) recuperas el clásico 'área entre dos curvas'. Esta área es justamente la que el planímetro medirá más adelante recorriendo solo la frontera de \\(D\\)."]}, {"id": "modulo-2-coordenadas-polares-jacobiano", "title": "Coordenadas polares y el Jacobiano", "subtitle": "Por qué dA = r dr dθ y de dónde sale esa r", "icon": "🧭", "theory": [{"type": "paragraph", "content": "En el Módulo 1 viste que el área de una región plana es \\(A=\\iint_D 1\\,dA\\). Cuando la región tiene simetría circular (círculos, sectores, anillos), describirla con \\(x\\) e \\(y\\) puede ser un dolor de cabeza. Las coordenadas polares resuelven esto: en lugar de localizar un punto por su par \\((x,y)\\), lo localizamos por su distancia al origen \\(r\\ge 0\\) y por el ángulo \\(\\theta\\) que forma con el eje \\(x\\) positivo."}, {"type": "formula", "content": "x=r\\cos\\theta,\\qquad y=r\\sin\\theta", "caption": "Cambio de variable a coordenadas polares."}, {"type": "paragraph", "content": "Esta transformación toma un punto \\((r,\\theta)\\) del \"plano polar\" y lo coloca en el punto \\((x,y)\\) del plano cartesiano. El radio \\(r\\) mide qué tan lejos estás del origen y el ángulo \\(\\theta\\) en qué dirección. Pero aquí aparece el detalle CLAVE: cuando cambiamos de variables en una integral doble, el elemento de área NO es simplemente \\(dr\\,d\\theta\\). Hay que corregirlo con un factor."}, {"type": "callout", "content": "El elemento de área en polares es \\(dA=r\\,dr\\,d\\theta\\). Esa \\(r\\) extra es el valor absoluto del Jacobiano del cambio de variable, y olvidarla es el error más común al integrar en polares."}, {"type": "formula", "content": "dA=r\\,dr\\,d\\theta", "caption": "Elemento de área en coordenadas polares."}, {"type": "paragraph", "content": "Hay dos formas de entender por qué aparece esa \\(r\\). La RAZÓN GEOMÉTRICA: si avanzas un poquito \\(dr\\) en radio y un poquito \\(d\\theta\\) en ángulo, barres una pequeña región llamada \"rectángulo polar\". Uno de sus lados (el radial) mide \\(dr\\). El otro lado es un arco de circunferencia de radio \\(r\\) que subtiende el ángulo \\(d\\theta\\); la longitud de ese arco es \\(r\\,d\\theta\\) (radio por ángulo). Como es casi un rectángulo, su área es base por altura: \\((dr)(r\\,d\\theta)=r\\,dr\\,d\\theta\\). Nota que cuanto más lejos del origen (mayor \\(r\\)), más anchos son estos rectángulos: por eso el factor crece con \\(r\\)."}, {"type": "formula", "content": "\\text{lado radial}=dr,\\qquad \\text{lado angular}=r\\,d\\theta\\ \\Rightarrow\\ dA=r\\,dr\\,d\\theta", "caption": "El rectángulo polar y sus lados."}, {"type": "paragraph", "content": "La RAZÓN ANALÍTICA: el factor de corrección de cualquier cambio de variable es el valor absoluto del determinante jacobiano \\(\\left|\\dfrac{\\partial(x,y)}{\\partial(r,\\theta)}\\right|\\), que mide cuánto estira o encoge áreas la transformación. Lo calcularemos paso a paso en la derivación guiada y verás que da exactamente \\(r\\). Las dos razones coinciden, como debe ser."}, {"type": "paragraph", "content": "Con esto, la integral de área de una región \\(D\\) descrita en polares se escribe \\(A=\\iint_D r\\,dr\\,d\\theta\\), donde los límites de \\(r\\) y \\(\\theta\\) describen la frontera de \\(D\\). El ángulo \\(\\theta\\) suele recorrer un intervalo de longitud \\(2\\pi\\) (por ejemplo \\(\\theta\\in[0,2\\pi)\\)) para dar una vuelta completa, o un subintervalo si solo cubres una porción angular (un sector)."}], "guidedDerivation": {"title": "Deducción del Jacobiano: por qué el determinante vale r", "intro": "Vamos a demostrar analíticamente que \\(\\left|\\dfrac{\\partial(x,y)}{\\partial(r,\\theta)}\\right|=r\\). La idea: el Jacobiano es el determinante de la matriz formada por las derivadas parciales de \\(x\\) e \\(y\\) respecto de \\(r\\) y \\(\\theta\\). Lo armaremos entrada por entrada y luego calcularemos el determinante.", "steps": [{"prompt": "Partimos de \\(x=r\\cos\\theta\\). Calcula sus dos derivadas parciales: \\(\\dfrac{\\partial x}{\\partial r}\\) y \\(\\dfrac{\\partial x}{\\partial\\theta}\\).", "hints": ["Para \\(\\partial x/\\partial r\\) trata a \\(\\theta\\) como constante: \\(\\cos\\theta\\) es solo un número que multiplica a \\(r\\).", "Para \\(\\partial x/\\partial\\theta\\) trata a \\(r\\) como constante y deriva \\(\\cos\\theta\\) respecto de \\(\\theta\\).", "Recuerda que \\(\\frac{d}{d\\theta}\\cos\\theta=-\\sin\\theta\\)."], "revealLatex": "\\frac{\\partial x}{\\partial r}=\\cos\\theta,\\qquad \\frac{\\partial x}{\\partial\\theta}=-r\\sin\\theta", "explanation": "Como \\(\\cos\\theta\\) es constante respecto de \\(r\\), derivar \\(r\\cos\\theta\\) en \\(r\\) deja \\(\\cos\\theta\\). Y derivando en \\(\\theta\\) con \\(r\\) fijo aparece \\(-r\\sin\\theta\\)."}, {"prompt": "Ahora con \\(y=r\\sin\\theta\\). Calcula \\(\\dfrac{\\partial y}{\\partial r}\\) y \\(\\dfrac{\\partial y}{\\partial\\theta}\\).", "hints": ["Mismo procedimiento: para \\(\\partial y/\\partial r\\) el factor \\(\\sin\\theta\\) es constante.", "Para \\(\\partial y/\\partial\\theta\\) deriva \\(\\sin\\theta\\) respecto de \\(\\theta\\).", "Recuerda que \\(\\frac{d}{d\\theta}\\sin\\theta=\\cos\\theta\\)."], "revealLatex": "\\frac{\\partial y}{\\partial r}=\\sin\\theta,\\qquad \\frac{\\partial y}{\\partial\\theta}=r\\cos\\theta", "explanation": "Derivando \\(r\\sin\\theta\\) en \\(r\\) queda \\(\\sin\\theta\\); derivando en \\(\\theta\\) queda \\(r\\cos\\theta\\) (esta vez con signo positivo, porque \\(\\frac{d}{d\\theta}\\sin\\theta=\\cos\\theta\\))."}, {"prompt": "Arma la matriz jacobiana, ubicando en la primera fila las derivadas de \\(x\\) y en la segunda las de \\(y\\), con las columnas correspondiendo a \\(r\\) y \\(\\theta\\).", "hints": ["La matriz es de \\(2\\times 2\\): filas para \\(x,y\\); columnas para \\(r,\\theta\\).", "Primera columna: derivadas respecto de \\(r\\). Segunda columna: derivadas respecto de \\(\\theta\\).", "Usa los cuatro resultados que ya obtuviste."], "revealLatex": "\\frac{\\partial(x,y)}{\\partial(r,\\theta)}=\\begin{pmatrix}\\dfrac{\\partial x}{\\partial r}&\\dfrac{\\partial x}{\\partial\\theta}\\\\[4pt]\\dfrac{\\partial y}{\\partial r}&\\dfrac{\\partial y}{\\partial\\theta}\\end{pmatrix}=\\begin{pmatrix}\\cos\\theta&-r\\sin\\theta\\\\\\sin\\theta&r\\cos\\theta\\end{pmatrix}", "explanation": "Colocamos cada derivada parcial en su lugar. Esta matriz describe localmente cómo la transformación deforma el plano cerca de cada punto."}, {"prompt": "Calcula el determinante de esa matriz \\(2\\times 2\\).", "hints": ["Para una matriz \\(\\begin{pmatrix}a&b\\\\c&d\\end{pmatrix}\\) el determinante es \\(ad-bc\\).", "Aquí \\(a=\\cos\\theta,\\ b=-r\\sin\\theta,\\ c=\\sin\\theta,\\ d=r\\cos\\theta\\).", "Te quedará \\(r\\cos^2\\theta+r\\sin^2\\theta\\); factoriza la \\(r\\)."], "revealLatex": "\\det=(\\cos\\theta)(r\\cos\\theta)-(-r\\sin\\theta)(\\sin\\theta)=r\\cos^2\\theta+r\\sin^2\\theta=r(\\cos^2\\theta+\\sin^2\\theta)=r", "explanation": "Al desarrollar \\(ad-bc\\) aparecen dos términos que se suman (el segundo cambia de signo por el menos de \\(b\\)). Factorizando \\(r\\) y usando la identidad pitagórica \\(\\cos^2\\theta+\\sin^2\\theta=1\\), el determinante se reduce a \\(r\\)."}, {"prompt": "Finalmente, toma valor absoluto para obtener el factor que multiplica al área, y escribe el elemento de área \\(dA\\).", "hints": ["El Jacobiano que corrige áreas es el VALOR ABSOLUTO del determinante.", "Como \\(r\\ge 0\\) por definición, \\(|r|=r\\).", "El elemento de área es ese factor multiplicado por \\(dr\\,d\\theta\\)."], "revealLatex": "\\left|\\frac{\\partial(x,y)}{\\partial(r,\\theta)}\\right|=|r|=r\\quad\\Rightarrow\\quad dA=r\\,dr\\,d\\theta", "explanation": "Como el radio nunca es negativo, el valor absoluto no cambia nada y el factor de corrección es \\(r\\). Esto confirma analíticamente lo que la geometría del rectángulo polar ya nos había mostrado: \\(dA=r\\,dr\\,d\\theta\\)."}]}, "conceptual": [{"question": "¿Por qué es importante el Jacobiano \\(r\\) al cambiar a coordenadas polares?", "options": [{"text": "Porque corrige cómo la transformación deforma las áreas: el elemento \\(dr\\,d\\theta\\) no representa un área real hasta multiplicarlo por \\(r\\).", "correct": true, "feedback": "Correcto. El Jacobiano \\(r=\\left|\\partial(x,y)/\\partial(r,\\theta)\\right|\\) mide el factor de estiramiento local de áreas. Sin él, \\(dr\\,d\\theta\\) son unidades del plano polar, no área física en el plano \\(xy\\)."}, {"text": "Porque sin la \\(r\\) los límites de integración quedarían mal escritos.", "correct": false, "feedback": "No. La \\(r\\) del Jacobiano no tiene que ver con los límites de integración, sino con el elemento de área \\(dA\\). Los límites describen la frontera de la región; el factor \\(r\\) corrige el área."}, {"text": "Porque convierte el ángulo \\(\\theta\\) de grados a radianes.", "correct": false, "feedback": "No. La \\(r\\) no convierte unidades de ángulo; \\(\\theta\\) ya debe estar en radianes para que \\(r\\,d\\theta\\) sea una longitud de arco. El Jacobiano corrige áreas, no ángulos."}, {"text": "Porque hace que la integral siempre dé un número positivo.", "correct": false, "feedback": "No es la razón. Aunque \\(r\\ge 0\\), su papel es ser el factor de cambio de área del Jacobiano, no garantizar positividad de la integral."}], "explanation": "Cuando cambias de variables en una integral doble, el elemento de área se transforma según \\(dA=\\left|\\dfrac{\\partial(x,y)}{\\partial(r,\\theta)}\\right|dr\\,d\\theta\\). Ese determinante mide cuánto estira o encoge áreas la transformación localmente. En polares vale exactamente \\(r\\): los rectángulos polares lejos del origen son más anchos (arco \\(r\\,d\\theta\\)), así que pesan más. Por eso \\(dA=r\\,dr\\,d\\theta\\) y la \\(r\\) es imprescindible."}, {"question": "¿Qué pasa si olvidas la \\(r\\) e integras simplemente \\(\\iint_D dr\\,d\\theta\\)?", "options": [{"text": "Obtienes un resultado incorrecto, porque no estás midiendo área real sino una cantidad sin sentido geométrico en el plano \\(xy\\).", "correct": true, "feedback": "Exacto. Sin la \\(r\\) sumas \"rectángulos\" de área \\(dr\\,d\\theta\\) que no corresponden al área verdadera; lejos del origen subestimas el tamaño real de cada celda. El número que sale no es el área de \\(D\\)."}, {"text": "Da exactamente la mitad del área correcta, siempre.", "correct": false, "feedback": "No. El error no es un factor constante como \\(1/2\\); depende de la geometría de la región, ya que la corrección \\(r\\) varía punto a punto."}, {"text": "No pasa nada, porque \\(r\\) se cancela al evaluar los límites.", "correct": false, "feedback": "No. La \\(r\\) no se cancela: es parte del integrando. Omitirla cambia el valor de la integral. Por ejemplo, para un círculo de radio \\(R\\), \\(\\iint dr\\,d\\theta=2\\pi R\\) en vez de \\(\\pi R^2\\)."}, {"text": "El resultado sale en radianes en vez de en unidades de área.", "correct": false, "feedback": "No. El problema no es de unidades de ángulo; es que \\(dr\\,d\\theta\\) sin el factor \\(r\\) simplemente no representa el área en el plano \\(xy\\)."}], "explanation": "Olvidar la \\(r\\) es el error clásico en polares. Compruébalo con el círculo de radio \\(R\\): el cálculo correcto \\(\\int_0^{2\\pi}\\!\\int_0^{R} r\\,dr\\,d\\theta=\\pi R^2\\). Si olvidas la \\(r\\): \\(\\int_0^{2\\pi}\\!\\int_0^{R} dr\\,d\\theta=2\\pi R\\), que ni siquiera tiene unidades de área. La \\(r\\) pesa cada celda según su distancia al origen; sin ella, el resultado carece de sentido geométrico."}, {"question": "Para describir una región que da una vuelta completa alrededor del origen (como un disco completo), ¿qué rango de \\(\\theta\\) se usa habitualmente?", "options": [{"text": "\\(\\theta\\) recorre un intervalo de longitud \\(2\\pi\\), por ejemplo \\(\\theta\\in[0,2\\pi)\\).", "correct": true, "feedback": "Correcto. Una vuelta completa abarca \\(2\\pi\\) radianes. Da igual si lo escribes \\([0,2\\pi)\\) o \\([-\\pi,\\pi)\\): lo importante es cubrir todas las direcciones exactamente una vez."}, {"text": "\\(\\theta\\in[0,\\pi]\\), porque medio giro basta para cubrir el plano.", "correct": false, "feedback": "No. Medio giro (\\(\\pi\\) radianes) solo cubre la mitad de las direcciones; te faltaría todo el semiplano opuesto. Para un disco completo necesitas \\(2\\pi\\)."}, {"text": "\\(\\theta\\in[0,360]\\), midiendo en grados.", "correct": false, "feedback": "El rango angular es correcto en idea (una vuelta), pero en cálculo \\(\\theta\\) debe ir en RADIANES para que \\(r\\,d\\theta\\) sea longitud de arco. En radianes una vuelta es \\(2\\pi\\), no 360."}, {"text": "\\(\\theta\\in[0,\\infty)\\), porque el ángulo no tiene cota.", "correct": false, "feedback": "No. Aunque \\(\\theta\\) puede crecer indefinidamente, dar más de una vuelta repetiría puntos y contaría el área varias veces. Para cubrir el disco una sola vez basta un intervalo de longitud \\(2\\pi\\)."}], "explanation": "En polares, \\(r\\ge 0\\) mide distancia al origen y \\(\\theta\\) la dirección. Para barrer todas las direcciones exactamente una vez se usa un intervalo de longitud \\(2\\pi\\) en radianes (típicamente \\([0,2\\pi)\\)). Si la región es solo una porción angular (un sector), \\(\\theta\\) recorre un subintervalo más corto, por ejemplo \\([0,\\pi/2]\\) para un cuarto de disco."}], "exercises": [{"statement": "Calcula el área de un círculo (disco) de radio \\(R\\) usando coordenadas polares, planteando y resolviendo la integral doble \\(\\iint_D r\\,dr\\,d\\theta\\). Comprueba que obtienes \\(\\pi R^2\\).", "figure": "circle", "steps": [{"prompt": "Describe el disco de radio \\(R\\) centrado en el origen en coordenadas polares: ¿qué rangos recorren \\(r\\) y \\(\\theta\\)?", "hints": ["El radio va desde el centro (origen) hasta el borde del disco.", "El ángulo debe dar una vuelta completa para cubrir todo el disco.", "Recuerda usar radianes para \\(\\theta\\)."], "answerLatex": "0\\le r\\le R,\\qquad 0\\le\\theta\\le 2\\pi", "explanation": "El disco completo se obtiene dejando que \\(r\\) crezca de \\(0\\) (centro) hasta \\(R\\) (borde) y que \\(\\theta\\) dé una vuelta entera de \\(0\\) a \\(2\\pi\\)."}, {"prompt": "Plantea la integral doble del área usando el elemento \\(dA=r\\,dr\\,d\\theta\\) con esos límites.", "hints": ["El área es \\(\\iint_D dA\\) y aquí \\(dA=r\\,dr\\,d\\theta\\).", "Pon \\(\\theta\\) en la integral exterior y \\(r\\) en la interior (o al revés; aquí se separan).", "No olvides el factor \\(r\\) en el integrando."], "answerLatex": "A=\\int_0^{2\\pi}\\!\\!\\int_0^{R} r\\,dr\\,d\\theta", "explanation": "Sustituimos los límites y el elemento de área. El integrando es \\(r\\) (el \\(1\\) del área por el Jacobiano \\(r\\)). Como los límites son constantes, la integral se separa en una parte radial y una angular."}, {"prompt": "Resuelve primero la integral interior en \\(r\\): \\(\\displaystyle\\int_0^{R} r\\,dr\\).", "hints": ["La primitiva de \\(r\\) respecto de \\(r\\) es \\(r^2/2\\).", "Evalúa entre \\(0\\) y \\(R\\).", "Quedará un término con \\(R^2\\)."], "answerLatex": "\\int_0^{R} r\\,dr=\\left[\\frac{r^2}{2}\\right]_0^{R}=\\frac{R^2}{2}", "explanation": "Integramos \\(r\\) en \\(r\\): la primitiva es \\(r^2/2\\), y al evaluar entre \\(0\\) y \\(R\\) queda \\(R^2/2\\). Este resultado es una constante respecto de \\(\\theta\\)."}, {"prompt": "Ahora integra el resultado anterior respecto de \\(\\theta\\) entre \\(0\\) y \\(2\\pi\\).", "hints": ["Tienes \\(\\int_0^{2\\pi}\\frac{R^2}{2}\\,d\\theta\\); \\(R^2/2\\) es constante respecto de \\(\\theta\\).", "Integrar una constante en \\(\\theta\\) de \\(0\\) a \\(2\\pi\\) da la constante por \\(2\\pi\\).", "Multiplica y simplifica."], "answerLatex": "\\int_0^{2\\pi}\\frac{R^2}{2}\\,d\\theta=\\frac{R^2}{2}\\cdot 2\\pi=\\pi R^2", "explanation": "Como \\(R^2/2\\) no depende de \\(\\theta\\), sale de la integral y solo queda \\(\\int_0^{2\\pi}d\\theta=2\\pi\\). El producto \\(\\frac{R^2}{2}\\cdot 2\\pi\\) da \\(\\pi R^2\\), la conocida fórmula del área del círculo."}], "finalAnswerLatex": "A=\\int_0^{2\\pi}\\!\\!\\int_0^{R} r\\,dr\\,d\\theta=\\pi R^2"}, {"statement": "Calcula el área del anillo (corona circular) comprendido entre dos circunferencias concéntricas de radios \\(a\\) y \\(b\\) con \\(0<a<b\\), usando coordenadas polares. Verifica que da \\(\\pi(b^2-a^2)\\).", "figure": "region-curves", "steps": [{"prompt": "Describe el anillo en coordenadas polares: ¿entre qué valores varía \\(r\\) y qué rango recorre \\(\\theta\\)?", "hints": ["El anillo está entre el círculo interior de radio \\(a\\) y el exterior de radio \\(b\\).", "El radio NO empieza en cero: empieza en el borde interior.", "El ángulo sigue dando una vuelta completa."], "answerLatex": "a\\le r\\le b,\\qquad 0\\le\\theta\\le 2\\pi", "explanation": "A diferencia del disco, aquí \\(r\\) arranca en \\(a\\) (no en \\(0\\)), porque el centro está hueco. El ángulo cubre toda la vuelta, \\(0\\) a \\(2\\pi\\)."}, {"prompt": "Plantea la integral doble del área con \\(dA=r\\,dr\\,d\\theta\\) y esos límites.", "hints": ["Usa el mismo esquema que con el disco, cambiando solo el límite inferior de \\(r\\).", "Integrando exterior en \\(\\theta\\), interior en \\(r\\).", "No olvides el factor \\(r\\)."], "answerLatex": "A=\\int_0^{2\\pi}\\!\\!\\int_a^{b} r\\,dr\\,d\\theta", "explanation": "El planteamiento es idéntico al del círculo, pero el radio recorre de \\(a\\) a \\(b\\). El factor \\(r\\) sigue presente como Jacobiano."}, {"prompt": "Resuelve la integral interior en \\(r\\): \\(\\displaystyle\\int_a^{b} r\\,dr\\).", "hints": ["Primitiva de \\(r\\): \\(r^2/2\\).", "Evalúa entre \\(a\\) y \\(b\\): resta el valor en \\(a\\) del valor en \\(b\\).", "Quedará una diferencia de cuadrados."], "answerLatex": "\\int_a^{b} r\\,dr=\\left[\\frac{r^2}{2}\\right]_a^{b}=\\frac{b^2-a^2}{2}", "explanation": "Evaluando \\(r^2/2\\) entre \\(a\\) y \\(b\\) obtenemos \\(\\frac{b^2}{2}-\\frac{a^2}{2}=\\frac{b^2-a^2}{2}\\). Es una constante respecto de \\(\\theta\\)."}, {"prompt": "Integra respecto de \\(\\theta\\) de \\(0\\) a \\(2\\pi\\) para terminar.", "hints": ["\\(\\frac{b^2-a^2}{2}\\) es constante respecto de \\(\\theta\\).", "\\(\\int_0^{2\\pi}d\\theta=2\\pi\\).", "Multiplica y simplifica el factor \\(2\\)."], "answerLatex": "\\int_0^{2\\pi}\\frac{b^2-a^2}{2}\\,d\\theta=\\frac{b^2-a^2}{2}\\cdot 2\\pi=\\pi(b^2-a^2)", "explanation": "La constante sale de la integral, \\(\\int_0^{2\\pi}d\\theta=2\\pi\\) y el \\(2\\) se cancela. El resultado \\(\\pi(b^2-a^2)\\) es el área del disco grande menos la del pequeño, justo lo esperado. (Si \\(a=0\\) recuperas \\(\\pi b^2\\), el círculo completo.)"}], "finalAnswerLatex": "A=\\int_0^{2\\pi}\\!\\!\\int_a^{b} r\\,dr\\,d\\theta=\\pi(b^2-a^2)"}], "widget": "polar-jacobian", "keyTakeaways": ["El cambio a polares es \\(x=r\\cos\\theta,\\ y=r\\sin\\theta\\), con \\(r\\ge 0\\) la distancia al origen y \\(\\theta\\) el ángulo (en radianes).", "El elemento de área en polares es \\(dA=r\\,dr\\,d\\theta\\); esa \\(r\\) extra es el valor absoluto del Jacobiano del cambio de variable y NUNCA debe olvidarse.", "Razón geométrica: el rectángulo polar tiene lado radial \\(dr\\) y lado angular (arco) \\(r\\,d\\theta\\), así que su área es \\(r\\,dr\\,d\\theta\\).", "Razón analítica: \\(\\left|\\dfrac{\\partial(x,y)}{\\partial(r,\\theta)}\\right|=\\left|\\det\\begin{pmatrix}\\cos\\theta&-r\\sin\\theta\\\\\\sin\\theta&r\\cos\\theta\\end{pmatrix}\\right|=r(\\cos^2\\theta+\\sin^2\\theta)=r\\).", "Para un disco de radio \\(R\\): \\(\\int_0^{2\\pi}\\!\\int_0^{R} r\\,dr\\,d\\theta=\\pi R^2\\). Olvidar la \\(r\\) daría \\(2\\pi R\\), que ni siquiera tiene unidades de área."]}, {"id": "modulo-3-curvas-parametricas", "title": "Curvas paramétricas y diferenciales", "subtitle": "Cómo describir la frontera de una figura con un parámetro y obtener dx y dy", "icon": "🧭", "theory": [{"type": "paragraph", "content": "Hasta ahora describiste regiones por su interior (Tipo I y Tipo II). El planímetro, en cambio, solo recorre la frontera. Para hablar de esa frontera necesitamos una herramienta: la curva paramétrica. La idea es pensar la curva como la trayectoria de un punto que se mueve con el tiempo. Introducimos un parámetro \\(t\\) (piensa en él como el tiempo) y damos las coordenadas del punto en cada instante mediante dos funciones \\(x(t)\\) e \\(y(t)\\)."}, {"type": "formula", "content": "\\vec{r}(t)=(x(t),\\,y(t)),\\qquad t\\in[a,b]", "caption": "Una curva paramétrica: a cada valor del parámetro \\(t\\) le corresponde un punto del plano."}, {"type": "paragraph", "content": "A medida que \\(t\\) crece desde \\(a\\) hasta \\(b\\), el punto \\(\\vec{r}(t)\\) traza la curva. El sentido en que se recorre la curva queda fijado por el sentido CRECIENTE de \\(t\\): esto es justo lo que llamaremos orientación, y será decisivo para el signo del área."}, {"type": "callout", "content": "La orientación de una curva paramétrica no es una decisión extra: viene determinada por el sentido en que aumenta \\(t\\). Si quieres invertir el recorrido, basta con recorrer \\(t\\) al revés."}, {"type": "paragraph", "content": "Dos propiedades de la frontera de una figura son fundamentales para el planímetro. Una curva es CERRADA si empieza y termina en el mismo punto, es decir \\(\\vec{r}(a)=\\vec{r}(b)\\). Una curva es SIMPLE si no se corta a sí misma, esto es, \\(\\vec{r}\\) es inyectiva en \\((a,b)\\): puntos distintos del intervalo dan puntos distintos del plano (no hay autointersecciones)."}, {"type": "callout", "content": "Una curva CERRADA y SIMPLE se llama curva de Jordan. Encierra una región del plano con un dentro y un afuera bien definidos. La frontera de cualquier figura que mide el planímetro es una curva de Jordan recorrida en sentido antihorario (positivo)."}, {"type": "paragraph", "content": "La segunda herramienta clave son los diferenciales. Si \\(x=x(t)\\), un pequeño avance \\(dt\\) del parámetro produce un pequeño cambio en \\(x\\) igual a la derivada por \\(dt\\). Lo mismo para \\(y\\). Estos diferenciales son exactamente las piezas \\(dx\\) y \\(dy\\) que aparecen en las integrales de línea del Teorema de Green."}, {"type": "formula", "content": "dx = x'(t)\\,dt,\\qquad dy = y'(t)\\,dt", "caption": "Los diferenciales en función del parámetro. Sustituyendo esto, cualquier integral de línea se vuelve una integral ordinaria en \\(t\\)."}, {"type": "paragraph", "content": "El vector \\((dx,dy)=(x'(t),y'(t))\\,dt\\) es la velocidad del punto que dibuja la curva (multiplicada por \\(dt\\)): apunta en la dirección del movimiento y es tangente a la curva en cada punto. Su sentido es el de avance del recorrido y su módulo \\(|\\vec r'(t)|\\) es la rapidez. Por eso, conocer \\(dx\\) y \\(dy\\) es conocer hacia dónde y a qué ritmo se mueve el punto que dibuja la frontera; eso es exactamente lo que integra el planímetro."}, {"type": "paragraph", "content": "Veamos las tres parametrizaciones que usarás todo el curso, todas en sentido antihorario. Circunferencia de radio \\(R\\) centrada en el origen:"}, {"type": "formula", "content": "\\vec{r}(t)=(R\\cos t,\\;R\\sin t),\\quad t\\in[0,2\\pi]\\;\\Rightarrow\\; dx=-R\\sin t\\,dt,\\; dy=R\\cos t\\,dt"}, {"type": "paragraph", "content": "Elipse de semiejes \\(a\\) (horizontal) y \\(b\\) (vertical), centrada en el origen. Es la circunferencia unidad escalada por \\(a\\) en \\(x\\) y por \\(b\\) en \\(y\\):"}, {"type": "formula", "content": "\\vec{r}(t)=(a\\cos t,\\;b\\sin t),\\quad t\\in[0,2\\pi]\\;\\Rightarrow\\; dx=-a\\sin t\\,dt,\\; dy=b\\cos t\\,dt"}, {"type": "paragraph", "content": "El rectángulo no se puede describir con una sola fórmula suave: tiene esquinas. Se parametriza a trozos, recorriendo sus cuatro lados consecutivamente en sentido antihorario. Por ejemplo el rectángulo \\([0,L]\\times[0,H]\\): lado inferior (de \\((0,0)\\) a \\((L,0)\\)), lado derecho (a \\((L,H)\\)), lado superior (a \\((0,H)\\)) y lado izquierdo (de vuelta a \\((0,0)\\)). En cada lado uno de los diferenciales es cero, porque una de las coordenadas se mantiene constante."}, {"type": "callout", "content": "Regla práctica para tramos rectos: si en un lado la coordenada \\(y\\) es constante, entonces \\(dy=0\\); si \\(x\\) es constante, entonces \\(dx=0\\). Esto simplifica muchísimo las integrales de línea sobre rectángulos."}], "guidedDerivation": {"title": "Parametrizar la elipse y calcular dx y dy", "intro": "Vamos a parametrizar la elipse \\(\\frac{x^2}{a^2}+\\frac{y^2}{b^2}=1\\) en sentido antihorario y a obtener sus diferenciales paso a paso. La estrategia es apoyarnos en la identidad trigonométrica fundamental para que la ecuación se satisfaga automáticamente.", "steps": [{"prompt": "Mira la ecuación \\(\\frac{x^2}{a^2}+\\frac{y^2}{b^2}=1\\). ¿Qué identidad trigonométrica tiene exactamente la forma 'algo al cuadrado más otra cosa al cuadrado igual a 1'? Escríbela.", "hints": ["Piensa en seno y coseno del mismo ángulo.", "Es la identidad pitagórica básica.", "Su forma es \\((\\cos t)^2+(\\sin t)^2=1\\)."], "revealLatex": "\\cos^2 t+\\sin^2 t=1", "explanation": "La identidad pitagórica tiene la misma estructura que la ecuación de la elipse: dos cuadrados que suman 1. Vamos a hacer que cada término de la elipse coincida con uno de estos."}, {"prompt": "Queremos que \\(\\frac{x^2}{a^2}\\) juegue el papel de \\(\\cos^2 t\\). ¿Qué debe valer \\(x\\) en términos de \\(a\\) y \\(t\\) para lograrlo? Y análogamente, ¿cuánto vale \\(y\\)?", "hints": ["Iguala \\(\\frac{x^2}{a^2}=\\cos^2 t\\) y despeja \\(x\\).", "De \\(\\frac{x^2}{a^2}=\\cos^2 t\\) sale \\(x=a\\cos t\\); haz lo mismo con \\(y\\) usando \\(b\\) y \\(\\sin t\\).", "Una coordenada lleva coseno y la otra seno; los semiejes \\(a\\) y \\(b\\) son los factores."], "revealLatex": "x=a\\cos t,\\qquad y=b\\sin t", "explanation": "Con \\(x=a\\cos t\\) se tiene \\(\\frac{x^2}{a^2}=\\cos^2 t\\), y con \\(y=b\\sin t\\) se tiene \\(\\frac{y^2}{b^2}=\\sin^2 t\\). Su suma es \\(\\cos^2 t+\\sin^2 t=1\\), así que la ecuación de la elipse se cumple para todo \\(t\\)."}, {"prompt": "Escribe la parametrización completa \\(\\vec{r}(t)\\) e indica el intervalo de \\(t\\) para recorrer la elipse una vez en sentido antihorario.", "hints": ["Junta las dos coordenadas en un vector.", "Una vuelta completa del ángulo va de \\(0\\) a \\(2\\pi\\).", "Con \\(t\\) creciendo de \\(0\\) a \\(2\\pi\\), el punto arranca en \\((a,0)\\) y gira en sentido antihorario."], "revealLatex": "\\vec{r}(t)=(a\\cos t,\\;b\\sin t),\\quad t\\in[0,2\\pi]", "explanation": "En \\(t=0\\) estamos en \\((a,0)\\); al crecer \\(t\\) el punto sube hacia \\((0,b)\\), luego a \\((-a,0)\\), etc.: gira en sentido antihorario, que es la orientación positiva."}, {"prompt": "Ahora calcula \\(dx\\). Recuerda que \\(dx=x'(t)\\,dt\\). Deriva \\(x=a\\cos t\\) respecto de \\(t\\).", "hints": ["La derivada de \\(\\cos t\\) es \\(-\\sin t\\).", "El factor constante \\(a\\) sale fuera de la derivada.", "No olvides multiplicar por \\(dt\\) al final."], "revealLatex": "dx=-a\\sin t\\,dt", "explanation": "Como \\(x'(t)=-a\\sin t\\), el diferencial es \\(dx=x'(t)\\,dt=-a\\sin t\\,dt\\)."}, {"prompt": "Calcula \\(dy\\) de la misma forma, derivando \\(y=b\\sin t\\).", "hints": ["La derivada de \\(\\sin t\\) es \\(\\cos t\\).", "El factor \\(b\\) acompaña a la derivada.", "Multiplica por \\(dt\\)."], "revealLatex": "dy=b\\cos t\\,dt", "explanation": "Como \\(y'(t)=b\\cos t\\), se tiene \\(dy=y'(t)\\,dt=b\\cos t\\,dt\\). Ya tienes todo lo necesario para meter la elipse en la integral de línea del planímetro \\(A=\\frac{1}{2}\\oint x\\,dy-y\\,dx\\)."}, {"prompt": "Como verificación, comprueba que con \\(a=b=R\\) recuperas la circunferencia. ¿Qué quedan \\(\\vec r(t)\\), \\(dx\\) y \\(dy\\)?", "hints": ["Sustituye \\(a\\) y \\(b\\) por el mismo valor \\(R\\).", "La elipse con semiejes iguales es una circunferencia.", "Debes obtener \\(dx=-R\\sin t\\,dt\\) y \\(dy=R\\cos t\\,dt\\)."], "revealLatex": "\\vec{r}(t)=(R\\cos t,\\;R\\sin t),\\quad dx=-R\\sin t\\,dt,\\quad dy=R\\cos t\\,dt", "explanation": "La circunferencia es el caso particular de la elipse con \\(a=b=R\\). Esto confirma que tu parametrización es coherente con la del círculo."}]}, "conceptual": [{"question": "En una curva paramétrica \\(\\vec{r}(t)=(x(t),y(t))\\), ¿qué determina la orientación (el sentido) en que se recorre la curva?", "options": [{"text": "El sentido en que CRECE el parámetro \\(t\\).", "correct": true, "feedback": "Correcto. A medida que \\(t\\) aumenta de \\(a\\) a \\(b\\), el punto se mueve en una dirección concreta: ese es el sentido de recorrido. Para invertirlo, se recorre \\(t\\) al revés."}, {"text": "El signo de las funciones \\(x(t)\\) e \\(y(t)\\).", "correct": false, "feedback": "No. El signo de las coordenadas indica en qué cuadrante está el punto, no hacia dónde se mueve. La dirección la marca cómo cambian las coordenadas al crecer \\(t\\)."}, {"text": "El tamaño del intervalo \\([a,b]\\).", "correct": false, "feedback": "No. La longitud del intervalo afecta a cuántas vueltas o a qué ritmo, pero el sentido lo fija que \\(t\\) crezca, no cuánto mide el intervalo."}, {"text": "La curva no tiene orientación hasta que se calcula una integral.", "correct": false, "feedback": "No. La orientación es intrínseca a la parametrización: queda fijada por el sentido creciente de \\(t\\), independientemente de que luego integres o no."}], "explanation": "La orientación es consecuencia directa del sentido creciente de \\(t\\). Por eso, para recorrer una circunferencia en sentido antihorario usamos \\((R\\cos t,R\\sin t)\\) con \\(t\\) creciente: arranca en \\((R,0)\\) y gira hacia arriba. Esta orientación es la que da lectura positiva en el planímetro."}, {"question": "¿Qué significa que una curva sea CERRADA y SIMPLE (curva de Jordan)?", "options": [{"text": "Cerrada: \\(\\vec{r}(a)=\\vec{r}(b)\\) (vuelve al punto inicial); simple: no se corta a sí misma (\\(\\vec r\\) inyectiva).", "correct": true, "feedback": "Exacto. Cerrada es que el punto final coincide con el inicial, y simple es que no hay autointersecciones. Juntas, encierran una región con dentro y afuera bien definidos."}, {"text": "Cerrada: el área es finita; simple: la fórmula es fácil.", "correct": false, "feedback": "No. 'Cerrada' y 'simple' son propiedades geométricas precisas de la curva, no juicios sobre el área o la dificultad."}, {"text": "Cerrada: está acotada; simple: solo tiene un tramo.", "correct": false, "feedback": "No. Estar acotada no es lo mismo que cerrada, y una curva simple puede estar formada por varios tramos (como el rectángulo) siempre que no se cruce consigo misma."}, {"text": "Cerrada: \\(x(t)=y(t)\\); simple: \\(x'(t)=y'(t)\\).", "correct": false, "feedback": "No. Esas igualdades no tienen nada que ver. Cerrada es \\(\\vec r(a)=\\vec r(b)\\) y simple es que \\(\\vec r\\) sea inyectiva (sin autocortes)."}], "explanation": "Una curva de Jordan es cerrada (\\(\\vec r(a)=\\vec r(b)\\)) y simple (inyectiva, sin cruces). Esto garantiza que separa el plano en un interior y un exterior, condición necesaria para aplicar el Teorema de Green y, por tanto, para que el planímetro mida bien el área encerrada."}, {"question": "El vector \\((dx,dy)=(x'(t),y'(t))\\,dt\\) que aparece al diferenciar la curva, ¿qué representa geométricamente?", "options": [{"text": "Es un vector TANGENTE a la curva, en el sentido del recorrido.", "correct": true, "feedback": "Correcto. \\((x'(t),y'(t))\\) es la velocidad del punto que dibuja la curva: apunta en la dirección de avance y es tangente a la curva en ese punto."}, {"text": "Es un vector NORMAL (perpendicular) a la curva.", "correct": false, "feedback": "No. La derivada de la posición da la velocidad, que es tangente. El vector normal sería perpendicular a este."}, {"text": "Es siempre un vector unitario de longitud 1.", "correct": false, "feedback": "No necesariamente. Su longitud es la rapidez \\(|\\vec r'(t)|\\), que en general no vale 1 (por ejemplo, en la circunferencia vale \\(R\\))."}, {"text": "Apunta siempre hacia el origen.", "correct": false, "feedback": "No. Apunta en la dirección del movimiento, tangente a la curva; eso no tiene por qué señalar al origen."}], "explanation": "Diferenciar la posición \\(\\vec r(t)\\) da la velocidad \\(\\vec r'(t)=(x'(t),y'(t))\\), que es tangente a la trayectoria y apunta en el sentido del recorrido (el de \\(t\\) creciente). Por eso \\(dx\\) y \\(dy\\) codifican hacia dónde se mueve la frontera, justo lo que integra el planímetro."}], "exercises": [{"statement": "Parametriza la circunferencia de radio \\(R\\) centrada en el origen, recorrida en sentido antihorario, y obtén \\(dx\\) y \\(dy\\).", "figure": "circle", "steps": [{"prompt": "Propón las funciones \\(x(t)\\) e \\(y(t)\\) para una circunferencia de radio \\(R\\) en sentido antihorario, con el intervalo de \\(t\\).", "hints": ["Un punto a distancia \\(R\\) del origen y ángulo \\(t\\) tiene coordenadas \\((R\\cos t, R\\sin t)\\).", "Para una vuelta completa, \\(t\\) va de \\(0\\) a \\(2\\pi\\).", "Con \\(t\\) creciente desde \\(0\\), el punto sale de \\((R,0)\\) y gira hacia arriba: eso es antihorario."], "answerLatex": "\\vec{r}(t)=(R\\cos t,\\;R\\sin t),\\quad t\\in[0,2\\pi]", "explanation": "Las coordenadas polares de un punto sobre la circunferencia de radio \\(R\\) son exactamente \\((R\\cos t, R\\sin t)\\). Con \\(t\\) creciente se recorre en sentido antihorario."}, {"prompt": "Calcula \\(dx=x'(t)\\,dt\\) derivando \\(x=R\\cos t\\).", "hints": ["La derivada de \\(\\cos t\\) es \\(-\\sin t\\).", "\\(R\\) es constante, sale fuera.", "Acuérdate de multiplicar por \\(dt\\)."], "answerLatex": "dx=-R\\sin t\\,dt", "explanation": "\\(x'(t)=-R\\sin t\\), por lo que \\(dx=-R\\sin t\\,dt\\)."}, {"prompt": "Calcula \\(dy=y'(t)\\,dt\\) derivando \\(y=R\\sin t\\).", "hints": ["La derivada de \\(\\sin t\\) es \\(\\cos t\\).", "\\(R\\) acompaña como factor.", "Multiplica por \\(dt\\)."], "answerLatex": "dy=R\\cos t\\,dt", "explanation": "\\(y'(t)=R\\cos t\\), por lo que \\(dy=R\\cos t\\,dt\\). Estos diferenciales son los que usarás, por ejemplo, en \\(A=\\frac{1}{2}\\oint x\\,dy-y\\,dx\\)."}], "finalAnswerLatex": "\\vec{r}(t)=(R\\cos t,\\,R\\sin t),\\quad dx=-R\\sin t\\,dt,\\quad dy=R\\cos t\\,dt"}, {"statement": "Parametriza la elipse de semiejes \\(a\\) (horizontal) y \\(b\\) (vertical) centrada en el origen, en sentido antihorario, y obtén \\(dx\\) y \\(dy\\).", "figure": "ellipse", "steps": [{"prompt": "Escribe la parametrización \\(\\vec{r}(t)\\) de la elipse \\(\\frac{x^2}{a^2}+\\frac{y^2}{b^2}=1\\) en sentido antihorario, con su intervalo.", "hints": ["Parte de la circunferencia unidad \\((\\cos t,\\sin t)\\) y escala cada eje.", "Multiplica la coordenada \\(x\\) por \\(a\\) y la \\(y\\) por \\(b\\).", "El intervalo sigue siendo \\([0,2\\pi]\\)."], "answerLatex": "\\vec{r}(t)=(a\\cos t,\\;b\\sin t),\\quad t\\in[0,2\\pi]", "explanation": "Tomando \\(x=a\\cos t\\), \\(y=b\\sin t\\), se cumple \\(\\frac{x^2}{a^2}+\\frac{y^2}{b^2}=\\cos^2 t+\\sin^2 t=1\\), así que el punto recorre exactamente la elipse, en sentido antihorario con \\(t\\) creciente."}, {"prompt": "Calcula \\(dx\\) derivando \\(x=a\\cos t\\).", "hints": ["Derivada de \\(\\cos t\\) es \\(-\\sin t\\).", "El semieje \\(a\\) es constante.", "No olvides el \\(dt\\)."], "answerLatex": "dx=-a\\sin t\\,dt", "explanation": "\\(x'(t)=-a\\sin t\\), luego \\(dx=-a\\sin t\\,dt\\)."}, {"prompt": "Calcula \\(dy\\) derivando \\(y=b\\sin t\\).", "hints": ["Derivada de \\(\\sin t\\) es \\(\\cos t\\).", "El semieje \\(b\\) es el factor.", "Multiplica por \\(dt\\)."], "answerLatex": "dy=b\\cos t\\,dt", "explanation": "\\(y'(t)=b\\cos t\\), luego \\(dy=b\\cos t\\,dt\\). Con \\(a=b=R\\) se recupera la circunferencia, como verificación."}], "finalAnswerLatex": "\\vec{r}(t)=(a\\cos t,\\,b\\sin t),\\quad dx=-a\\sin t\\,dt,\\quad dy=b\\cos t\\,dt"}, {"statement": "Parametriza por tramos el rectángulo de vértices \\((0,0)\\), \\((L,0)\\), \\((L,H)\\) y \\((0,H)\\), recorrido en sentido antihorario, e indica \\(dx\\) y \\(dy\\) en cada lado.", "figure": "rectangle", "steps": [{"prompt": "Lado 1 (inferior): de \\((0,0)\\) a \\((L,0)\\). Parametrízalo y di cuánto valen \\(dx\\) y \\(dy\\). Usa un parámetro \\(t\\in[0,1]\\).", "hints": ["Aquí \\(y\\) se mantiene en \\(0\\) todo el tramo: \\(y(t)=0\\).", "\\(x\\) va de \\(0\\) a \\(L\\): \\(x(t)=Lt\\).", "Si \\(y\\) es constante, \\(dy=0\\); y \\(dx=x'(t)\\,dt\\)."], "answerLatex": "\\vec r(t)=(Lt,\\,0),\\quad dx=L\\,dt,\\quad dy=0", "explanation": "En el lado inferior la altura es constante (\\(y=0\\)), por eso \\(dy=0\\). Solo avanza \\(x\\), con \\(dx=L\\,dt\\)."}, {"prompt": "Lado 2 (derecho): de \\((L,0)\\) a \\((L,H)\\). Parametrízalo con \\(t\\in[0,1]\\) y da \\(dx\\), \\(dy\\).", "hints": ["Ahora \\(x\\) se queda fijo en \\(L\\): \\(x(t)=L\\).", "\\(y\\) sube de \\(0\\) a \\(H\\): \\(y(t)=Ht\\).", "Si \\(x\\) es constante, \\(dx=0\\)."], "answerLatex": "\\vec r(t)=(L,\\,Ht),\\quad dx=0,\\quad dy=H\\,dt", "explanation": "En el lado derecho \\(x=L\\) es constante, de modo que \\(dx=0\\) y solo cambia \\(y\\), con \\(dy=H\\,dt\\)."}, {"prompt": "Lado 3 (superior): de \\((L,H)\\) a \\((0,H)\\). Ojo con el sentido: \\(x\\) ahora DECRECE. Da la parametrización y \\(dx\\), \\(dy\\).", "hints": ["La altura es constante \\(y=H\\), así que \\(dy=0\\).", "\\(x\\) va de \\(L\\) a \\(0\\): \\(x(t)=L-Lt=L(1-t)\\).", "Como \\(x\\) decrece, su derivada es negativa: \\(dx=-L\\,dt\\)."], "answerLatex": "\\vec r(t)=(L(1-t),\\,H),\\quad dx=-L\\,dt,\\quad dy=0", "explanation": "En el lado superior \\(y=H\\) es constante (\\(dy=0\\)) y \\(x\\) retrocede de \\(L\\) a \\(0\\), por eso \\(dx=-L\\,dt\\). El signo negativo refleja que vamos hacia la izquierda."}, {"prompt": "Lado 4 (izquierdo): de \\((0,H)\\) a \\((0,0)\\). Da la parametrización y \\(dx\\), \\(dy\\), cerrando el recorrido.", "hints": ["Ahora \\(x=0\\) constante, luego \\(dx=0\\).", "\\(y\\) baja de \\(H\\) a \\(0\\): \\(y(t)=H(1-t)\\).", "Como \\(y\\) decrece, \\(dy=-H\\,dt\\)."], "answerLatex": "\\vec r(t)=(0,\\,H(1-t)),\\quad dx=0,\\quad dy=-H\\,dt", "explanation": "En el lado izquierdo \\(x=0\\) es constante (\\(dx=0\\)) e \\(y\\) baja de \\(H\\) a \\(0\\), por eso \\(dy=-H\\,dt\\). Al terminar volvemos a \\((0,0)\\): la curva es cerrada y simple, recorrida en sentido antihorario."}], "finalAnswerLatex": "\\text{Lado 1: }(Lt,0),\\ dx=L\\,dt,\\ dy=0;\\quad \\text{Lado 2: }(L,Ht),\\ dx=0,\\ dy=H\\,dt;\\quad \\text{Lado 3: }(L(1-t),H),\\ dx=-L\\,dt,\\ dy=0;\\quad \\text{Lado 4: }(0,H(1-t)),\\ dx=0,\\ dy=-H\\,dt"}], "widget": "parametric-plotter", "keyTakeaways": ["Una curva paramétrica \\(\\vec{r}(t)=(x(t),y(t))\\) describe la trayectoria de un punto: el parámetro \\(t\\) actúa como tiempo y su sentido CRECIENTE fija la orientación del recorrido.", "Curva CERRADA: \\(\\vec r(a)=\\vec r(b)\\). Curva SIMPLE: sin autointersecciones (\\(\\vec r\\) inyectiva). Ambas juntas forman una curva de Jordan, que encierra una región con dentro y afuera: es la frontera que recorre el planímetro.", "Los diferenciales se obtienen derivando: \\(dx=x'(t)\\,dt\\) y \\(dy=y'(t)\\,dt\\). El vector \\((dx,dy)\\) es tangente a la curva, apunta en el sentido del recorrido y su módulo es la rapidez \\(|\\vec r'(t)|\\).", "Parametrizaciones clave (antihorario, \\(t\\in[0,2\\pi]\\)): circunferencia \\((R\\cos t,R\\sin t)\\) y elipse \\((a\\cos t,b\\sin t)\\); la circunferencia es el caso \\(a=b=R\\).", "El rectángulo se parametriza A TROZOS (4 lados); en cada lado una coordenada es constante, así que \\(dx=0\\) o \\(dy=0\\), lo que simplifica las integrales de línea. Todos estos \\(dx,dy\\) son los que entrarán en \\(A=\\frac{1}{2}\\oint x\\,dy-y\\,dx\\)."]}, {"id": "modulo-4-integrales-de-linea-orientacion", "title": "Integrales de línea y orientación", "subtitle": "Cómo el planímetro convierte un recorrido por la frontera en un número, y por qué el sentido del giro importa", "icon": "🧭", "theory": [{"type": "paragraph", "content": "Una integral de línea de un campo vectorial \\(\\vec F=(P,Q)\\) a lo largo de una curva \\(\\gamma\\) suma, a lo largo del recorrido, la componente del campo que va en la dirección del movimiento. Es exactamente lo que hace el planímetro: mientras la punta recorre la frontera de la figura, su rueda integra mecánicamente una cantidad que depende de hacia dónde te mueves en cada instante. Por eso necesitamos entender bien qué es esta integral y cómo se calcula."}, {"type": "formula", "content": "\\int_\\gamma \\vec F\\cdot d\\vec r=\\int_\\gamma P\\,dx+Q\\,dy", "caption": "Las dos notaciones equivalentes: producto escalar del campo con el diferencial de posición, y su forma desarrollada \\(P\\,dx+Q\\,dy\\)."}, {"type": "paragraph", "content": "Para calcularla en la práctica usamos una parametrización \\(\\vec r(t)=(x(t),y(t))\\) con \\(t\\in[a,b]\\). Como \\(dx=x'(t)\\,dt\\) y \\(dy=y'(t)\\,dt\\), todo el integrando se reescribe en función de \\(t\\) y la integral de línea se vuelve una integral ordinaria de una variable que ya sabes resolver."}, {"type": "formula", "content": "\\int_\\gamma P\\,dx+Q\\,dy=\\int_a^b\\Big(P(\\vec r(t))\\,x'(t)+Q(\\vec r(t))\\,y'(t)\\Big)\\,dt", "caption": "Receta de cálculo: sustituye \\(x(t),y(t)\\) en \\(P\\) y \\(Q\\), multiplica por las derivadas y integra en \\(t\\)."}, {"type": "paragraph", "content": "El símbolo \\(\\oint\\) se usa cuando \\(\\gamma\\) es una curva cerrada (vuelve al punto de partida). Para una curva cerrada simple que encierra una región (una curva de Jordan), fijamos una convención de recorrido: la orientación positiva \\(\\gamma^+\\) es la antihoraria, aquella en la que la región encerrada queda siempre a tu izquierda. La orientación negativa \\(\\gamma^-\\) es la horaria."}, {"type": "callout", "content": "Orientación = sentido del recorrido. Antihorario es positivo \\((\\gamma^+)\\); horario es negativo \\((\\gamma^-)\\). Esta convención no es un capricho: es la que hace que el Teorema de Green dé el área con signo positivo y la que explica que el planímetro dé lectura positiva al rodear la figura en sentido antihorario."}, {"type": "paragraph", "content": "La propiedad más importante de esta sección es cómo responde la integral al invertir el recorrido. Si \\(-\\gamma\\) es la misma curva recorrida en sentido contrario, en cada instante te mueves en dirección opuesta, de modo que \\(dx\\) y \\(dy\\) cambian de signo y la integral entera cambia de signo:"}, {"type": "formula", "content": "\\int_{-\\gamma}\\vec F\\cdot d\\vec r=-\\int_{\\gamma}\\vec F\\cdot d\\vec r", "caption": "Invertir la orientación invierte el signo de la integral de línea."}, {"type": "paragraph", "content": "Físicamente, esto es justo lo que ves en el planímetro: recorrer la frontera en sentido horario en vez de antihorario no cambia el área de la figura, pero sí cambia el signo de la lectura del instrumento. El número que entrega es \\(\\pm\\) área, y el signo te dice en qué sentido giraste."}], "guidedDerivation": {"title": "Cálculo de \\(\\oint_\\gamma x\\,dy\\) sobre la circunferencia de radio \\(R\\) (antihorario)", "intro": "Vamos a calcular paso a paso la integral de línea \\(\\oint_\\gamma x\\,dy\\) sobre la circunferencia de radio \\(R\\) centrada en el origen, recorrida en sentido antihorario. Esta es exactamente la elección de campo \\(P=0,\\ Q=x\\) del Teorema de Green, así que el resultado debe coincidir con el área del círculo, \\(\\pi R^2\\). Sigue cada paso intentándolo tú primero.", "steps": [{"prompt": "Escribe una parametrización \\(\\vec r(t)=(x(t),y(t))\\) de la circunferencia de radio \\(R\\) centrada en el origen, recorrida en sentido antihorario, indicando el intervalo de \\(t\\).", "hints": ["Recuerda que los puntos de una circunferencia de radio \\(R\\) cumplen \\(x=R\\cos t\\), \\(y=R\\sin t\\).", "El sentido antihorario corresponde a que \\(t\\) crezca desde \\(0\\).", "Para dar una vuelta completa, \\(t\\) recorre un intervalo de longitud \\(2\\pi\\)."], "revealLatex": "\\vec r(t)=(R\\cos t,\\ R\\sin t),\\qquad t\\in[0,2\\pi]", "explanation": "Con \\(t\\) creciendo de \\(0\\) a \\(2\\pi\\), el punto parte de \\((R,0)\\) y gira en sentido antihorario, dando exactamente una vuelta. Esta es la orientación positiva \\(\\gamma^+\\)."}, {"prompt": "Identifica lo que necesitas del integrando \\(x\\,dy\\): el valor \\(x(t)\\) y el diferencial \\(dy=y'(t)\\,dt\\).", "hints": ["El campo es \\(P=0,\\ Q=x\\), así que solo necesitas \\(x(t)\\) evaluado y el diferencial \\(dy\\).", "Deriva \\(y(t)=R\\sin t\\) respecto de \\(t\\).", "La derivada de \\(\\sin t\\) es \\(\\cos t\\)."], "revealLatex": "x(t)=R\\cos t,\\qquad dy=y'(t)\\,dt=R\\cos t\\,dt", "explanation": "Como \\(P=0\\), el término \\(P\\,dx\\) desaparece y solo sobrevive \\(Q\\,dy=x\\,dy\\). Necesitamos \\(x(t)=R\\cos t\\) y \\(dy=R\\cos t\\,dt\\)."}, {"prompt": "Sustituye en \\(\\oint_\\gamma x\\,dy\\) para obtener una integral ordinaria en \\(t\\) sobre \\([0,2\\pi]\\).", "hints": ["Reemplaza \\(x\\) por \\(x(t)\\) y \\(dy\\) por \\(y'(t)\\,dt\\).", "Te queda el producto \\((R\\cos t)(R\\cos t)\\).", "No olvides los límites \\(0\\) y \\(2\\pi\\)."], "revealLatex": "\\oint_\\gamma x\\,dy=\\int_0^{2\\pi}(R\\cos t)(R\\cos t)\\,dt=R^2\\int_0^{2\\pi}\\cos^2 t\\,dt", "explanation": "Al sustituir, la integral de línea se convierte en una integral de una sola variable: \\(R^2\\int_0^{2\\pi}\\cos^2 t\\,dt\\)."}, {"prompt": "Resuelve \\(\\int_0^{2\\pi}\\cos^2 t\\,dt\\).", "hints": ["Usa la identidad de reducción \\(\\cos^2 t=\\tfrac{1+\\cos 2t}{2}\\).", "La integral de \\(\\cos 2t\\) sobre un periodo completo \\([0,2\\pi]\\) se anula.", "Solo sobrevive la parte constante \\(\\tfrac12\\) integrada sobre un intervalo de longitud \\(2\\pi\\)."], "revealLatex": "\\int_0^{2\\pi}\\cos^2 t\\,dt=\\int_0^{2\\pi}\\frac{1+\\cos 2t}{2}\\,dt=\\frac{1}{2}\\cdot 2\\pi=\\pi", "explanation": "El término \\(\\cos 2t\\) integra a cero sobre el periodo completo; queda \\(\\tfrac12\\cdot(2\\pi)=\\pi\\)."}, {"prompt": "Junta todo y escribe el resultado final de \\(\\oint_\\gamma x\\,dy\\).", "hints": ["Multiplica el \\(R^2\\) que sacaste por el valor \\(\\pi\\) de la integral.", "Compara con el área de un círculo de radio \\(R\\).", "Debe coincidir con \\(\\pi R^2\\)."], "revealLatex": "\\oint_\\gamma x\\,dy=R^2\\cdot\\pi=\\pi R^2", "explanation": "El resultado es \\(\\pi R^2\\), exactamente el área del círculo de radio \\(R\\). Esto confirma la fórmula de Green con \\(P=0,\\ Q=x\\): \\(A=\\oint_\\gamma x\\,dy\\). El planímetro, al rodear la circunferencia en sentido antihorario, integra justamente esta cantidad y entrega \\(+\\pi R^2\\)."}]}, "conceptual":
