<script>
"use strict";
/* ============================================================ helpers */
const $ = (s,r)=> (r||document).querySelector(s);
const el = (t,c,txt)=>{const e=document.createElement(t); if(c)e.className=c; if(txt!=null)e.textContent=txt; return e;};
function escapeHTML(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function md(s){ // tiny markdown-lite over already math-delimited text
  let h = escapeHTML(s);
  h = h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  h = h.replace(/`([^`]+?)`/g,'<code>$1</code>');
  return h;
}
function typeset(node){
  if(window.MathJax && MathJax.typesetPromise){
    try{ if(MathJax.typesetClear) MathJax.typesetClear([node]); }catch(e){}
    return MathJax.typesetPromise([node]).catch(()=>{});
  }
  return Promise.resolve();
}
function dispLatex(latex){ // display formula node
  const d = el('div','formula');
  const span = el('span'); span.textContent = '\\[' + (latex||'') + '\\]';
  d.appendChild(span);
  return d;
}
function inlineLatexText(text){ // returns element whose innerHTML is md(text) (math kept for MathJax)
  const e = el('div'); e.innerHTML = md(text); return e;
}

/* ============================================================ state */
const MODULES = (window.MODULES_DATA && window.MODULES_DATA.length) ? window.MODULES_DATA : [];
const LS_PROG='planim_prog_v1', LS_THEME='planim_theme_v1', LS_LAST='planim_last_v1';
let progress = new Set();
try{ progress = new Set(JSON.parse(localStorage.getItem(LS_PROG)||'[]')); }catch(e){}
let current = 0;
try{ const l=parseInt(localStorage.getItem(LS_LAST)); if(!isNaN(l)) current=l; }catch(e){}
function saveProg(){ try{localStorage.setItem(LS_PROG, JSON.stringify([...progress]));}catch(e){} }

const contentEl = $('#content'), navList = $('#navList');
window.__retypeset = ()=> typeset(contentEl);

/* ============================================================ nav */
function renderNav(){
  navList.innerHTML='';
  MODULES.forEach((m,i)=>{
    const it = el('div','navItem'+(i===current?' active':'')+(progress.has(m.id)?' done':''));
    it.innerHTML = `<span class="ic">${m.icon||'•'}</span><span class="nm">${escapeHTML(m.title)}<small>${escapeHTML(m.subtitle||'')}</small></span><span class="chk">✓</span>`;
    it.onclick=()=>{ go(i); closeDrawer(); };
    navList.appendChild(it);
  });
  const pct = MODULES.length? Math.round(100*progress.size/MODULES.length):0;
  $('#progFill').style.width=pct+'%'; $('#progTxt').textContent=pct+'%';
}

/* ============================================================ render module */
function go(i){ current=Math.max(0,Math.min(MODULES.length-1,i)); try{localStorage.setItem(LS_LAST,current);}catch(e){} renderModule(); renderNav(); window.scrollTo({top:0,behavior:'smooth'}); }

function sectionWrap(titleHTML){
  const s=el('section','section'); const t=el('div','stitle'); t.innerHTML=titleHTML; s.appendChild(t); return s;
}

function renderModule(){
  const m=MODULES[current]; if(!m){ contentEl.innerHTML='<p style="color:var(--muted)">Cargando contenido…</p>'; return; }
  contentEl.innerHTML='';
  // head
  const head=el('div','mhead');
  head.innerHTML=`<div class="kick">Módulo ${current+1} de ${MODULES.length}</div>
    <h1><span class="e">${m.icon||''}</span>${escapeHTML(m.title)}</h1><p>${escapeHTML(m.subtitle||'')}</p>`;
  contentEl.appendChild(head);

  // theory
  if(m.theory && m.theory.length){
    const s=sectionWrap('📖 Teoría'); const card=el('div','card');
    m.theory.forEach(b=>{
      if(b.type==='formula'){ card.appendChild(dispLatex(b.content)); if(b.caption){const c=el('span','cap');c.innerHTML=md(b.caption);card.lastChild.appendChild(c);} }
      else if(b.type==='callout'){ const c=el('div','callout'); c.innerHTML=md(b.content); card.appendChild(c); }
      else { const p=el('div','para'); p.innerHTML=md(b.content); card.appendChild(p); }
    });
    s.appendChild(card); contentEl.appendChild(s);
  }

  // widget
  if(m.widget && m.widget!=='none' && WIDGETS[m.widget]){
    const s=sectionWrap('🧪 Explora'); const w=el('div','widget');
    s.appendChild(w); contentEl.appendChild(s);
    try{ WIDGETS[m.widget](w); }catch(e){ w.innerHTML='<p style="color:var(--muted)">Widget no disponible.</p>'; console.error(e); }
  }

  // guided derivation
  if(m.guidedDerivation){
    const gd=m.guidedDerivation;
    const s=sectionWrap('✍️ '+escapeHTML(gd.title||'Deducción guiada'));
    if(gd.intro){ const p=el('div','card'); p.innerHTML=md(gd.intro); s.appendChild(p); }
    (gd.steps||[]).forEach((st,idx)=> s.appendChild(stepCard(st,idx,'deriv')) );
    contentEl.appendChild(s);
  }

  // exercises
  if(m.exercises && m.exercises.length){
    const s=sectionWrap('📝 Ejercicios paso a paso');
    m.exercises.forEach((ex,ei)=>{
      const card=el('div','card');
      const stm=el('div','para'); stm.innerHTML='<strong>Ejercicio '+(ei+1)+'.</strong> '+md(ex.statement); card.appendChild(stm);
      (ex.steps||[]).forEach((st,si)=> card.appendChild(stepCard(st,si,'ex')) );
      if(ex.finalAnswerLatex){
        const fa=el('div','finalans'); fa.innerHTML='<span class="lab">✅ Resultado</span>';
        fa.appendChild(dispLatex(ex.finalAnswerLatex)); card.appendChild(fa);
      }
      s.appendChild(card);
    });
    contentEl.appendChild(s);
  }

  // conceptual
  if(m.conceptual && m.conceptual.length){
    const s=sectionWrap('🧠 Preguntas conceptuales');
    m.conceptual.forEach((q,qi)=> s.appendChild(quizCard(q,qi)) );
    contentEl.appendChild(s);
  }

  // takeaways
  if(m.keyTakeaways && m.keyTakeaways.length){
    const s=sectionWrap('⭐ Ideas clave'); const ul=el('ul','takeaways');
    m.keyTakeaways.forEach(t=>{ const li=el('li'); li.innerHTML=md(t); ul.appendChild(li); });
    s.appendChild(ul); contentEl.appendChild(s);
  }

  // mark done + footer nav
  const done=progress.has(m.id);
  const mk=el('button','btn primary markdone', done?'✓ Repasado — ¡bien!':'Marcar este módulo como repasado');
  mk.onclick=()=>{ if(progress.has(m.id))progress.delete(m.id); else progress.add(m.id); saveProg(); renderNav(); renderModule(); window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'}); };
  contentEl.appendChild(mk);

  const fn=el('div','fnav');
  const prev=el('button','btn ghost','← Anterior'); prev.disabled=current===0; prev.onclick=()=>go(current-1);
  const next=el('button','btn','Siguiente →'); next.disabled=current===MODULES.length-1; next.onclick=()=>go(current+1);
  fn.appendChild(prev); fn.appendChild(next); contentEl.appendChild(fn);

  typeset(contentEl);
}

/* ---- step card (guided + exercise) with progressive hints + reveal ---- */
function stepCard(st,idx,kind){
  const c=el('div','step');
  const qn=el('div','qn');
  qn.appendChild(el('div','badge', String(idx+1)));
  const pr=el('div'); pr.className='prompt'; pr.innerHTML=md(st.prompt); qn.appendChild(pr);
  c.appendChild(qn);

  const hints=st.hints||[]; let shown=0;
  const hb=el('div','hintbox');
  const ctrls=el('div','row'); ctrls.style.marginTop='10px';
  const hintBtn=el('button','btn sm ghost', hints.length?'💡 Pista':'');
  const revBtn=el('button','btn sm', kind==='ex'?'Ver solución del paso':'Ver paso');
  if(hints.length) ctrls.appendChild(hintBtn); ctrls.appendChild(revBtn);
  c.appendChild(ctrls); c.appendChild(hb);

  hintBtn.onclick=()=>{
    if(shown>=hints.length) return;
    const h=el('div','hint'); h.innerHTML='<span class="lab">Pista '+(shown+1)+'</span>'+md(hints[shown]); hb.appendChild(h); typeset(h);
    shown++;
    if(shown>=hints.length){ hintBtn.textContent='No hay más pistas'; hintBtn.disabled=true; }
  };

  const rev=el('div','reveal');
  const ans=el('div','ans'); ans.appendChild(dispLatex(st.revealLatex!=null?st.revealLatex:st.answerLatex||''));
  rev.appendChild(ans);
  if(st.explanation){ const ex=el('div','exp'); ex.innerHTML=md(st.explanation); rev.appendChild(ex); }
  c.appendChild(rev);
  revBtn.onclick=()=>{ const open=rev.classList.toggle('show'); revBtn.textContent= open?'Ocultar':(kind==='ex'?'Ver solución del paso':'Ver paso'); if(open) typeset(rev); };
  return c;
}

/* ---- quiz card ---- */
function quizCard(q,qi){
  const c=el('div','quiz');
  const qq=el('div','q'); qq.innerHTML='<strong>'+(qi+1)+'.</strong> '+md(q.question); c.appendChild(qq);
  const exp=el('div','qexp'); exp.innerHTML='<span class="lab">Explicación</span>'+md(q.explanation||'');
  let answered=false;
  (q.options||[]).forEach(o=>{
    const op=el('div','opt');
    op.innerHTML='<span class="mk"></span><div><div class="otext"></div><div class="fb"></div></div>';
    $('.otext',op).innerHTML=md(o.text); $('.fb',op).innerHTML=md(o.feedback||'');
    op.onclick=()=>{
      if(answered && o.correct===false) { return; }
      // allow exploring: lock only the act of marking; we lock after first pick
      if(answered) return;
      answered=true;
      [...c.querySelectorAll('.opt')].forEach(x=>x.classList.add('locked'));
      // mark all correct ones
      (q.options||[]).forEach((oo,k)=>{ const node=c.querySelectorAll('.opt')[k];
        if(oo.correct){ node.classList.add('correct'); node.querySelector('.mk').textContent='✓'; }
      });
      if(!o.correct){ op.classList.add('wrong'); op.querySelector('.mk').textContent='✕'; }
      op.classList.add('show-fb');
      // also show feedback of the correct one
      (q.options||[]).forEach((oo,k)=>{ if(oo.correct){ c.querySelectorAll('.opt')[k].classList.add('show-fb'); }});
      exp.classList.add('show'); typeset(c);
    };
    c.appendChild(op);
  });
  c.appendChild(exp);
  return c;
}

/* ============================================================ canvas util */
function setupCanvas(host,height){
  const cv=el('canvas','wcanvas'); cv.style.height=height+'px'; host.appendChild(cv);
  const ctx=cv.getContext('2d');
  function size(){ const dpr=window.devicePixelRatio||1; const w=cv.clientWidth||300, h=cv.clientHeight||height;
    cv.width=Math.round(w*dpr); cv.height=Math.round(h*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); return {w,h,ctx}; }
  return {cv,ctx,size};
}
function cssVar(n){ return getComputedStyle(document.documentElement).getPropertyValue(n).trim()||'#888'; }
function whead(host,title,tag){ const h=el('div','whead'); h.innerHTML=`<span>${title}</span>`+(tag?`<span class="tag">${tag}</span>`:''); host.appendChild(h); }
function ctrlRow(host){ const r=el('div','wctrls'); host.appendChild(r); return r; }
function rangeField(label, min,max,val,step,oninput){
  const f=el('label','field'); const sp=el('span'); sp.textContent=label;
  const inp=el('input'); inp.type='range'; inp.min=min;inp.max=max;inp.value=val;inp.step=step;
  const out=el('b'); out.textContent=(+val).toFixed(step<1?2:0);
  inp.oninput=()=>{ out.textContent=(+inp.value).toFixed(step<1?2:0); oninput(+inp.value); };
  f.appendChild(sp); f.appendChild(inp); f.appendChild(out); return {f,inp,out};
}
function segmented(host,opts,initial,onpick){
  const s=el('div','seg'); opts.forEach((o,i)=>{ const b=el('button',i===initial?'on':'',o.label);
    b.onclick=()=>{ [...s.children].forEach(c=>c.classList.remove('on')); b.classList.add('on'); onpick(o.value,i); };
    s.appendChild(b); }); host.appendChild(s); return s;
}

/* ============================================================ WIDGETS */
const WIDGETS={};

/* ---- 1. Double integral: region + Tipo I/II strips ---- */
WIDGETS['double-integral']=function(host){
  whead(host,'Área como integral doble','∬ 1 dA');
  const {cv,ctx,size}=setupCanvas(host,320);
  const readout=el('div','readout'); host.appendChild(readout);
  const ctr=ctrlRow(host);
  let region='curvas', tipo='I';
  const regions={
    curvas:{name:'Entre y=x y y=x²', xr:[0,1], yr:[-0.15,1.15],
      lo:x=>x*x, hi:x=>x, xL:y=>y, xR:y=>Math.sqrt(y), yr2:[0,1],
      area:'\\dfrac{1}{6}'},
    tri:{name:'Triángulo (0,0)(1,0)(1,1)', xr:[0,1], yr:[-0.15,1.15],
      lo:x=>0, hi:x=>x, xL:y=>y, xR:y=>1, yr2:[0,1], area:'\\dfrac{1}{2}'},
    rect:{name:'Rectángulo [0,1.4]×[0,0.9]', xr:[0,1.5], yr:[-0.15,1.1],
      lo:x=>0, hi:x=> (x<=1.4?0.9:0), hi2:0.9, xmax:1.4, xL:y=>0, xR:y=>1.4, yr2:[0,0.9], area:'1.26'}
  };
  segmented(ctr,[{label:'y=x / y=x²',value:'curvas'},{label:'Triángulo',value:'tri'},{label:'Rectángulo',value:'rect'}],0,v=>{region=v;draw();});
  const seg2=el('div','seg'); ctr.appendChild(seg2);
  segmented(seg2,[{label:'Tipo I (▮ vertical)',value:'I'},{label:'Tipo II (▬ horizontal)',value:'II'}],0,v=>{tipo=v;draw();});
  let strip=0.5; const sf=rangeField('Franja',0.02,0.98,0.5,0.01,v=>{strip=v;draw();}); ctr.appendChild(sf.f);

  function draw(){
    const {w,h}=size(); ctx.clearRect(0,0,w,h);
    const R=regions[region]; const pad=38;
    const xr=R.xr, yr=R.yr;
    const sx=x=> pad + (x-xr[0])/(xr[1]-xr[0])*(w-pad-14);
    const sy=y=> (h-pad) - (y-yr[0])/(yr[1]-yr[0])*(h-pad-14);
    // axes
    ctx.strokeStyle=cssVar('--border'); ctx.lineWidth=1; ctx.beginPath();
    ctx.moveTo(sx(xr[0]),sy(0)); ctx.lineTo(sx(xr[1]),sy(0));
    ctx.moveTo(sx(0),sy(yr[0])); ctx.lineTo(sx(0),sy(yr[1])); ctx.stroke();
    ctx.fillStyle=cssVar('--muted'); ctx.font='12px system-ui'; ctx.fillText('x',w-14,sy(0)-6); ctx.fillText('y',sx(0)+6,16);
    // region fill via sampling columns
    const N=160; ctx.fillStyle='color-mix(in srgb,'+cssVar('--accent2')+' 22%, transparent)';
    ctx.beginPath(); let started=false;
    const xmaxR = R.xmax!=null? R.xmax : xr[1];
    for(let i=0;i<=N;i++){ const x=xr[0]+(xmaxR-xr[0])*i/N; const y=R.hi(x); const px=sx(x),py=sy(y); if(!started){ctx.moveTo(sx(xr[0]),sy(R.hi(xr[0])));started=true;} ctx.lineTo(px,py); }
    for(let i=N;i>=0;i--){ const x=xr[0]+(xmaxR-xr[0])*i/N; ctx.lineTo(sx(x),sy(R.lo(x))); }
    ctx.closePath(); ctx.fill();
    // boundary curves
    ctx.lineWidth=2.4;
    ctx.strokeStyle=cssVar('--accent'); ctx.beginPath();
    for(let i=0;i<=N;i++){const x=xr[0]+(xmaxR-xr[0])*i/N; (i?ctx.lineTo:ctx.moveTo).call(ctx,sx(x),sy(R.hi(x)));} ctx.stroke();
    ctx.strokeStyle=cssVar('--accent3'); ctx.beginPath();
    for(let i=0;i<=N;i++){const x=xr[0]+(xmaxR-xr[0])*i/N; (i?ctx.lineTo:ctx.moveTo).call(ctx,sx(x),sy(R.lo(x)));} ctx.stroke();
    // strips
    ctx.fillStyle='color-mix(in srgb,'+cssVar('--accent')+' 32%, transparent)';
    ctx.strokeStyle=cssVar('--accent');
    if(tipo==='I'){
      const x=xr[0]+(xmaxR-xr[0])*strip; const lo=R.lo(x), hi=R.hi(x);
      ctx.lineWidth=2; const wpx=Math.max(6,(w-pad-14)/(xr[1]-xr[0])*(xmaxR-xr[0])/30);
      ctx.fillRect(sx(x)-wpx/2, sy(hi), wpx, sy(lo)-sy(hi));
      ctx.beginPath(); ctx.moveTo(sx(x),sy(lo)); ctx.lineTo(sx(x),sy(hi)); ctx.stroke();
      readout.innerHTML=`<b>Tipo I:</b> fijas \\(x\\), integras en \\(y\\) de la curva de abajo a la de arriba, y barres \\(x\\).<br>
      \\(\\displaystyle A=\\int_{${R.xr[0]}}^{${R.xmax!=null?R.xmax:R.xr[1]}}\\!\\!\\int_{y_{inf}(x)}^{y_{sup}(x)}1\\,dy\\,dx=${R.area}\\)`;
    } else {
      const yr2=R.yr2; const y=yr2[0]+(yr2[1]-yr2[0])*strip; const xl=R.xL(y), xr_=R.xR(y);
      ctx.lineWidth=2; const hpx=Math.max(6,(h-pad-14)/(yr[1]-yr[0])*(yr2[1]-yr2[0])/30);
      ctx.fillRect(sx(xl), sy(y)-hpx/2, sx(xr_)-sx(xl), hpx);
      ctx.beginPath(); ctx.moveTo(sx(xl),sy(y)); ctx.lineTo(sx(xr_),sy(y)); ctx.stroke();
      readout.innerHTML=`<b>Tipo II:</b> fijas \\(y\\), integras en \\(x\\) de la frontera izquierda a la derecha, y barres \\(y\\).<br>
      \\(\\displaystyle A=\\int_{${yr2[0]}}^{${yr2[1]}}\\!\\!\\int_{x_{izq}(y)}^{x_{der}(y)}1\\,dx\\,dy=${R.area}\\)`;
    }
    typeset(readout);
  }
  requestAnimationFrame(draw);
  window.addEventListener('resize',()=>requestAnimationFrame(draw));
};

/* ---- 2. Polar Jacobian: r dr dθ cell ---- */
WIDGETS['polar-jacobian']=function(host){
  whead(host,'El Jacobiano en polares','dA = r·dr·dθ');
  const {cv,ctx,size}=setupCanvas(host,330);
  const readout=el('div','readout'); host.appendChild(readout);
  const ctr=ctrlRow(host);
  let r=1.6, dr=0.5, dth=0.45;
  ctr.appendChild(rangeField('r',0.4,2.6,r,0.01,v=>{r=v;draw();}).f);
  ctr.appendChild(rangeField('dr',0.15,0.9,dr,0.01,v=>{dr=v;draw();}).f);
  ctr.appendChild(rangeField('dθ',0.15,0.9,dth,0.01,v=>{dth=v;draw();}).f);
  function draw(){
    const {w,h}=size(); ctx.clearRect(0,0,w,h);
    const cx=w*0.5, cy=h*0.94, S=Math.min(w,h*2)/3.2;
    const PX=v=>v*S;
    // polar grid
    ctx.strokeStyle=cssVar('--border'); ctx.lineWidth=1;
    for(let rr=0.5;rr<=3;rr+=0.5){ ctx.beginPath(); ctx.arc(cx,cy,PX(rr),Math.PI,2*Math.PI); ctx.stroke(); }
    for(let a=0;a<=8;a++){ const ang=Math.PI+ (Math.PI)*a/8; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+PX(3)*Math.cos(ang),cy+PX(3)*Math.sin(ang)); ctx.stroke(); }
    // angle base (measure from +x going up = -y screen). Use ang0
    const a0=0.6; const a1=a0+dth;
    function pt(rr,ang){ return [cx+PX(rr)*Math.cos(-ang), cy-PX(rr)*Math.sin(ang)]; }
    // cell (annular sector) between r..r+dr, a0..a1
    ctx.beginPath();
    let p=pt(r,a0); ctx.moveTo(p[0],p[1]);
    for(let t=0;t<=1;t+=0.05){ p=pt(r,a0+(a1-a0)*t); ctx.lineTo(p[0],p[1]); }
    for(let t=0;t<=1;t+=0.05){ p=pt(r+dr,a1-(a1-a0)*t); ctx.lineTo(p[0],p[1]); }
    ctx.closePath();
    ctx.fillStyle='color-mix(in srgb,'+cssVar('--accent2')+' 34%, transparent)';
    ctx.strokeStyle=cssVar('--accent2'); ctx.lineWidth=2.2; ctx.fill(); ctx.stroke();
    // label sides
    const mAng=(a0+a1)/2;
    const pa=pt(r+dr+0.18,mAng); ctx.fillStyle=cssVar('--accent2'); ctx.font='13px system-ui';
    ctx.fillText('arco ≈ r·dθ', pa[0]-30, pa[1]-4);
    const pb=pt(r+dr/2, a0-0.12); ctx.fillStyle=cssVar('--accent'); ctx.fillText('dr', pb[0]+4, pb[1]+4);
    // exact cell area = 0.5*((r+dr)^2 - r^2)*dth ; approx = r*dr*dth
    const exact=0.5*((r+dr)*(r+dr)-r*r)*dth, approx=r*dr*dth;
    readout.innerHTML=`La celda polar tiene lados \\(dr\\) y arco \\(r\\,d\\theta\\) ⇒ su área es \\(\\approx r\\,dr\\,d\\theta\\).<br>
    <b>r·dr·dθ</b> = <span class="big">${approx.toFixed(3)}</span> &nbsp; (área exacta del sector: ${exact.toFixed(3)})<br>
    Sube <b>r</b> con \\(dr,d\\theta\\) fijos: la celda <b>crece</b> — por eso el factor <b>r</b> no puede faltar.`;
    typeset(readout);
  }
  requestAnimationFrame(draw); window.addEventListener('resize',()=>requestAnimationFrame(draw));
};

/* ---- 3. Parametric plotter ---- */
WIDGETS['parametric-plotter']=function(host){
  whead(host,'Curvas paramétricas y diferenciales','r(t)=(x,y)');
  const {cv,ctx,size}=setupCanvas(host,330);
  const readout=el('div','readout'); host.appendChild(readout);
  const ctr=ctrlRow(host);
  let shape='circle', R=2, a=2.4, b=1.4, w_=2.6, hh_=1.6, t=1.2, playing=false;
  const seg=el('div','seg'); ctr.appendChild(seg);
  segmented(seg,[{label:'Circunferencia',value:'circle'},{label:'Elipse',value:'ellipse'},{label:'Rectángulo',value:'rect'}],0,v=>{shape=v;t=0.0001;draw();});
  const tf=rangeField('t',0,1,0.19,0.001,v=>{t=v*tEnd();draw();}); ctr.appendChild(tf.f);
  const playBtn=el('button','btn sm','▶ Animar'); ctr.appendChild(playBtn);
  playBtn.onclick=()=>{ playing=!playing; playBtn.textContent=playing?'⏸ Pausa':'▶ Animar'; if(playing) loop(); };
  function tEnd(){ return shape==='rect'? 4 : 2*Math.PI; }
  function P(tt){
    if(shape==='circle') return [R*Math.cos(tt), R*Math.sin(tt), -R*Math.sin(tt), R*Math.cos(tt)];
    if(shape==='ellipse') return [a*Math.cos(tt), b*Math.sin(tt), -a*Math.sin(tt), b*Math.cos(tt)];
    // rectangle param by side 0..4 (counterclockwise), corners (±w,±h)
    const s=((tt%4)+4)%4; const W=w_, H=hh_;
    if(s<1) return [ -W+2*W*s, -H, 2*W, 0];
    if(s<2) return [ W, -H+2*H*(s-1), 0, 2*H];
    if(s<3) return [ W-2*W*(s-2), H, -2*W, 0];
    return [ -W, H-2*H*(s-3), 0, -2*H];
  }
  function draw(){
    const {w,h}=size(); ctx.clearRect(0,0,w,h);
    const cx=w/2, cy=h/2, S=Math.min(w,h)/6.4; const sx=x=>cx+x*S, sy=y=>cy-y*S;
    // axes
    ctx.strokeStyle=cssVar('--border'); ctx.lineWidth=1; ctx.beginPath();
    ctx.moveTo(0,cy);ctx.lineTo(w,cy);ctx.moveTo(cx,0);ctx.lineTo(cx,h);ctx.stroke();
    // full curve
    ctx.strokeStyle=cssVar('--accent'); ctx.lineWidth=2.4; ctx.beginPath();
    const E=tEnd(); for(let i=0;i<=240;i++){ const tt=E*i/240; const p=P(tt); (i?ctx.lineTo:ctx.moveTo).call(ctx,sx(p[0]),sy(p[1])); } ctx.stroke();
    // traced portion
    ctx.strokeStyle=cssVar('--accent2'); ctx.lineWidth=4; ctx.beginPath();
    for(let i=0;i<=240;i++){ const tt=E*i/240; if(tt>t)break; const p=P(tt); (i?ctx.lineTo:ctx.moveTo).call(ctx,sx(p[0]),sy(p[1])); } ctx.stroke();
    // moving point + tangent (dx,dy)
    const p=P(t); const px=sx(p[0]),py=sy(p[1]);
    let dx=p[2],dy=p[3]; const nrm=Math.hypot(dx,dy)||1; const L=46;
    ctx.strokeStyle=cssVar('--accent3'); ctx.lineWidth=3; ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(px+dx/nrm*L, py-dy/nrm*L); ctx.stroke();
    // arrowhead
    const ax=px+dx/nrm*L, ay=py-dy/nrm*L, ang=Math.atan2(-(dy),dx);
    ctx.fillStyle=cssVar('--accent3'); ctx.beginPath(); ctx.moveTo(ax,ay);
    ctx.lineTo(ax-9*Math.cos(ang-0.4),ay-9*Math.sin(ang-0.4)); ctx.lineTo(ax-9*Math.cos(ang+0.4),ay-9*Math.sin(ang+0.4)); ctx.closePath(); ctx.fill();
    ctx.fillStyle=cssVar('--accent2'); ctx.beginPath(); ctx.arc(px,py,5.5,0,7); ctx.fill();
    // readout
    let param='';
    if(shape==='circle') param=`x=${R}\\cos t,\\; y=${R}\\sin t,\\quad dx=-${R}\\sin t\\,dt,\\; dy=${R}\\cos t\\,dt`;
    else if(shape==='ellipse') param=`x=${a}\\cos t,\\; y=${b}\\sin t,\\quad dx=-${a}\\sin t\\,dt,\\; dy=${b}\\cos t\\,dt`;
    else param=`\\text{4 tramos rectos; en cada lado uno de }dx,dy\\text{ es }0`;
    readout.innerHTML=`Sentido <b>antihorario</b> (t crece). Vector tangente \\((x'(t),y'(t))=(dx,dy)/dt\\) en violeta.<br>
    \\(${param}\\)<br>
    <b>t=${t.toFixed(2)}</b> &nbsp; punto \\((${p[0].toFixed(2)},\\,${p[1].toFixed(2)})\\) &nbsp; \\((dx,dy)\\propto(${dx.toFixed(2)},${dy.toFixed(2)})\\)`;
    typeset(readout);
  }
  function loop(){ if(!playing)return; t+=tEnd()/220; if(t>tEnd())t=0.0001; tf.inp.value=t/tEnd(); tf.out.textContent=(t/tEnd()).toFixed(2); draw(); requestAnimationFrame(loop); }
  requestAnimationFrame(draw); window.addEventListener('resize',()=>requestAnimationFrame(draw));
};

/* ---- 4. Orientation flip: running ½∮(x dy − y dx) ---- */
WIDGETS['orientation-flip']=function(host){
  whead(host,'Orientación y signo del área','½∮ x dy − y dx');
  const {cv,ctx,size}=setupCanvas(host,330);
  const readout=el('div','readout'); host.appendChild(readout);
  const ctr=ctrlRow(host);
  let dir=1, R=2, t=0.0001, playing=true; // dir +1 CCW, -1 CW
  segmented(ctr,[{label:'↺ Antihorario (+)',value:1},{label:'↻ Horario (−)',value:-1}],0,v=>{dir=v;t=0.0001;});
  const playBtn=el('button','btn sm','⏸ Pausa'); ctr.appendChild(playBtn);
  playBtn.onclick=()=>{ playing=!playing; playBtn.textContent=playing?'⏸ Pausa':'▶ Reanudar'; if(playing) loop(); };
  const resetBtn=el('button','btn sm ghost','↺ Reiniciar'); ctr.appendChild(resetBtn); resetBtn.onclick=()=>{t=0.0001;};
  function pos(tt){ const a=dir*tt; return [R*Math.cos(a), R*Math.sin(a)]; }
  function draw(){
    const {w,h}=size(); ctx.clearRect(0,0,w,h);
    const cx=w/2, cy=h/2, S=Math.min(w,h)/6.2; const sx=x=>cx+x*S, sy=y=>cy-y*S;
    ctx.strokeStyle=cssVar('--border'); ctx.lineWidth=1; ctx.beginPath();
    ctx.moveTo(0,cy);ctx.lineTo(w,cy);ctx.moveTo(cx,0);ctx.lineTo(cx,h);ctx.stroke();
    // swept sector fill (triangles from origin)
    ctx.fillStyle='color-mix(in srgb,'+(dir>0?cssVar('--accent2'):cssVar('--bad'))+' 26%, transparent)';
    ctx.beginPath(); ctx.moveTo(sx(0),sy(0));
    for(let i=0;i<=120;i++){ const tt=t*i/120; const p=pos(tt); ctx.lineTo(sx(p[0]),sy(p[1])); } ctx.closePath(); ctx.fill();
    // circle outline
    ctx.strokeStyle=cssVar('--accent'); ctx.lineWidth=2; ctx.beginPath(); ctx.arc(cx,cy,R*S,0,7); ctx.stroke();
    // traced
    ctx.strokeStyle=dir>0?cssVar('--accent2'):cssVar('--bad'); ctx.lineWidth=4; ctx.beginPath();
    for(let i=0;i<=120;i++){ const tt=t*i/120; const p=pos(tt); (i?ctx.lineTo:ctx.moveTo).call(ctx,sx(p[0]),sy(p[1])); } ctx.stroke();
    const p=pos(t); ctx.fillStyle=cssVar('--txt'); ctx.beginPath(); ctx.arc(sx(p[0]),sy(p[1]),6,0,7); ctx.fill();
    // running area = ½∮ = ½ R² * (signed swept angle) = dir * ½R² t
    const area=dir*0.5*R*R*t; const full=dir*Math.PI*R*R;
    readout.innerHTML=`Recorrido <b>${dir>0?'antihorario':'horario'}</b>. El área barrida \\(\\frac12\\int_0^{t}x\\,dy-y\\,dx\\) se acumula:<br>
    valor actual = <span class="big" style="color:${dir>0?cssVar('--accent2'):cssVar('--bad')}">${area.toFixed(2)}</span>
    &nbsp;→ al cerrar: \\(${dir>0?'+':'-'}\\pi R^2=${full.toFixed(2)}\\)<br>
    Horario ⇒ <b>mismo número, signo opuesto</b>. Por eso el planímetro debe ir siempre en el mismo sentido.`;
    typeset(readout);
  }
  function loop(){ if(!playing)return; t+=2*Math.PI/260; if(t>2*Math.PI)t=0.0001; draw(); requestAnimationFrame(loop); }
  requestAnimationFrame(()=>{draw();loop();}); window.addEventListener('resize',()=>requestAnimationFrame(draw));
};

/* ---- 5. Planimeter simulator (star) ---- */
WIDGETS['planimeter-sim']=function(host){
  whead(host,'Simulador del planímetro','traza la frontera con el dedo');
  const {cv,ctx,size}=setupCanvas(host,360);
  const readout=el('div','readout'); host.appendChild(readout);
  const ctr=ctrlRow(host);
  let pts=[]; let drawing=false; let showTri=true; const UNIT=46; // px per "unidad"
  // origin (the "polo") at center
  let O={x:0,y:0};
  const tip=el('div','chip'); tip.textContent='✏️ Mantén presionado y arrastra para dibujar una curva cerrada'; host.appendChild(tip);

  const triBtn=el('button','btn sm','△ Triángulos del barrido: ON'); ctr.appendChild(triBtn);
  triBtn.onclick=()=>{ showTri=!showTri; triBtn.textContent='△ Triángulos del barrido: '+(showTri?'ON':'OFF'); draw(); };
  const clrBtn=el('button','btn sm ghost','🗑 Limpiar'); ctr.appendChild(clrBtn); clrBtn.onclick=()=>{pts=[];draw();};
  segmented(ctr,[{label:'Auto: Círculo',value:'circle'},{label:'Cuadrado',value:'square'},{label:'Estrella',value:'star'}],-1,v=>autoTrace(v));

  function localXY(ev){
    const rect=cv.getBoundingClientRect();
    const cxp=(ev.touches?ev.touches[0].clientX:ev.clientX)-rect.left;
    const cyp=(ev.touches?ev.touches[0].clientY:ev.clientY)-rect.top;
    return {x:cxp, y:cyp};
  }
  function toMath(px,py){ const {w,h}=lastSize; return {x:(px-w/2)/UNIT, y:(h/2-py)/UNIT}; }
  let lastSize={w:300,h:360};

  function onDown(ev){ ev.preventDefault(); pts=[]; drawing=true; addPt(ev); }
  function onMove(ev){ if(!drawing)return; ev.preventDefault(); addPt(ev); }
  function onUp(ev){ if(!drawing)return; drawing=false; draw(); }
  function addPt(ev){ const l=localXY(ev); const m=toMath(l.x,l.y);
    const last=pts[pts.length-1]; if(!last || Math.hypot(m.x-last.x,m.y-last.y)>0.06){ pts.push(m); draw(); } }
  cv.addEventListener('pointerdown',onDown); cv.addEventListener('pointermove',onMove);
  window.addEventListener('pointerup',onUp); cv.addEventListener('pointercancel',onUp);

  function shoelace(P){ // signed area via ½ Σ (x_i y_{i+1} − x_{i+1} y_i)  (= discretized ½∮ x dy − y dx)
    let s=0; for(let i=0;i<P.length;i++){ const a=P[i], b=P[(i+1)%P.length]; s+=a.x*b.y-b.x*a.y; } return s/2;
  }
  function autoTrace(kind){
    pts=[]; const n=kind==='circle'?120:(kind==='square'?4:10);
    for(let i=0;i<(kind==='star'?10:n);i++){
      if(kind==='circle'){ const a=2*Math.PI*i/120; pts.push({x:2.0*Math.cos(a), y:2.0*Math.sin(a)}); }
      else if(kind==='square'){ const c=[[-1.6,-1.6],[1.6,-1.6],[1.6,1.6],[-1.6,1.6]][i]; pts.push({x:c[0],y:c[1]}); }
      else { const a=Math.PI/2 + 2*Math.PI*i/10; const rr=(i%2===0)?2.1:0.85; pts.push({x:rr*Math.cos(a), y:rr*Math.sin(a)}); }
    }
    draw();
  }
  function draw(){
    const sz=size(); lastSize=sz; const {w,h}=sz; ctx.clearRect(0,0,w,h);
    const cx=w/2, cy=h/2; const sx=mx=>cx+mx*UNIT, sy=my=>cy-my*UNIT;
    // grid (each cell = 0.5 u)
    ctx.strokeStyle=cssVar('--border'); ctx.lineWidth=1; ctx.globalAlpha=.5;
    for(let gx=-Math.ceil(cx/UNIT*2)/2;gx<=cx/UNIT;gx+=0.5){ ctx.beginPath(); ctx.moveTo(sx(gx),0); ctx.lineTo(sx(gx),h); ctx.stroke(); }
    for(let gy=-Math.ceil(cy/UNIT*2)/2;gy<=cy/UNIT;gy+=0.5){ ctx.beginPath(); ctx.moveTo(0,sy(gy)); ctx.lineTo(w,sy(gy)); ctx.stroke(); }
    ctx.globalAlpha=1;
    // axes
    ctx.strokeStyle=cssVar('--muted'); ctx.lineWidth=1.2; ctx.beginPath(); ctx.moveTo(0,cy);ctx.lineTo(w,cy);ctx.moveTo(cx,0);ctx.lineTo(cx,h);ctx.stroke();
    // origin (polo)
    ctx.fillStyle=cssVar('--warn'); ctx.beginPath(); ctx.arc(cx,cy,5,0,7); ctx.fill();
    ctx.fillStyle=cssVar('--muted'); ctx.font='11px system-ui'; ctx.fillText('O (polo)',cx+8,cy-8);

    if(pts.length>1){
      // sweep triangles from origin
      if(showTri){
        for(let i=0;i<pts.length-(drawing?1:0);i++){
          const a=pts[i], b=pts[(i+1)%pts.length]; if(i===pts.length-1 && drawing) break;
          const sgn=(a.x*b.y-b.x*a.y);
          ctx.fillStyle=sgn>=0? 'color-mix(in srgb,'+cssVar('--accent2')+' 16%, transparent)'
                              : 'color-mix(in srgb,'+cssVar('--bad')+' 16%, transparent)';
          ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(sx(a.x),sy(a.y)); ctx.lineTo(sx(b.x),sy(b.y)); ctx.closePath(); ctx.fill();
        }
      }
      // path
      ctx.strokeStyle=cssVar('--accent'); ctx.lineWidth=3; ctx.beginPath();
      pts.forEach((p,i)=> (i?ctx.lineTo:ctx.moveTo).call(ctx,sx(p.x),sy(p.y)) );
      if(!drawing) ctx.closePath();
      ctx.stroke();
      // points endpoints
      ctx.fillStyle=cssVar('--accent2'); ctx.beginPath(); ctx.arc(sx(pts[0].x),sy(pts[0].y),5,0,7); ctx.fill();
    }
    // readout
    const A=pts.length>2? shoelace(pts):0;
    const closed=!drawing && pts.length>2;
    readout.innerHTML = pts.length<3
      ? `Dibuja una curva cerrada (con el dedo o el mouse). El simulador calcula el área con <b>la misma integral de línea que mide el planímetro</b>:<br>\\(A=\\frac12\\oint_C x\\,dy-y\\,dx\\).`
      : `Cada segmento aporta un triángulo con signo desde \\(O\\) (verde +, rojo −); su suma es el área.<br>
        <b>Área medida</b> \\(=\\left|\\frac12\\sum (x_i y_{i+1}-x_{i+1}y_i)\\right|=\\) <span class="big">${Math.abs(A).toFixed(2)}</span> u²
        &nbsp; <span class="chip">signo ${A>=0?'+ (antihorario)':'− (horario)'}</span>
        ${closed?'':'<br><i>Suelta para cerrar la curva.</i>'}`;
    typeset(readout);
  }
  requestAnimationFrame(draw); window.addEventListener('resize',()=>requestAnimationFrame(draw));
};

$('#menuBtn').onclick=()=>{ $('#sidebar').classList.toggle('open'); $('#scrim').classList.toggle('open'); };
function closeDrawer(){ $('#sidebar').classList.remove('open'); $('#scrim').classList.remove('open'); }
$('#scrim').onclick=closeDrawer;
function applyTheme(t){ document.documentElement.setAttribute('data-theme',t); $('#themeBtn').textContent= t==='light'?'☀️':'🌙'; $('meta[name=theme-color]').setAttribute('content', t==='light'?'#eef1f8':'#0f1220'); }
let theme='dark'; try{ theme=localStorage.getItem(LS_THEME)||'dark'; }catch(e){}
applyTheme(theme);
$('#themeBtn').onclick=()=>{ theme=theme==='light'?'dark':'light'; applyTheme(theme); try{localStorage.setItem(LS_THEME,theme);}catch(e){} setTimeout(()=>{ if(window.__mjReady) typeset(contentEl); },30); };

/* ============================================================ boot */
if(!MODULES.length){
  contentEl.innerHTML='<div class="card"><h2>⏳ Contenido en preparación</h2><p style="color:var(--muted)">Los datos de los módulos aún no se han inyectado en este archivo. Si ves esto, vuelve a generar el archivo final.</p></div>';
} else {
  renderNav(); renderModule();
}
