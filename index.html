[{"question": "¿Qué le pasa matemáticamente a la integral de línea \\(\\oint_\\gamma x\\,dy\\) si recorro la figura en sentido horario en vez de antihorario, y por qué?", "options": [{"text": "Cambia de signo: si antihorario daba \\(+A\\), horario da \\(-A\\), porque invertir el recorrido invierte todos los diferenciales y por la propiedad \\(\\int_{-\\gamma}=-\\int_\\gamma\\).", "correct": true, "feedback": "Correcto. Al recorrer \\(-\\gamma\\), la parametrización se invierte y cada \\(dy\\) cambia de signo; por la propiedad \\(\\int_{-\\gamma}\\vec F\\cdot d\\vec r=-\\int_\\gamma\\vec F\\cdot d\\vec r\\) el valor pasa de \\(+A\\) a \\(-A\\). El área no cambia, pero su signo en la integral sí."}, {"text": "No cambia nada: la integral sigue dando \\(+A\\) porque el área de la figura es la misma.", "correct": false, "feedback": "Incorrecto. Aunque el área geométrica es la misma, la integral de línea es sensible a la orientación. Recorrer al revés invierte el signo del resultado, aunque el módulo coincida con el área."}, {"text": "Se duplica: pasa a valer \\(2A\\) porque se recorre la curva dos veces.", "correct": false, "feedback": "Incorrecto. Cambiar el sentido no recorre la curva dos veces; la recorre una vez en dirección opuesta. El efecto es un cambio de signo, no una duplicación."}, {"text": "Se vuelve cero porque las contribuciones horaria y antihoraria se cancelan.", "correct": false, "feedback": "Incorrecto. No estás sumando ambos recorridos; eliges uno. El recorrido horario por sí solo da \\(-A\\), no cero."}], "explanation": "Invertir la orientación de una curva cerrada cambia el signo de la integral de línea: \\(\\int_{-\\gamma}\\vec F\\cdot d\\vec r=-\\int_\\gamma\\vec F\\cdot d\\vec r\\). La razón es que al recorrer la curva al revés, en cada instante te mueves en dirección opuesta, de modo que \\(dx\\) y \\(dy\\) cambian de signo. Por eso el planímetro entrega lectura positiva cuando rodeas la figura en sentido antihorario (orientación positiva \\(\\gamma^+\\)) y lectura negativa cuando lo haces en sentido horario (\\(\\gamma^-\\)): el módulo es el área, y el signo codifica el sentido del giro."}, {"question": "Para calcular \\(\\int_\\gamma P\\,dx+Q\\,dy\\) mediante una parametrización \\(\\vec r(t)=(x(t),y(t))\\), \\(t\\in[a,b]\\), ¿cuál es la expresión correcta?", "options": [{"text": "\\(\\int_a^b\\big(P(\\vec r(t))\\,x'(t)+Q(\\vec r(t))\\,y'(t)\\big)\\,dt\\)", "correct": true, "feedback": "Correcto. Se sustituyen \\(x(t),y(t)\\) en \\(P\\) y \\(Q\\), y se usan \\(dx=x'(t)\\,dt\\), \\(dy=y'(t)\\,dt\\). Así la integral de línea se vuelve una integral ordinaria en \\(t\\)."}, {"text": "\\(\\int_a^b\\big(P(\\vec r(t))+Q(\\vec r(t))\\big)\\,dt\\)", "correct": false, "feedback": "Incorrecto. Faltan las derivadas \\(x'(t)\\) y \\(y'(t)\\) que provienen de los diferenciales \\(dx\\) y \\(dy\\). Sin ellas la fórmula no es correcta."}, {"text": "\\(\\int_a^b\\big(P(\\vec r(t))\\,y'(t)+Q(\\vec r(t))\\,x'(t)\\big)\\,dt\\)", "correct": false, "feedback": "Incorrecto. Están cruzadas: \\(P\\) acompaña a \\(dx=x'(t)\\,dt\\) y \\(Q\\) acompaña a \\(dy=y'(t)\\,dt\\), no al revés."}, {"text": "\\(\\int_a^b P(\\vec r(t))\\,Q(\\vec r(t))\\,dt\\)", "correct": false, "feedback": "Incorrecto. La integral de línea es una suma \\(P\\,dx+Q\\,dy\\), no un producto de \\(P\\) por \\(Q\\)."}], "explanation": "La receta consiste en sustituir la parametrización en el integrando y convertir los diferenciales: \\(dx=x'(t)\\,dt\\) y \\(dy=y'(t)\\,dt\\). Cada componente del campo se empareja con el diferencial de su propia variable: \\(P\\) con \\(dx\\), \\(Q\\) con \\(dy\\). El resultado \\(\\int_a^b\\big(P(\\vec r(t))x'(t)+Q(\\vec r(t))y'(t)\\big)dt\\) es ya una integral de una sola variable."}], "exercises": [{"statement": "Calcula \\(\\oint_\\gamma x\\,dy\\) sobre la circunferencia de radio \\(R=2\\) centrada en el origen, primero recorrida en sentido antihorario y luego en sentido horario. Compara los signos de ambos resultados.", "figure": "circle", "steps": [{"prompt": "Parametriza la circunferencia de radio \\(2\\) en sentido antihorario e identifica \\(x(t)\\) y \\(dy\\).", "hints": ["Usa \\(x=2\\cos t\\), \\(y=2\\sin t\\) con \\(t\\in[0,2\\pi]\\).", "El sentido antihorario es \\(t\\) creciente desde \\(0\\).", "Deriva \\(y=2\\sin t\\) para obtener \\(dy\\)."], "answerLatex": "x(t)=2\\cos t,\\quad dy=2\\cos t\\,dt,\\quad t\\in[0,2\\pi]", "explanation": "Con \\(R=2\\): \\(x(t)=2\\cos t\\) y \\(dy=y'(t)\\,dt=2\\cos t\\,dt\\). El intervalo \\([0,2\\pi]\\) recorre una vuelta antihoraria."}, {"prompt": "Plantea y resuelve la integral antihoraria \\(\\oint_{\\gamma^+}x\\,dy\\).", "hints": ["Sustituye: \\(\\int_0^{2\\pi}(2\\cos t)(2\\cos t)\\,dt\\).", "Saca el factor \\(4\\) y usa \\(\\int_0^{2\\pi}\\cos^2 t\\,dt=\\pi\\).", "El resultado debe ser el área del círculo de radio \\(2\\)."], "answerLatex": "\\oint_{\\gamma^+}x\\,dy=4\\int_0^{2\\pi}\\cos^2 t\\,dt=4\\pi", "explanation": "\\(\\int_0^{2\\pi}\\cos^2 t\\,dt=\\pi\\), así que la integral vale \\(4\\pi\\). Coincide con el área \\(\\pi R^2=\\pi\\cdot 2^2=4\\pi\\): la orientación positiva da \\(+A\\)."}, {"prompt": "Ahora recorre la misma circunferencia en sentido horario. ¿Qué resultado obtienes y cómo se relaciona con el anterior?", "hints": ["Puedes parametrizar el sentido horario con \\(x=2\\cos t\\), \\(y=-2\\sin t\\) (que invierte la orientación), o bien usar directamente la propiedad \\(\\int_{-\\gamma}=-\\int_\\gamma\\).", "No necesitas recalcular toda la integral: la orientación opuesta solo invierte el signo.", "Aplica \\(\\oint_{\\gamma^-}=-\\oint_{\\gamma^+}\\)."], "answerLatex": "\\oint_{\\gamma^-}x\\,dy=-\\oint_{\\gamma^+}x\\,dy=-4\\pi", "explanation": "Por la propiedad \\(\\int_{-\\gamma}\\vec F\\cdot d\\vec r=-\\int_\\gamma\\vec F\\cdot d\\vec r\\), recorrer en sentido horario invierte el signo: el resultado es \\(-4\\pi\\)."}, {"prompt": "Compara ambos resultados y conecta con la lectura del planímetro.", "hints": ["Observa que los módulos coinciden y solo difiere el signo.", "El módulo es el área; el signo codifica el sentido del giro.", "¿Qué entrega el planímetro en cada caso?"], "answerLatex": "\\oint_{\\gamma^+}x\\,dy=+4\\pi,\\qquad \\oint_{\\gamma^-}x\\,dy=-4\\pi", "explanation": "Ambos tienen módulo \\(4\\pi\\) (el área), pero signo opuesto. El planímetro, al rodear la figura antihorario, da lectura \\(+4\\pi\\); al hacerlo horario, da \\(-4\\pi\\). El área de la figura no cambia: solo cambia el signo de la lectura."}], "finalAnswerLatex": "\\oint_{\\gamma^+}x\\,dy=+4\\pi,\\qquad \\oint_{\\gamma^-}x\\,dy=-4\\pi"}, {"statement": "Calcula la integral de línea \\(\\int_\\gamma (-y)\\,dx+x\\,dy\\) sobre el segmento de recta \\(\\gamma\\) que va del punto \\((0,0)\\) al punto \\((2,1)\\).", "figure": "", "steps": [{"prompt": "Parametriza el segmento recto de \\((0,0)\\) a \\((2,1)\\) e indica el intervalo de \\(t\\).", "hints": ["Un segmento de \\(\\vec A\\) a \\(\\vec B\\) se parametriza como \\(\\vec r(t)=\\vec A+t(\\vec B-\\vec A)\\).", "Aquí \\(\\vec A=(0,0)\\) y \\(\\vec B=(2,1)\\), con \\(t\\in[0,1]\\).", "Esto da \\(x(t)=2t\\), \\(y(t)=t\\)."], "answerLatex": "\\vec r(t)=(2t,\\,t),\\quad t\\in[0,1]", "explanation": "La recta de \\((0,0)\\) a \\((2,1)\\) es \\(x(t)=2t\\), \\(y(t)=t\\), con \\(t\\) de \\(0\\) a \\(1\\). En \\(t=0\\) estás en el origen y en \\(t=1\\) en \\((2,1)\\)."}, {"prompt": "Calcula los diferenciales \\(dx\\) y \\(dy\\), y evalúa \\(P=-y\\) y \\(Q=x\\) sobre la parametrización.", "hints": ["Deriva \\(x(t)=2t\\) y \\(y(t)=t\\) respecto de \\(t\\).", "\\(P=-y=-t\\) y \\(Q=x=2t\\).", "\\(dx=x'(t)\\,dt\\) y \\(dy=y'(t)\\,dt\\)."], "answerLatex": "dx=2\\,dt,\\ dy=dt,\\quad P=-t,\\ Q=2t", "explanation": "Derivando: \\(dx=2\\,dt\\) y \\(dy=1\\,dt\\). Evaluando el campo: \\(P=-y(t)=-t\\) y \\(Q=x(t)=2t\\)."}, {"prompt": "Sustituye todo en \\(\\int_\\gamma P\\,dx+Q\\,dy\\) para obtener una integral en \\(t\\) sobre \\([0,1]\\).", "hints": ["Arma \\(P\\,dx+Q\\,dy=(-t)(2\\,dt)+(2t)(1\\,dt)\\).", "Suma los dos términos dentro de la integral.", "Observa si se simplifican entre sí."], "answerLatex": "\\int_0^1\\big[(-t)(2)+(2t)(1)\\big]\\,dt=\\int_0^1(-2t+2t)\\,dt", "explanation": "El integrando es \\((-t)(2)+(2t)(1)=-2t+2t=0\\). Los dos términos se cancelan exactamente sobre este segmento."}, {"prompt": "Resuelve la integral y escribe el resultado.", "hints": ["El integrando completo es \\(0\\).", "La integral de la función nula es \\(0\\).", "No depende de los límites."], "answerLatex": "\\int_\\gamma (-y)\\,dx+x\\,dy=\\int_0^1 0\\,dt=0", "explanation": "Como el integrando se anula idénticamente, la integral vale \\(0\\). La razón geométrica es transparente: el vector tangente al segmento es \\(\\vec r\\,'(t)=(2,1)\\) y el campo sobre la recta es \\((-y,x)=(-t,2t)\\); su producto escalar es \\((2)(-t)+(1)(2t)=0\\), es decir, el campo es perpendicular a la curva en todo punto, así que su componente tangencial (lo único que integra una integral de línea) se cancela. Recuerda que para curvas no cerradas no hay orientación positiva o negativa preferida; el valor depende solo del sentido elegido del recorrido."}], "finalAnswerLatex": "\\int_\\gamma (-y)\\,dx+x\\,dy=0"}], "widget": "orientation-flip", "keyTakeaways": ["La integral de línea \\(\\int_\\gamma P\\,dx+Q\\,dy\\) se calcula parametrizando \\(\\vec r(t)=(x(t),y(t))\\) y usando \\(dx=x'(t)\\,dt\\), \\(dy=y'(t)\\,dt\\), lo que la convierte en \\(\\int_a^b\\big(P\\,x'(t)+Q\\,y'(t)\\big)dt\\), una integral ordinaria en \\(t\\).", "La orientación positiva \\(\\gamma^+\\) es antihoraria (la región queda a la izquierda); la negativa \\(\\gamma^-\\) es horaria. Esta convención es la que hace que el área salga con signo positivo.", "Invertir el sentido del recorrido invierte el signo de la integral: \\(\\int_{-\\gamma}\\vec F\\cdot d\\vec r=-\\int_\\gamma\\vec F\\cdot d\\vec r\\).", "Sobre la circunferencia de radio \\(R\\) antihoraria, \\(\\oint_\\gamma x\\,dy=\\pi R^2\\): la integral de línea reproduce el área, anticipando el Teorema de Green con \\(P=0,\\ Q=x\\).", "En el planímetro el módulo de la lectura es el área de la figura y el signo codifica el sentido del giro: antihorario da lectura positiva, horario da lectura negativa."]}, {"id": "modulo-5-teorema-green", "title": "Teorema de Green y la fórmula del área", "subtitle": "El corazón matemático del planímetro: convertir un área en una integral sobre la frontera", "icon": "🌀", "theory": [{"type": "paragraph", "content": "Has llegado al núcleo del control. Todo lo anterior (integrales dobles, polares, curvas paramétricas e integrales de línea) confluye aquí. El Teorema de Green es el puente que conecta lo que pasa DENTRO de una región \\(D\\) con lo que ocurre solo en su FRONTERA \\(\\gamma\\). Esa idea es, literalmente, lo que hace funcionar al planímetro: el instrumento nunca entra al interior de la figura, solo recorre el borde, y aun así mide el área."}, {"type": "paragraph", "content": "El enunciado relaciona una integral de línea sobre una curva cerrada con una integral doble sobre la región que esa curva encierra. Si \\(P(x,y)\\) y \\(Q(x,y)\\) son las componentes de un campo vectorial \\(\\vec{F}=(P,Q)\\), entonces la circulación de \\(\\vec{F}\\) a lo largo de \\(\\gamma\\) coincide con la integral doble del 'rotacional escalar' \\(\\partial Q/\\partial x-\\partial P/\\partial y\\) sobre \\(D\\)."}, {"type": "formula", "content": "\\oint_{\\gamma} P\\,dx+Q\\,dy=\\iint_{D}\\left(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}\\right)dA", "caption": "Teorema de Green: la frontera (izquierda) y el interior (derecha) hablan de lo mismo."}, {"type": "paragraph", "content": "Para que el teorema sea válido hay que respetar sus hipótesis: (1) \\(\\gamma\\) es una curva cerrada simple (de Jordan, no se autointersecta) y suave a trozos; (2) está recorrida con orientación positiva, es decir, antihoraria, dejando la región \\(D\\) a la izquierda; (3) \\(D\\) es la región encerrada por \\(\\gamma\\); y (4) \\(P\\) y \\(Q\\) tienen derivadas parciales de primer orden continuas en un abierto que contiene a \\(D\\)."}, {"type": "callout", "content": "La jugada maestra: si conseguimos elegir \\(P\\) y \\(Q\\) tales que \\(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=1\\), entonces el lado derecho se convierte en \\(\\iint_D 1\\,dA=\\) Área de \\(D\\). ¡Así Green nos regala una fórmula del área que solo usa la frontera!"}, {"type": "paragraph", "content": "Hay tres elecciones clásicas del campo que cumplen esa condición. Cada una es perfectamente válida y todas dan exactamente el mismo número: \\(P=0,\\ Q=x\\) produce \\(A=\\oint_\\gamma x\\,dy\\); \\(P=-y,\\ Q=0\\) produce \\(A=-\\oint_\\gamma y\\,dx\\); y la elección simétrica \\(P=-y/2,\\ Q=x/2\\) produce la fórmula más elegante de todas, la del planímetro."}, {"type": "formula", "content": "A=\\frac{1}{2}\\oint_{C}x\\,dy-y\\,dx", "caption": "La fórmula del área del planímetro: promedio simétrico de las dos elecciones básicas."}, {"type": "paragraph", "content": "En el deducir paso a paso (la derivación guiada de abajo) verás POR QUÉ esas tres elecciones funcionan y cómo la tercera es simplemente el promedio de las dos primeras. Esa simetría no es un capricho estético: reparte el peso entre \\(x\\,dy\\) y \\(-y\\,dx\\), lo que da estabilidad numérica y mecánica. El planímetro polar implementa exactamente esta integral de línea: su rueda integradora acumula mecánicamente \\(\\frac{1}{2}(x\\,dy-y\\,dx)\\) mientras la punta recorre el contorno."}], "guidedDerivation": {"title": "Deducción de la fórmula del área A = ½ ∮ x dy − y dx a partir de Green", "intro": "Vamos a construir, paso a paso, la fórmula que mide el planímetro. Partimos del Teorema de Green y buscamos campos cuyo rotacional escalar valga exactamente 1, porque entonces la integral doble se vuelve el área. Encontraremos tres caminos válidos y veremos que el tercero, el simétrico, es el promedio de los otros dos. Intenta deducir cada paso antes de revelarlo.", "steps": [{"prompt": "Escribe el Teorema de Green y razona qué condición debe cumplir el integrando de la integral doble para que el lado derecho sea exactamente el área de \\(D\\). Recuerda que el área se expresa como \\(\\iint_D 1\\,dA\\).", "hints": ["El área de una región plana es \\(A=\\iint_D 1\\,dA\\). Mira el lado derecho de Green: ¿qué tendría que valer el integrando \\(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}\\) para que la integral doble dé justo eso?", "No necesitas valores concretos de \\(P\\) y \\(Q\\) todavía; solo la CONDICIÓN que deben satisfacer.", "Iguala el integrando de Green a 1."], "revealLatex": "\\oint_{\\gamma}P\\,dx+Q\\,dy=\\iint_D\\left(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}\\right)dA\\quad\\Longrightarrow\\quad \\text{pedimos }\\ \\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=1", "explanation": "Si logramos que \\(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=1\\), el lado derecho de Green se convierte en \\(\\iint_D 1\\,dA=A\\), el área de \\(D\\). El lado izquierdo (una integral de línea sobre la frontera) será entonces igual al área. Toda la deducción consiste en encontrar campos \\((P,Q)\\) que cumplan esa condición."}, {"prompt": "Primera elección (a): toma \\(P=0\\) y \\(Q=x\\). Verifica que cumplen la condición del paso anterior y escribe la fórmula del área que resulta al sustituir en Green.", "hints": ["Calcula \\(\\frac{\\partial Q}{\\partial x}\\) con \\(Q=x\\) y \\(\\frac{\\partial P}{\\partial y}\\) con \\(P=0\\). ¿Cuánto da su resta?", "La derivada de \\(x\\) respecto de \\(x\\) es \\(1\\); la derivada de \\(0\\) respecto de \\(y\\) es \\(0\\).", "Sustituye \\(P=0,\\ Q=x\\) en el lado izquierdo \\(\\oint_\\gamma P\\,dx+Q\\,dy\\): el término \\(P\\,dx\\) desaparece."], "revealLatex": "\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=\\frac{\\partial x}{\\partial x}-\\frac{\\partial 0}{\\partial y}=1-0=1\\quad\\Longrightarrow\\quad A=\\oint_{\\gamma}x\\,dy", "explanation": "Con \\(P=0\\) y \\(Q=x\\) el rotacional escalar vale \\(1\\), así que Green da el área. Como \\(P=0\\), el término \\(P\\,dx\\) se anula y solo queda \\(\\oint_\\gamma Q\\,dy=\\oint_\\gamma x\\,dy\\). Primera fórmula válida del área: \\(A=\\oint_\\gamma x\\,dy\\)."}, {"prompt": "Segunda elección (b): toma \\(P=-y\\) y \\(Q=0\\). Verifica la condición y escribe la fórmula del área resultante. Presta atención al signo.", "hints": ["Calcula \\(\\frac{\\partial Q}{\\partial x}\\) con \\(Q=0\\) y \\(\\frac{\\partial P}{\\partial y}\\) con \\(P=-y\\).", "\\(\\frac{\\partial(-y)}{\\partial y}=-1\\). Al restar, fíjate en el doble signo: \\(0-(-1)\\).", "Ahora \\(Q=0\\), así que el término \\(Q\\,dy\\) desaparece y queda \\(\\oint_\\gamma P\\,dx=\\oint_\\gamma(-y)\\,dx\\)."], "revealLatex": "\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=\\frac{\\partial 0}{\\partial x}-\\frac{\\partial(-y)}{\\partial y}=0-(-1)=1\\quad\\Longrightarrow\\quad A=-\\oint_{\\gamma}y\\,dx", "explanation": "Con \\(P=-y\\) y \\(Q=0\\) el rotacional escalar vuelve a valer \\(1\\). El término \\(Q\\,dy\\) se anula y queda \\(\\oint_\\gamma P\\,dx=\\oint_\\gamma(-y)\\,dx=-\\oint_\\gamma y\\,dx\\). Segunda fórmula válida: \\(A=-\\oint_\\gamma y\\,dx\\). Hasta aquí tenemos dos expresiones distintas que dan el mismo número, el área."}, {"prompt": "Tercera elección (c), la simétrica: promedia las dos elecciones anteriores tomando \\(P=-y/2\\) y \\(Q=x/2\\). Verifica que su rotacional escalar sigue siendo \\(1\\) y escribe la fórmula del área correspondiente.", "hints": ["La elección (c) es literalmente el promedio: \\(P=\\frac{0+(-y)}{2}=-\\frac{y}{2}\\) y \\(Q=\\frac{x+0}{2}=\\frac{x}{2}\\).", "Calcula \\(\\frac{\\partial Q}{\\partial x}=\\frac{\\partial}{\\partial x}\\!\\left(\\frac{x}{2}\\right)\\) y \\(\\frac{\\partial P}{\\partial y}=\\frac{\\partial}{\\partial y}\\!\\left(-\\frac{y}{2}\\right)\\). Cada uno aporta un medio.", "Al sustituir en \\(\\oint_\\gamma P\\,dx+Q\\,dy\\) obtienes \\(\\oint_\\gamma\\frac{x}{2}\\,dy-\\frac{y}{2}\\,dx\\); saca el factor \\(\\frac12\\)."], "revealLatex": "\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=\\frac{1}{2}-\\left(-\\frac{1}{2}\\right)=\\frac{1}{2}+\\frac{1}{2}=1\\quad\\Longrightarrow\\quad A=\\frac{1}{2}\\oint_{\\gamma}x\\,dy-y\\,dx", "explanation": "Con \\(P=-y/2\\) y \\(Q=x/2\\), cada derivada aporta \\(\\tfrac12\\) y al restar se suman: \\(\\tfrac12+\\tfrac12=1\\). El rotacional escalar vale \\(1\\), así que Green da de nuevo el área. Sustituyendo en la integral de línea y sacando factor común \\(\\tfrac12\\): \\(A=\\frac{1}{2}\\oint_\\gamma x\\,dy-y\\,dx\\). Esta es la fórmula simétrica, el promedio de (a) y (b), y es exactamente la que implementa el planímetro."}, {"prompt": "Reúne las tres fórmulas en una sola cadena de igualdades que resuma toda la deducción y conecte el área con la frontera.", "hints": ["Las tres elecciones dan el mismo número: el área \\(A=\\iint_D dA\\).", "Encadena: área como integral doble, igual a la fórmula (a), igual a la (b), igual a la simétrica (c).", "Recuerda que todas se calculan sobre la misma curva \\(\\gamma\\) orientada positivamente."], "revealLatex": "A=\\iint_D dA=\\oint_{\\gamma}x\\,dy=-\\oint_{\\gamma}y\\,dx=\\frac{1}{2}\\oint_{\\gamma}x\\,dy-y\\,dx", "explanation": "Esta cadena es el resultado central del control. El área de \\(D\\), que es una integral doble sobre el interior, se puede calcular de tres maneras equivalentes usando solo la frontera \\(\\gamma\\). La forma simétrica es la que el planímetro mide mecánicamente: su rueda integra \\(\\frac{1}{2}(x\\,dy-y\\,dx)\\) a lo largo del contorno, y al cerrar la curva la lectura es proporcional al área encerrada."}]}, "conceptual": [{"question": "¿Por qué se considera 'elegante' o preferible la fórmula simétrica \\(A=\\frac{1}{2}\\oint_\\gamma x\\,dy-y\\,dx\\) frente a \\(A=\\oint_\\gamma x\\,dy\\) o \\(A=-\\oint_\\gamma y\\,dx\\)?", "options": [{"text": "Porque es el promedio de las otras dos elecciones, reparte el peso de forma equilibrada entre \\(x\\,dy\\) y \\(-y\\,dx\\), y respeta la simetría de rotación del plano.", "correct": true, "feedback": "Correcto. La elección \\(P=-y/2,\\ Q=x/2\\) es literalmente el promedio de \\((P=0,Q=x)\\) y \\((P=-y,Q=0)\\). Esa simetría reparte la contribución entre ambos diferenciales, da una expresión invariante por rotación y, en la práctica del planímetro, equilibra el comportamiento mecánico."}, {"text": "Porque las otras dos fórmulas son incorrectas y solo la simétrica da el área verdadera.", "correct": false, "feedback": "Incorrecto. Las tres fórmulas son igualmente válidas y dan exactamente el mismo número, el área. La simétrica no es 'más correcta', es más elegante por su equilibrio."}, {"text": "Porque la simétrica no necesita que la curva esté orientada antihorariamente.", "correct": false, "feedback": "Incorrecto. Las tres fórmulas dependen igual de la orientación: si recorres en sentido horario, todas cambian de signo. La simetría no elimina la dependencia de la orientación."}, {"text": "Porque al tener el factor \\(\\frac{1}{2}\\) la integral se calcula más rápido.", "correct": false, "feedback": "Incorrecto. El factor \\(\\frac12\\) no acelera ningún cálculo; su origen es el promedio de las dos elecciones. La elegancia viene de la simetría, no de la velocidad."}], "explanation": "Las tres elecciones de campo cumplen \\(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=1\\) y por tanto dan el área. La simétrica \\(P=-y/2,Q=x/2\\) es el promedio aritmético de las otras dos: \\(\\frac{1}{2}\\big[(x\\,dy)+(-y\\,dx)\\big]\\). Ese equilibrio le da invariancia rotacional y es la forma que físicamente integra el planímetro."}, {"question": "¿Cuáles son las hipótesis que necesita el Teorema de Green para poder aplicarse?", "options": [{"text": "\\(\\gamma\\) cerrada simple y suave a trozos, orientada positivamente (antihorario), y \\(P,Q\\) con derivadas parciales de primer orden continuas en un abierto que contiene a \\(D\\).", "correct": true, "feedback": "Correcto. Son justo las cuatro condiciones: curva de Jordan, suavidad a trozos, orientación positiva y continuidad de las parciales \\(\\partial Q/\\partial x,\\ \\partial P/\\partial y\\) sobre la región cerrada."}, {"text": "Que la curva sea una circunferencia y que el campo sea conservativo.", "correct": false, "feedback": "Incorrecto. Green vale para cualquier curva cerrada simple suave a trozos, no solo circunferencias, y NO requiere que el campo sea conservativo; de hecho su utilidad brilla justo con campos no conservativos."}, {"text": "Que \\(D\\) sea una región de Tipo I pero nunca de Tipo II.", "correct": false, "feedback": "Incorrecto. Green se aplica a regiones que pueden descomponerse en piezas Tipo I y Tipo II; no excluye las Tipo II. No es esa la hipótesis."}, {"text": "Que \\(P\\) y \\(Q\\) sean funciones lineales en \\(x\\) e \\(y\\).", "correct": false, "feedback": "Incorrecto. \\(P\\) y \\(Q\\) pueden ser cualquier función con derivadas parciales continuas; no tienen por qué ser lineales. Lo lineal de las elecciones del área es solo una conveniencia."}], "explanation": "Green exige: (1) \\(\\gamma\\) cerrada simple (no se autointersecta), (2) suave a trozos, (3) orientación positiva (antihoraria, región a la izquierda), y (4) \\(P,Q\\in C^1\\) (parciales continuas) en un abierto que contenga \\(\\overline{D}\\). Si falla la continuidad de las parciales dentro de \\(D\\) (por ejemplo una singularidad), el teorema en su forma básica no se aplica."}, {"question": "Si el planímetro recorre el contorno en sentido HORARIO en lugar de antihorario, ¿qué le ocurre a la lectura del área?", "options": [{"text": "La lectura sale con signo negativo: el valor absoluto sigue siendo el área, porque \\(\\int_{-\\gamma}=-\\int_{\\gamma}\\).", "correct": true, "feedback": "Correcto. Recorrer en sentido horario es invertir la orientación \\(\\gamma\\to-\\gamma\\), y como \\(\\int_{-\\gamma}P\\,dx+Q\\,dy=-\\int_{\\gamma}P\\,dx+Q\\,dy\\), la integral cambia de signo. El área es el valor absoluto."}, {"text": "La lectura es exactamente la misma, porque el área es siempre positiva.", "correct": false, "feedback": "Incorrecto. La integral de línea SÍ depende de la orientación. En sentido horario la fórmula entrega un número negativo; el área (positiva) es su valor absoluto."}, {"text": "La lectura se vuelve cero porque la curva está cerrada.", "correct": false, "feedback": "Incorrecto. Una curva cerrada no fuerza integral cero salvo para campos conservativos; aquí el integrando tiene rotacional escalar \\(1\\neq 0\\), así que la integral mide el área (con signo según orientación)."}, {"text": "La lectura se duplica.", "correct": false, "feedback": "Incorrecto. La orientación solo cambia el SIGNO de la integral, no su magnitud. No hay duplicación."}], "explanation": "La propiedad clave de las integrales de línea es \\(\\int_{-\\gamma}=-\\int_{\\gamma}\\). El sentido antihorario (orientación positiva) da área positiva; el horario invierte la orientación y produce el negativo del área. Por eso, en la práctica, un planímetro que se recorre 'al revés' entrega una lectura negativa cuyo valor absoluto es el área."}, {"question": "¿Por qué se dice que el planímetro 'implementa' la integral de línea \\(\\frac{1}{2}\\oint_\\gamma x\\,dy-y\\,dx\\) sin conocer el interior de la figura?", "options": [{"text": "Porque Green convierte el área (integral doble sobre el interior) en una integral de línea sobre la frontera, y el instrumento solo recorre esa frontera mientras su rueda integra mecánicamente \\(\\frac{1}{2}(x\\,dy-y\\,dx)\\).", "correct": true, "feedback": "Correcto. Esa es la esencia: Green traslada la información del interior a la frontera. El planímetro nunca entra en \\(D\\); su punta sigue \\(\\gamma\\) y la rueda acumula el diferencial \\(\\frac{1}{2}(x\\,dy-y\\,dx)\\), cuyo total al cerrar la curva es el área."}, {"text": "Porque el planímetro mide el interior punto por punto y luego suma todos los \\(dA\\).", "correct": false, "feedback": "Incorrecto. Justamente lo contrario: el instrumento NO accede al interior. Solo recorre el borde; el milagro de Green es que con la frontera basta."}, {"text": "Porque el campo \\((P,Q)=(-y/2,x/2)\\) es conservativo y su potencial es el área.", "correct": false, "feedback": "Incorrecto. Ese campo NO es conservativo (su rotacional escalar es \\(1\\neq0\\)); precisamente por eso su circulación no es nula y mide el área. Un campo conservativo daría circulación cero."}, {"text": "Porque la rueda mide la longitud de la frontera y eso equivale al área.", "correct": false, "feedback": "Incorrecto. La rueda no mide longitud de arco; integra la componente \\(\\frac{1}{2}(x\\,dy-y\\,dx)\\). La longitud del borde no determina el área (dos figuras con igual perímetro pueden tener áreas distintas)."}], "explanation": "El Teorema de Green es la razón física de que el planímetro funcione: transforma \\(\\iint_D 1\\,dA\\) en \\(\\frac{1}{2}\\oint_\\gamma x\\,dy-y\\,dx\\). El instrumento recorre solo \\(\\gamma\\) y su rueda integradora acumula mecánicamente ese diferencial; al cerrar el contorno, la lectura es proporcional al área, sin haber tocado nunca el interior."}], "exercises": [{"statement": "Demuestra que las tres elecciones clásicas del campo dan el mismo resultado verificando, en cada caso, que el rotacional escalar \\(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}\\) vale \\(1\\). Las elecciones son: (a) \\(P=0,\\ Q=x\\); (b) \\(P=-y,\\ Q=0\\); (c) \\(P=-y/2,\\ Q=x/2\\). Concluye escribiendo la cadena de igualdades para el área.", "figure": "", "steps": [{"prompt": "Verifica la elección (a) \\(P=0,\\ Q=x\\): calcula \\(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}\\) y escribe la fórmula del área que produce.", "hints": ["\\(\\frac{\\partial x}{\\partial x}=1\\) y \\(\\frac{\\partial 0}{\\partial y}=0\\).", "Al ser \\(P=0\\), en \\(\\oint_\\gamma P\\,dx+Q\\,dy\\) sobrevive solo \\(Q\\,dy=x\\,dy\\)."], "answerLatex": "\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=1-0=1\\ \\Rightarrow\\ A=\\oint_\\gamma x\\,dy", "explanation": "El rotacional escalar es \\(1\\), luego Green da el área. Como \\(P=0\\), la fórmula se reduce a \\(A=\\oint_\\gamma x\\,dy\\)."}, {"prompt": "Verifica la elección (b) \\(P=-y,\\ Q=0\\): calcula el rotacional escalar y escribe la fórmula del área.", "hints": ["\\(\\frac{\\partial 0}{\\partial x}=0\\) y \\(\\frac{\\partial(-y)}{\\partial y}=-1\\).", "Cuidado con el doble signo: \\(0-(-1)=1\\). Con \\(Q=0\\) sobrevive \\(P\\,dx=-y\\,dx\\)."], "answerLatex": "\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=0-(-1)=1\\ \\Rightarrow\\ A=-\\oint_\\gamma y\\,dx", "explanation": "El rotacional escalar vuelve a ser \\(1\\). Con \\(Q=0\\) queda \\(\\oint_\\gamma(-y)\\,dx=-\\oint_\\gamma y\\,dx\\), la segunda fórmula del área."}, {"prompt": "Verifica la elección simétrica (c) \\(P=-y/2,\\ Q=x/2\\): calcula el rotacional escalar y escribe la fórmula del área.", "hints": ["\\(\\frac{\\partial}{\\partial x}\\!\\left(\\frac{x}{2}\\right)=\\frac12\\) y \\(\\frac{\\partial}{\\partial y}\\!\\left(-\\frac{y}{2}\\right)=-\\frac12\\).", "Al restar: \\(\\frac12-(-\\frac12)=1\\). Saca factor \\(\\frac12\\) en \\(\\oint_\\gamma\\frac{x}{2}\\,dy-\\frac{y}{2}\\,dx\\)."], "answerLatex": "\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=\\tfrac12+\\tfrac12=1\\ \\Rightarrow\\ A=\\frac{1}{2}\\oint_\\gamma x\\,dy-y\\,dx", "explanation": "Cada parcial aporta \\(\\tfrac12\\) y al restar se suman dando \\(1\\). La fórmula es la simétrica del planímetro: \\(A=\\frac{1}{2}\\oint_\\gamma x\\,dy-y\\,dx\\)."}, {"prompt": "Escribe la cadena final de igualdades que muestra que las tres expresiones coinciden con el área.", "hints": ["Todas igualan a \\(\\iint_D 1\\,dA=A\\).", "Encadena la integral doble con las tres formas de la integral de línea."], "answerLatex": "A=\\iint_D dA=\\oint_\\gamma x\\,dy=-\\oint_\\gamma y\\,dx=\\frac{1}{2}\\oint_\\gamma x\\,dy-y\\,dx", "explanation": "Como las tres elecciones cumplen la condición del rotacional escalar igual a 1, las tres integrales de línea coinciden con el área. Quedan unificadas en una sola cadena de igualdades."}], "finalAnswerLatex": "A=\\iint_D dA=\\oint_\\gamma x\\,dy=-\\oint_\\gamma y\\,dx=\\frac{1}{2}\\oint_\\gamma x\\,dy-y\\,dx"}, {"statement": "Aplica la fórmula simétrica \\(A=\\frac{1}{2}\\oint_\\gamma x\\,dy-y\\,dx\\) para calcular el área de la circunferencia de radio \\(R\\) centrada en el origen, parametrizada como \\(x(t)=R\\cos t,\\ y(t)=R\\sin t\\) con \\(t\\in[0,2\\pi]\\) (orientación antihoraria). Comprueba que obtienes \\(\\pi R^2\\).", "figure": "circle", "steps": [{"prompt": "Calcula los diferenciales \\(dx\\) y \\(dy\\) a partir de la parametrización.", "hints": ["Deriva \\(x(t)=R\\cos t\\) y \\(y(t)=R\\sin t\\) respecto de \\(t\\), y multiplica por \\(dt\\).", "\\(\\frac{d}{dt}\\cos t=-\\sin t\\) y \\(\\frac{d}{dt}\\sin t=\\cos t\\)."], "answerLatex": "dx=-R\\sin t\\,dt,\\qquad dy=R\\cos t\\,dt", "explanation": "Por la regla de la cadena, \\(dx=x'(t)\\,dt=-R\\sin t\\,dt\\) y \\(dy=y'(t)\\,dt=R\\cos t\\,dt\\)."}, {"prompt": "Sustituye \\(x,y,dx,dy\\) dentro del integrando \\(x\\,dy-y\\,dx\\) y simplifícalo usando una identidad trigonométrica.", "hints": ["\\(x\\,dy=R\\cos t\\cdot R\\cos t\\,dt\\) y \\(y\\,dx=R\\sin t\\cdot(-R\\sin t)\\,dt\\).", "Recuerda \\(\\cos^2 t+\\sin^2 t=1\\); al restar \\(y\\,dx\\) cambia el signo del término negativo."], "answerLatex": "x\\,dy-y\\,dx=R^2\\cos^2 t\\,dt+R^2\\sin^2 t\\,dt=R^2\\,dt", "explanation": "\\(x\\,dy=R^2\\cos^2 t\\,dt\\) y \\(-y\\,dx=-\\big(R\\sin t\\big)\\big(-R\\sin t\\,dt\\big)=R^2\\sin^2 t\\,dt\\). Sumando y usando \\(\\cos^2 t+\\sin^2 t=1\\) queda \\(R^2\\,dt\\)."}, {"prompt": "Integra de \\(0\\) a \\(2\\pi\\) y multiplica por \\(\\frac12\\) para obtener el área.", "hints": ["\\(\\frac{1}{2}\\int_0^{2\\pi}R^2\\,dt\\). El \\(R^2\\) es constante.", "\\(\\int_0^{2\\pi}dt=2\\pi\\)."], "answerLatex": "A=\\frac{1}{2}\\int_0^{2\\pi}R^2\\,dt=\\frac{1}{2}R^2(2\\pi)=\\pi R^2", "explanation": "La integral del integrando constante \\(R^2\\) sobre \\([0,2\\pi]\\) da \\(2\\pi R^2\\); el factor \\(\\frac12\\) lo reduce a \\(\\pi R^2\\), el área conocida del círculo. La fórmula del planímetro funciona."}], "finalAnswerLatex": "A=\\pi R^2"}], "widget": "none", "keyTakeaways": ["El Teorema de Green conecta frontera e interior: \\(\\oint_\\gamma P\\,dx+Q\\,dy=\\iint_D\\left(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}\\right)dA\\). Es el puente que hace posible el planímetro.", "La estrategia para medir áreas es elegir \\(P,Q\\) con \\(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=1\\); entonces el lado derecho de Green se vuelve \\(\\iint_D 1\\,dA=A\\).", "Tres elecciones válidas dan lo mismo: \\(A=\\oint_\\gamma x\\,dy=-\\oint_\\gamma y\\,dx=\\frac{1}{2}\\oint_\\gamma x\\,dy-y\\,dx\\). La tercera es el promedio simétrico de las dos primeras.", "La fórmula central del control es \\(A=\\frac{1}{2}\\oint_C x\\,dy-y\\,dx\\): elegante, simétrica y es exactamente la que integra mecánicamente el planímetro.", "La orientación importa: antihorario (positivo) da área positiva; horario invierte el signo porque \\(\\int_{-\\gamma}=-\\int_\\gamma\\). El área es el valor absoluto.", "Hipótesis de Green: \\(\\gamma\\) cerrada simple suave a trozos, orientada positivamente, y \\(P,Q\\) con derivadas parciales de primer orden continuas en un abierto que contiene a \\(D\\)."]}, {"id": "modulo-6-planimetro-en-accion", "title": "El planímetro en acción: medir áreas recorriendo solo la frontera", "subtitle": "Cómo la fórmula \\(A=\\frac{1}{2}\\oint_C (x\\,dy-y\\,dx)\\) se vuelve un instrumento físico que mide el área sin tocar el interior", "icon": "📐", "theory": [{"type": "paragraph", "content": "Ya dedujiste, a partir del Teorema de Green, que el área de una región \\(D\\) limitada por una curva cerrada simple \\(C\\) recorrida en sentido antihorario se puede escribir como una integral de línea sobre la frontera: \\(A=\\frac{1}{2}\\oint_C (x\\,dy-y\\,dx)\\). En este módulo veremos cómo esa fórmula deja de ser solo un resultado teórico y se convierte en el principio de funcionamiento de un instrumento real, el planímetro polar."}, {"type": "callout", "content": "La idea central: el área es una propiedad del interior de la figura, pero la fórmula del planímetro la expresa como algo que solo depende de la frontera. Por eso una máquina que recorre únicamente el contorno puede medir el área sin saber nada de lo que hay dentro."}, {"type": "paragraph", "content": "Recuerda el origen de la fórmula. El Teorema de Green dice \\(\\oint_C P\\,dx+Q\\,dy=\\iint_D\\left(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}\\right)dA\\). Si elegimos el campo de modo que \\(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=1\\), entonces la integral doble se reduce a \\(\\iint_D 1\\,dA\\), que es exactamente el área. La elección simétrica \\(P=-\\tfrac{y}{2},\\;Q=\\tfrac{x}{2}\\) da \\(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=\\tfrac{1}{2}-\\left(-\\tfrac{1}{2}\\right)=1\\) y conduce a \\(A=\\frac{1}{2}\\oint_C (x\\,dy-y\\,dx)\\)."}, {"type": "formula", "content": "A=\\iint_D 1\\,dA=\\oint_C x\\,dy=-\\oint_C y\\,dx=\\frac{1}{2}\\oint_C (x\\,dy-y\\,dx)", "caption": "Las cuatro expresiones del área son iguales; el planímetro materializa la última (la simétrica)."}, {"type": "paragraph", "content": "¿Cómo lo hace físicamente? El planímetro tiene un brazo trazador cuyo extremo (la punta) sigue el contorno de la figura. Cerca del brazo hay una pequeña rueda de medición montada de tal forma que solo gira cuando el brazo se mueve perpendicularmente a su propio eje; el deslizamiento paralelo al eje no la hace girar. Esto significa que la rueda no registra todo el movimiento, sino solo su componente perpendicular, que es precisamente la clase de cantidad que aparece en una integral de línea del tipo \\(\\oint_C P\\,dx+Q\\,dy\\)."}, {"type": "callout", "content": "La rueda integra mecánicamente. A cada pequeño desplazamiento \\(d\\vec{r}=(dx,dy)\\) de la punta le corresponde un pequeño giro de la rueda proporcional a la componente perpendicular del movimiento. Al recorrer toda la frontera cerrada, la rueda suma (integra) esos giritos, y el giro neto total resulta proporcional a \\(\\oint_C (x\\,dy-y\\,dx)\\), es decir, a dos veces el área."}, {"type": "paragraph", "content": "La palabra clave es giro neto. Mientras recorres el contorno, la rueda gira en un sentido en algunos tramos y en el contrario en otros. Lo que importa al final es el balance: cuánto ha girado en total cuando vuelves al punto de partida. Para una curva cerrada, ese balance neto es lo que captura la integral de línea cerrada \\(\\oint_C\\). Si el contorno no encerrara área (por ejemplo, si fueras y volvieras por el mismo camino), los giros se cancelarían y la lectura sería cero."}, {"type": "paragraph", "content": "El sentido del recorrido importa. Si recorres la frontera en sentido antihorario (el sentido positivo del Teorema de Green), la rueda acumula un giro neto positivo y la lectura del área sale positiva. Si la recorres en sentido horario, estás recorriendo \\(-C\\), y como \\(\\int_{-\\gamma}=-\\int_{\\gamma}\\), la lectura sale con el signo opuesto, es decir, negativa. El planímetro respeta exactamente la orientación que aprendiste en la teoría."}, {"type": "formula", "content": "\\oint_{-C}(x\\,dy-y\\,dx)=-\\oint_{C}(x\\,dy-y\\,dx)", "caption": "Invertir el sentido de recorrido invierte el signo de la lectura: antihorario positivo, horario negativo."}, {"type": "paragraph", "content": "En lo que sigue vamos a simular el planímetro con lápiz y papel: tomaremos figuras cuya frontera sabemos parametrizar (circunferencia, elipse, rectángulo), recorreremos solo su contorno y comprobaremos que la fórmula \\(\\frac{1}{2}\\oint_C (x\\,dy-y\\,dx)\\) devuelve el área correcta. Eso es, en esencia, lo mismo que hace la máquina, solo que nosotros integramos con cálculo y ella con una rueda."}], "guidedDerivation": {"title": "Simular el planímetro sobre la circunferencia de radio \\(R\\)", "intro": "Vamos a \"recorrer la frontera\" de un disco de radio \\(R\\) exactamente como lo haría la punta del planímetro, y a comprobar que la fórmula simétrica \\(\\frac{1}{2}\\oint_C (x\\,dy-y\\,dx)\\) nos devuelve el área conocida \\(\\pi R^2\\). Trabajaremos paso a paso: parametrizar, calcular los diferenciales, montar el integrando y por último integrar sobre una vuelta completa.", "steps": [{"prompt": "Parametriza la circunferencia de radio \\(R\\) centrada en el origen recorrida en sentido antihorario, usando el ángulo \\(\\theta\\) como parámetro. ¿Cuáles son \\(x(\\theta)\\) e \\(y(\\theta)\\) y en qué intervalo varía \\(\\theta\\)?", "hints": ["La punta del planímetro está siempre a distancia \\(R\\) del centro: piensa en coordenadas polares con radio fijo.", "El coseno da la componente horizontal y el seno la vertical.", "Para dar una vuelta completa antihoraria, \\(\\theta\\) recorre desde \\(0\\) hasta \\(2\\pi\\)."], "revealLatex": "x=R\\cos\\theta,\\quad y=R\\sin\\theta,\\quad \\theta\\in[0,2\\pi]", "explanation": "Con \\(\\theta\\) creciendo de \\(0\\) a \\(2\\pi\\), el punto \\((x,y)\\) parte de \\((R,0)\\) y gira en sentido antihorario, que es el sentido positivo del Teorema de Green."}, {"prompt": "Calcula los diferenciales \\(dx\\) y \\(dy\\) derivando respecto de \\(\\theta\\). Recuerda que \\(dx=x'(\\theta)\\,d\\theta\\) y \\(dy=y'(\\theta)\\,d\\theta\\).", "hints": ["La derivada de \\(\\cos\\theta\\) es \\(-\\sin\\theta\\); la de \\(\\sin\\theta\\) es \\(\\cos\\theta\\).", "\\(R\\) es constante, así que sale multiplicando.", "No olvides el factor \\(d\\theta\\) en ambos diferenciales."], "revealLatex": "dx=-R\\sin\\theta\\,d\\theta,\\qquad dy=R\\cos\\theta\\,d\\theta", "explanation": "Estos diferenciales representan el desplazamiento infinitesimal de la punta del planímetro al avanzar un ángulo \\(d\\theta\\) sobre el contorno."}, {"prompt": "Sustituye \\(x,y,dx,dy\\) en el integrando \\(x\\,dy-y\\,dx\\) y simplifícalo usando la identidad fundamental.", "hints": ["Forma primero \\(x\\,dy=(R\\cos\\theta)(R\\cos\\theta\\,d\\theta)\\) y \\(y\\,dx=(R\\sin\\theta)(-R\\sin\\theta\\,d\\theta)\\).", "Al restar \\(y\\,dx\\), fíjate que ese término entra con signo \\(+\\) porque \\(dx\\) ya es negativo.", "Aparecerá \\(R^2(\\cos^2\\theta+\\sin^2\\theta)\\); usa \\(\\cos^2\\theta+\\sin^2\\theta=1\\)."], "revealLatex": "x\\,dy-y\\,dx=R^2\\cos^2\\theta\\,d\\theta+R^2\\sin^2\\theta\\,d\\theta=R^2\\,d\\theta", "explanation": "El integrando se simplifica a \\(R^2\\,d\\theta\\), una cantidad constante. Esto refleja que, sobre la circunferencia, la contribución de la rueda por unidad de ángulo es uniforme."}, {"prompt": "Monta la integral completa \\(\\frac{1}{2}\\oint_C (x\\,dy-y\\,dx)\\) e intégrala sobre una vuelta completa para obtener el área.", "hints": ["Sustituye el integrando simplificado y los límites \\(\\theta\\in[0,2\\pi]\\).", "\\(\\int_0^{2\\pi}d\\theta=2\\pi\\).", "No olvides el factor \\(\\frac{1}{2}\\) que viene de la fórmula simétrica."], "revealLatex": "A=\\frac{1}{2}\\int_0^{2\\pi}R^2\\,d\\theta=\\frac{1}{2}R^2(2\\pi)=\\pi R^2", "explanation": "Recorriendo únicamente la frontera obtuvimos \\(\\pi R^2\\), el área del disco. Esto es exactamente lo que haría el planímetro: su rueda, al completar la vuelta, registra un giro neto proporcional a \\(2\\pi R^2\\), que al dividir por 2 da el área."}]}, "conceptual": [{"question": "¿Por qué al planímetro le basta con recorrer la frontera de la figura para medir su área, sin pasar por el interior?", "options": [{"text": "Porque el Teorema de Green convierte la integral doble del área \\(\\iint_D 1\\,dA\\) en una integral de línea \\(\\oint_C (x\\,dy-y\\,dx)\\) sobre la frontera, de modo que el valor del área queda determinado solo por el contorno.", "correct": true, "feedback": "Exacto. El Teorema de Green es el puente: con la elección adecuada del campo, \\(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=1\\) y la integral doble se reduce a una integral de línea que solo usa los valores de \\(x,y,dx,dy\\) sobre \\(C\\)."}, {"text": "Porque el interior de la figura siempre tiene área cero y por eso no aporta nada a la medición.", "correct": false, "feedback": "No. El interior es precisamente lo que tiene área; lo que ocurre es que esa área queda codificada en una integral sobre la frontera gracias al Teorema de Green, no que el interior valga cero."}, {"text": "Porque el planímetro mide en realidad el perímetro y luego lo eleva al cuadrado.", "correct": false, "feedback": "No. El planímetro no mide el perímetro: la rueda integra la componente perpendicular del movimiento, lo que reconstruye el área vía la integral de línea, no una función del perímetro."}, {"text": "Porque la rueda toca físicamente cada punto del interior mientras se recorre el borde.", "correct": false, "feedback": "No. La punta sigue solo el contorno y nunca recorre el interior; la conexión con el área es matemática (Teorema de Green), no por contacto físico con la región interna."}], "explanation": "El corazón del planímetro es el Teorema de Green: transforma \\(\\iint_D 1\\,dA\\) (algo del interior) en \\(\\frac{1}{2}\\oint_C (x\\,dy-y\\,dx)\\) (algo de la frontera). Como la integral de línea solo necesita lo que pasa sobre \\(C\\), un instrumento que recorre el contorno basta para conocer el área."}, {"question": "Recorres el contorno de una figura con el planímetro en sentido horario en vez de antihorario. ¿Qué le pasa a la lectura del área?", "options": [{"text": "La lectura sale con el signo opuesto (negativa), porque recorrer en horario es recorrer \\(-C\\) y \\(\\oint_{-C}(x\\,dy-y\\,dx)=-\\oint_{C}(x\\,dy-y\\,dx)\\).", "correct": true, "feedback": "Correcto. Invertir la orientación invierte el signo de la integral de línea, y por eso el planímetro entrega una lectura negativa cuyo valor absoluto sigue siendo el área."}, {"text": "La lectura no cambia en absoluto, porque el área es siempre positiva.", "correct": false, "feedback": "El área geométrica es positiva, pero la lectura del planímetro tiene signo: depende de la orientación. En horario la lectura es negativa; su magnitud sí coincide con el área."}, {"text": "La lectura se duplica, porque recorrer en horario suma dos vueltas.", "correct": false, "feedback": "No. Recorrer en horario es una sola vuelta en sentido contrario, no dos vueltas; cambia el signo, no la magnitud."}, {"text": "La lectura se vuelve cero, porque los giros se cancelan exactamente.", "correct": false, "feedback": "Los giros no se cancelan: el recorrido sigue encerrando la misma área. Lo único que cambia es el signo de la lectura."}], "explanation": "La orientación es física en el planímetro. Antihorario (sentido positivo de Green) da lectura positiva; horario corresponde a \\(-C\\) y, como \\(\\oint_{-C}(x\\,dy-y\\,dx)=-\\oint_{C}(x\\,dy-y\\,dx)\\), la lectura cambia de signo. La magnitud es siempre el área."}, {"question": "¿Cuál es la ventaja práctica de que el planímetro mida el área sin necesitar conocer el interior de la figura?", "options": [{"text": "Permite medir el área de figuras irregulares o de contorno complicado (un lago en un mapa, un órgano en una radiografía) sin tener fórmula del interior: basta poder trazar el borde.", "correct": true, "feedback": "Exacto. Esa es la gran utilidad: no hace falta una expresión analítica de la región ni descomponerla; si puedes seguir su frontera cerrada, obtienes el área."}, {"text": "Permite calcular el volumen de cuerpos sólidos tridimensionales recorriendo su superficie.", "correct": false, "feedback": "No. El planímetro es estrictamente un instrumento 2D que mide áreas planas; no calcula volúmenes ni recorre superficies."}, {"text": "Permite medir el área solo si la figura es un polígono con vértices conocidos.", "correct": false, "feedback": "Al contrario: la fortaleza del planímetro es justamente que funciona con contornos curvos e irregulares, no solo con polígonos."}, {"text": "Permite obtener el perímetro y el área simultáneamente con una sola pasada.", "correct": false, "feedback": "El planímetro está diseñado para el área (vía la integral de línea de Green); no entrega el perímetro como subproducto de esa misma medición."}], "explanation": "Como la integral de línea solo usa el contorno, el planímetro mide el área de cualquier región cuya frontera se pueda recorrer, aunque no tengas fórmula para su interior. Por eso es tan útil en cartografía, biología o ingeniería para figuras irregulares planas."}], "exercises": [{"statement": "Usa la fórmula del planímetro \\(A=\\frac{1}{2}\\oint_C (x\\,dy-y\\,dx)\\), parametrizando SOLO la frontera, para calcular el área del disco de radio \\(R\\). Recórrela en sentido antihorario.", "figure": "circle", "steps": [{"prompt": "Parametriza la circunferencia de radio \\(R\\) en sentido antihorario con parámetro \\(\\theta\\in[0,2\\pi]\\).", "hints": ["Radio constante \\(R\\): usa coseno y seno.", "La punta del planímetro solo recorre el borde, no el interior.", "\\(\\theta\\) de \\(0\\) a \\(2\\pi\\) para una vuelta completa antihoraria."], "answerLatex": "x=R\\cos\\theta,\\quad y=R\\sin\\theta,\\quad \\theta\\in[0,2\\pi]", "explanation": "Esta parametrización describe la frontera completa recorrida en el sentido positivo de Green."}, {"prompt": "Halla los diferenciales \\(dx\\) y \\(dy\\).", "hints": ["Deriva respecto de \\(\\theta\\) y multiplica por \\(d\\theta\\).", "\\((\\cos\\theta)'=-\\sin\\theta\\), \\((\\sin\\theta)'=\\cos\\theta\\)."], "answerLatex": "dx=-R\\sin\\theta\\,d\\theta,\\qquad dy=R\\cos\\theta\\,d\\theta", "explanation": "Son los desplazamientos infinitesimales de la punta al avanzar \\(d\\theta\\)."}, {"prompt": "Sustituye y simplifica el integrando \\(x\\,dy-y\\,dx\\).", "hints": ["Forma \\(x\\,dy\\) y \\(y\\,dx\\) por separado.", "Aparece \\(R^2(\\cos^2\\theta+\\sin^2\\theta)\\).", "Usa \\(\\cos^2\\theta+\\sin^2\\theta=1\\)."], "answerLatex": "x\\,dy-y\\,dx=R^2\\,d\\theta", "explanation": "El integrando es constante: \\(R^2\\,d\\theta\\)."}, {"prompt": "Integra sobre la vuelta completa y aplica el factor \\(\\frac{1}{2}\\).", "hints": ["\\(\\int_0^{2\\pi}d\\theta=2\\pi\\).", "Multiplica por \\(\\frac{1}{2}\\)."], "answerLatex": "A=\\frac{1}{2}\\int_0^{2\\pi}R^2\\,d\\theta=\\pi R^2", "explanation": "Recorriendo solo la frontera obtenemos el área conocida del disco."}], "finalAnswerLatex": "A=\\pi R^2"}, {"statement": "Calcula con la fórmula del planímetro \\(A=\\frac{1}{2}\\oint_C (x\\,dy-y\\,dx)\\), parametrizando SOLO la frontera, el área de la elipse de semiejes \\(a\\) (horizontal) y \\(b\\) (vertical). Recórrela en sentido antihorario.", "figure": "ellipse", "steps": [{"prompt": "Parametriza la elipse \\(\\frac{x^2}{a^2}+\\frac{y^2}{b^2}=1\\) en sentido antihorario con \\(t\\in[0,2\\pi]\\).", "hints": ["Generaliza la parametrización del círculo: cada coordenada lleva su semieje.", "\\(x\\) se estira por \\(a\\), \\(y\\) por \\(b\\).", "Comprueba que satisface la ecuación de la elipse usando \\(\\cos^2 t+\\sin^2 t=1\\)."], "answerLatex": "x=a\\cos t,\\quad y=b\\sin t,\\quad t\\in[0,2\\pi]", "explanation": "Es el círculo unitario estirado por \\(a\\) y \\(b\\) en cada eje; recorre la frontera de la elipse en sentido antihorario."}, {"prompt": "Halla \\(dx\\) y \\(dy\\) derivando respecto de \\(t\\).", "hints": ["\\(a\\) y \\(b\\) son constantes y salen multiplicando.", "\\((\\cos t)'=-\\sin t\\), \\((\\sin t)'=\\cos t\\)."], "answerLatex": "dx=-a\\sin t\\,dt,\\qquad dy=b\\cos t\\,dt", "explanation": "Desplazamientos infinitesimales de la punta sobre el contorno elíptico."}, {"prompt": "Sustituye en \\(x\\,dy-y\\,dx\\) y simplifica.", "hints": ["\\(x\\,dy=(a\\cos t)(b\\cos t\\,dt)=ab\\cos^2 t\\,dt\\).", "\\(y\\,dx=(b\\sin t)(-a\\sin t\\,dt)=-ab\\sin^2 t\\,dt\\).", "Al restar \\(y\\,dx\\) aparece \\(ab(\\cos^2 t+\\sin^2 t)\\)."], "answerLatex": "x\\,dy-y\\,dx=ab\\,dt", "explanation": "El producto de semiejes \\(ab\\) sale como factor común y la identidad pitagórica deja un integrando constante."}, {"prompt": "Integra sobre la vuelta completa y aplica el factor \\(\\frac{1}{2}\\).", "hints": ["\\(\\int_0^{2\\pi}ab\\,dt=2\\pi ab\\).", "Multiplica por \\(\\frac{1}{2}\\)."], "answerLatex": "A=\\frac{1}{2}\\int_0^{2\\pi}ab\\,dt=\\pi ab", "explanation": "El área de la elipse es \\(\\pi ab\\); con \\(a=b=R\\) recuperamos \\(\\pi R^2\\), el caso del círculo."}], "finalAnswerLatex": "A=\\pi ab"}, {"statement": "Calcula el área del rectángulo de base \\(w\\) y altura \\(h\\) con vértices \\((0,0),(w,0),(w,h),(0,h)\\) usando \\(A=\\frac{1}{2}\\oint_C (x\\,dy-y\\,dx)\\), recorriendo la frontera por tramos en sentido antihorario.", "figure": "rectangle", "steps": [{"prompt": "Como la frontera no es suave, hay que recorrerla a trozos. Identifica los cuatro lados en orden antihorario y describe qué se mantiene constante en cada uno.", "hints": ["Empieza en \\((0,0)\\) y avanza antihorario: derecha, arriba, izquierda, abajo.", "En cada lado una coordenada es constante (su diferencial es 0) y la otra varía.", "\\(L_1\\): de \\((0,0)\\) a \\((w,0)\\); \\(L_2\\): de \\((w,0)\\) a \\((w,h)\\); \\(L_3\\): de \\((w,h)\\) a \\((0,h)\\); \\(L_4\\): de \\((0,h)\\) a \\((0,0)\\)."], "answerLatex": "\\begin{aligned}&L_1:\\ y=0,\\ dy=0;\\quad L_2:\\ x=w,\\ dx=0\\\\&L_3:\\ y=h,\\ dy=0;\\quad L_4:\\ x=0,\\ dx=0\\end{aligned}", "explanation": "En cada lado una variable se mantiene fija, lo que anula su diferencial y simplifica mucho el integrando \\(x\\,dy-y\\,dx\\)."}, {"prompt": "Evalúa \\(\\int (x\\,dy-y\\,dx)\\) en los lados horizontales \\(L_1\\) (\\(y=0\\)) y \\(L_3\\) (\\(y=h\\)).", "hints": ["En \\(L_1\\): \\(y=0\\) y \\(dy=0\\), así que \\(x\\,dy-y\\,dx=0\\).", "En \\(L_3\\): \\(dy=0\\), queda \\(-y\\,dx=-h\\,dx\\); ahí \\(x\\) va de \\(w\\) hasta \\(0\\).", "\\(\\int_{w}^{0}-h\\,dx=-h\\,(0-w)=hw\\)."], "answerLatex": "\\int_{L_1}=0,\\qquad \\int_{L_3}=\\int_{w}^{0}-h\\,dx=hw", "explanation": "El lado inferior no aporta; el superior aporta \\(hw\\) porque se recorre de derecha a izquierda (de \\(x=w\\) a \\(x=0\\)) con \\(y=h\\) fijo."}, {"prompt": "Evalúa \\(\\int (x\\,dy-y\\,dx)\\) en los lados verticales \\(L_2\\) (\\(x=w\\)) y \\(L_4\\) (\\(x=0\\)).", "hints": ["En \\(L_2\\): \\(dx=0\\), queda \\(x\\,dy=w\\,dy\\); ahí \\(y\\) va de \\(0\\) a \\(h\\).", "\\(\\int_0^h w\\,dy=wh\\).", "En \\(L_4\\): \\(x=0\\) y \\(dx=0\\), así que el integrando es \\(0\\)."], "answerLatex": "\\int_{L_2}=\\int_{0}^{h}w\\,dy=wh,\\qquad \\int_{L_4}=0", "explanation": "El lado derecho aporta \\(wh\\); el izquierdo no aporta porque \\(x=0\\) y \\(dx=0\\)."}, {"prompt": "Suma las cuatro contribuciones y aplica el factor \\(\\frac{1}{2}\\).", "hints": ["Suma: \\(0+wh+hw+0=2wh\\).", "Multiplica por \\(\\frac{1}{2}\\)."], "answerLatex": "A=\\frac{1}{2}\\left(0+wh+hw+0\\right)=\\frac{1}{2}(2wh)=wh", "explanation": "Recorriendo solo los cuatro lados obtenemos \\(wh\\), el área del rectángulo, justo lo que mediría el planímetro al seguir su contorno."}], "finalAnswerLatex": "A=wh"}], "widget": "planimeter-sim", "keyTakeaways": ["El planímetro materializa la fórmula \\(A=\\frac{1}{2}\\oint_C (x\\,dy-y\\,dx)\\): su rueda integra mecánicamente la componente perpendicular del movimiento de la punta a lo largo de la frontera.", "Gracias al Teorema de Green, el área (propiedad del interior) queda escrita como una integral de línea sobre el contorno, así que basta recorrer la frontera para conocerla, sin saber nada del interior.", "El sentido importa: antihorario (sentido positivo de Green) da lectura positiva; horario es recorrer \\(-C\\) y, como \\(\\oint_{-C}(x\\,dy-y\\,dx)=-\\oint_C (x\\,dy-y\\,dx)\\), la lectura sale negativa.", "Simular el planímetro = parametrizar solo la frontera, calcular \\(dx,dy\\), montar \\(\\frac{1}{2}\\oint_C (x\\,dy-y\\,dx)\\) e integrar: da \\(\\pi R^2\\) para el círculo, \\(\\pi ab\\) para la elipse y \\(wh\\) para el rectángulo.", "En curvas no suaves como el rectángulo se integra por tramos; en cada lado una coordenada es constante y su diferencial se anula, simplificando el cálculo.", "Su gran ventaja práctica: mide áreas de figuras planas irregulares (mapas, imágenes) con solo seguir el borde, sin fórmula del interior. Todo es estrictamente plano (2D)."]}, {"id": "modulo-7-banco-preguntas", "title": "Banco de preguntas conceptuales", "subtitle": "Repaso integrador para el control: simula lo que te pueden preguntar", "icon": "🎯", "theory": [{"type": "paragraph", "content": "Llegaste al final del recorrido. Este módulo no trae teoría nueva: es un banco de preguntas conceptuales pensado para que pongas a prueba tu comprensión de TODO el temario antes del control. Cada pregunta integra varias ideas (integrales dobles, coordenadas polares, curvas paramétricas, integrales de línea y el Teorema de Green) y el feedback de cada opción te explica por qué acierta o por qué falla. La meta es que llegues sabiendo no solo la fórmula \\(A=\\frac{1}{2}\\oint_C x\\,dy-y\\,dx\\), sino el porqué de cada pieza."}, {"type": "paragraph", "content": "Te recomiendo responder cada pregunta intentando justificar tu elección en voz alta antes de mirar el feedback, tal como te lo pediría el profesor en un control individual. Si fallas alguna, vuelve al módulo correspondiente y reléelo: el objetivo es que ningún concepto te quede como \"me lo sé de memoria\" sino como \"entiendo de dónde sale\"."}, {"type": "callout", "content": "Consejo de estudio: el profesor suele preguntar el PORQUÉ, no solo el QUÉ. Saber que \\(dA=r\\,dr\\,d\\theta\\) vale poco si no puedes explicar por qué aparece la \\(r\\). Apunta a entender, no a memorizar."}], "guidedDerivation": null, "conceptual": [{"question": "Recorres la frontera de una región \\(D\\) en sentido HORARIO y calculas \\(\\frac{1}{2}\\oint_C x\\,dy-y\\,dx\\). ¿Qué obtienes?", "options": [{"text": "El área de \\(D\\) con signo negativo, es decir \\(-\\text{Área}(D)\\).", "correct": true, "feedback": "Correcto. La fórmula \\(\\frac{1}{2}\\oint_C x\\,dy-y\\,dx\\) da el área POSITIVA solo si recorres la frontera en sentido antihorario (orientación positiva). Al invertir el sentido, por la propiedad \\(\\int_{-\\gamma}=-\\int_{\\gamma}\\), el resultado cambia de signo y obtienes \\(-\\text{Área}(D)\\). En el planímetro, recorrer el borde al revés da una lectura negativa."}, {"text": "El área exacta de \\(D\\), siempre positiva sin importar el sentido.", "correct": false, "feedback": "Incorrecto. La orientación SÍ importa. La integral de línea es sensible al sentido de recorrido: \\(\\int_{-\\gamma}=-\\int_{\\gamma}\\). En sentido horario obtienes el área con el signo cambiado."}, {"text": "Cero, porque la curva es cerrada.", "correct": false, "feedback": "Incorrecto. Que la curva sea cerrada (\\(\\oint\\)) no anula la integral; la forma \\(x\\,dy-y\\,dx\\) no es exacta. De hecho su valor es \\(\\pm 2\\,\\text{Área}(D)\\) según la orientación, y con el factor \\(\\frac{1}{2}\\) queda \\(\\pm\\text{Área}(D)\\)."}, {"text": "El doble del área, \\(2\\,\\text{Área}(D)\\).", "correct": false, "feedback": "Incorrecto. Sin el factor \\(\\frac{1}{2}\\), la integral \\(\\oint_C x\\,dy-y\\,dx\\) sí vale \\(2\\,\\text{Área}(D)\\) (en antihorario). El \\(\\frac{1}{2}\\) está justamente para cancelar ese 2 y entregar el área (con signo), no su doble."}], "explanation": "El signo de \\(\\frac{1}{2}\\oint_C x\\,dy-y\\,dx\\) codifica la orientación. Antihorario (positivo) entrega \\(+\\text{Área}(D)\\); horario entrega \\(-\\text{Área}(D)\\). Esto se debe a \\(\\int_{-\\gamma}=-\\int_{\\gamma}\\). En un planímetro real, el sentido de recorrido determina el signo de la lectura, por eso se conviene recorrer antihorario para leer áreas positivas."}, {"question": "Al cambiar a coordenadas polares \\(x=r\\cos\\theta,\\ y=r\\sin\\theta\\), aparece \\(dA=r\\,dr\\,d\\theta\\). ¿Por qué está esa \\(r\\) y qué pasa si la olvidas?", "options": [{"text": "La \\(r\\) es el valor absoluto del Jacobiano del cambio de variable; mide cómo se estira el área. Si la olvidas, el resultado es incorrecto (área mal calculada).", "correct": true, "feedback": "Correcto. El factor \\(r\\) es \\(\\left|\\det J\\right|=\\left|\\frac{\\partial(x,y)}{\\partial(r,\\theta)}\\right|=r\\). Un rectángulo \\(dr\\times d\\theta\\) en el plano \\((r,\\theta)\\) se transforma en un sectorcito cuya área real es aproximadamente \\(r\\,dr\\,d\\theta\\): cuanto más lejos del origen (mayor \\(r\\)), más se abre el arco. Olvidar la \\(r\\) ignora ese estiramiento y da un área errónea."}, {"text": "La \\(r\\) aparece solo por convención de notación; puedes omitirla sin afectar el resultado.", "correct": false, "feedback": "Incorrecto. No es convención: es el Jacobiano y es obligatorio. Omitirla cambia el valor de la integral y produce un área incorrecta."}, {"text": "La \\(r\\) compensa que \\(\\theta\\) esté en radianes; con grados no haría falta.", "correct": false, "feedback": "Incorrecto. El Jacobiano \\(r\\) no tiene nada que ver con radianes vs grados. Surge de la geometría del cambio de variable, del determinante de la matriz de derivadas parciales."}, {"text": "La \\(r\\) es el radio del borde de la región y se evalúa solo en la frontera.", "correct": false, "feedback": "Incorrecto. La \\(r\\) de \\(dA=r\\,dr\\,d\\theta\\) es la variable de integración en todo el interior, no un valor fijo de la frontera. Aparece como factor en cada punto del dominio."}], "explanation": "El factor \\(r\\) es el valor absoluto del Jacobiano del cambio \\((r,\\theta)\\to(x,y)\\): \\(\\det\\begin{pmatrix}\\cos\\theta & -r\\sin\\theta\\\\ \\sin\\theta & r\\cos\\th \\frac{y}{2},\\ Q=\\frac{x}{2}\\), elegido para que \\(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=\\frac{1}{2}-\\left(-\\frac{1}{2}\\right)=1\\). Es el promedio de las dos versiones asimétricas: \\(A=\\oint x\\,dy\\) (con \\(P=0,Q=x\\)) y \\(A=-\\oint y\\,dx\\) (con \\(P=-y,Q=0\\)). Promediarlas da la forma simétrica, más elegante por tratar \\(x\\) e \\(y\\) en pie de igualdad."}, {"question": "¿Qué representa por sí sola la integral de línea \\(\\oint_\\gamma x\\,dy\\), recorriendo \\(\\gamma\\) en sentido antihorario?", "options": [{"text": "El área encerrada por \\(\\gamma\\): corresponde a elegir \\(P=0,\\ Q=x\\) en Green, donde \\(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=1\\).", "correct": true, "feedback": "Correcto. Con \\(P=0\\) y \\(Q=x\\) se tiene \\(\\frac{\\partial Q}{\\partial x}-\\frac{\\partial P}{\\partial y}=1-0=1\\), así que por Green \\(\\oint_\\gamma x\\,dy=\\iint_D 1\\,dA=\\text{Área}(D)\\). Es una de las tres fórmulas clásicas del área, y aquí no necesita el factor \\(\\frac{1}{2}\\)."}, {"text": "La mitad del área; necesita el factor \\(\\frac{1}{2}\\) para dar el área completa.", "correct": false, "feedback": "Incorrecto. \\(\\oint_\\gamma x\\,dy\\) ya da el área COMPLETA, sin \\(\\frac{1}{2}\\). El factor \\(\\frac{1}{2}\\) solo aparece en la versión simétrica \\(\\frac{1}{2}\\oint x\\,dy-y\\,dx\\)."}, {"text": "El perímetro de la región.", "correct": false, "feedback": "Incorrecto. No mide longitud de frontera sino área. Por Green con \\(P=0,Q=x\\), \\(\\oint x\\,dy=\\iint_D 1\\,dA=\\) área."}, {"text": "Cero, porque \\(x\\,dy\\) es un diferencial exacto.", "correct": false, "feedback": "Incorrecto. La forma \\(x\\,dy\\) NO es exacta: su derivada exterior es \\(d(x\\,dy)=dx\\wedge dy\\neq 0\\). Por eso su integral sobre una curva cerrada no se anula, sino que da el área. (Solo una forma exacta integraría 0 sobre toda curva cerrada.)"}], "explanation": "Tomando \\(P=0,\\ Q=x\\), el integrando
